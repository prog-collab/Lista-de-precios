<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lista de Precios</title>
<style>
  :root{
    --bg:#0f172a; --card:#1e293b; --card2:#273449; --text:#f1f5f9;
    --muted:#94a3b8; --accent:#38bdf8; --accent2:#22c55e; --line:#334155;
    --warn:#fbbf24; --star:#facc15;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  body{margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    background:var(--bg); color:var(--text); padding-bottom:40px}
  header{position:sticky; top:0; z-index:10; background:var(--bg);
    padding:12px 14px 10px; border-bottom:1px solid var(--line)}
  h1{font-size:18px; margin:0 0 10px; display:flex; align-items:center; gap:8px}
  h1 .tag{font-size:11px; background:var(--accent); color:#03283a; padding:2px 8px;
    border-radius:20px; font-weight:700}
  .fbtn{background:var(--card); border:1px solid var(--line); color:var(--text);
    border-radius:8px; padding:4px 11px; font-size:14px; font-weight:700; cursor:pointer}
  .fbtn:active{background:var(--card2)}
  .search{width:100%; font-size:17px; padding:13px 14px; border-radius:12px;
    border:1px solid var(--line); background:var(--card); color:var(--text)}
  .search::placeholder{color:var(--muted)}
  .filters{display:flex; gap:8px; margin-top:9px; align-items:center}
  select{flex:1; font-size:14px; padding:10px; border-radius:10px;
    border:1px solid var(--line); background:var(--card); color:var(--text)}
  .count{font-size:12px; color:var(--muted); margin-top:8px}
  main{padding:8px 10px}
  .secttl{font-size:12px; color:var(--muted); text-transform:uppercase;
    letter-spacing:.5px; margin:16px 4px 8px; display:flex; align-items:center;
    justify-content:space-between}
  .secttl button{background:none; border:none; color:var(--accent); font-size:12px; cursor:pointer}
  .item{background:var(--card); border:1px solid var(--line); border-radius:12px;
    padding:12px 14px; margin-bottom:8px; cursor:pointer; display:flex;
    justify-content:space-between; align-items:center; gap:10px}
  .item:active{background:var(--card2)}
  .item .info{min-width:0; flex:1}
  .item .nombre{font-size:15px; font-weight:600; white-space:nowrap;
    overflow:hidden; text-overflow:ellipsis}
  .item .meta{font-size:12px; color:var(--muted); margin-top:3px}
  .item .cod{color:var(--accent); font-weight:700; font-size:15px}
  .item .right{display:flex; align-items:center; gap:10px}
  .item .precio{font-size:18px; font-weight:800; color:var(--accent2); white-space:nowrap}
  .star{background:none; border:none; cursor:pointer; font-size:22px; line-height:1;
    color:var(--muted); padding:4px}
  .star.on{color:var(--star)}
  .empty{text-align:center; color:var(--muted); padding:34px 20px; line-height:1.6}
  /* modal */
  .overlay{position:fixed; inset:0; background:rgba(0,0,0,.6); display:none;
    align-items:flex-end; justify-content:center; z-index:50}
  .overlay.open{display:flex}
  .sheet{background:var(--bg); width:100%; max-width:520px; max-height:92vh;
    overflow-y:auto; border-radius:18px 18px 0 0; border-top:1px solid var(--line);
    padding:18px 16px 28px}
  .sheet h2{margin:0 0 2px; font-size:20px; padding-right:36px}
  .sheet .scod{color:var(--accent); font-weight:700; font-size:14px}
  .sheet .scat{color:var(--muted); font-size:13px; margin-bottom:14px}
  .topbtns{position:sticky; top:0; float:right; display:flex; gap:4px}
  .close{font-size:26px; line-height:1; color:var(--muted); background:none;
    border:none; cursor:pointer}
  .label{font-size:12px; color:var(--muted); text-transform:uppercase;
    letter-spacing:.5px; margin:16px 0 7px}
  .talles{display:flex; flex-wrap:wrap; gap:8px}
  .talle{padding:9px 14px; border-radius:10px; border:1px solid var(--line);
    background:var(--card); color:var(--text); font-size:14px; cursor:pointer}
  .talle.sel{background:var(--accent); color:#03283a; border-color:var(--accent); font-weight:700}
  .lista{background:var(--card2); border-radius:14px; padding:16px; text-align:center; margin:6px 0 4px}
  .lista .l{font-size:13px; color:var(--muted)}
  .lista .v{font-size:34px; font-weight:800; color:var(--text); margin-top:2px}
  .grid{display:grid; grid-template-columns:1fr 1fr; gap:8px}
  .box{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:12px}
  .box .t{font-size:12px; color:var(--muted)}
  .box .p{font-size:20px; font-weight:800; margin-top:3px}
  .box .s{font-size:11px; color:var(--muted); margin-top:2px}
  .green .p{color:var(--accent2)}
  .blue .p{color:var(--accent)}
  .row{display:flex; justify-content:space-between; align-items:center;
    padding:11px 13px; background:var(--card); border:1px solid var(--line);
    border-radius:10px; margin-bottom:7px}
  .row .a{font-size:14px}
  .row .a small{color:var(--muted); display:block; font-size:11px}
  .row .b{font-size:17px; font-weight:700; text-align:right}
  .row .b small{display:block; font-size:11px; color:var(--muted); font-weight:400}
  .row select{flex:none; width:auto; padding:6px 8px; margin-left:6px; font-size:14px;
    border-radius:8px; border:1px solid var(--line); background:var(--card2); color:var(--text)}
  .cfg{font-size:12px; color:var(--muted); display:flex; align-items:center;
    gap:6px; margin-top:14px; justify-content:center}
  .cfg input{width:54px; padding:5px; border-radius:7px; border:1px solid var(--line);
    background:var(--card); color:var(--text); text-align:center; font-size:13px}
  .note{font-size:11px; color:var(--muted); text-align:center; margin-top:10px; line-height:1.5}
</style>
</head>
<body>
<header>
  <h1>Lista de Precios
    <span style="flex:1"></span>
    <button id="fMinus" class="fbtn" title="Achicar letra">A−</button>
    <button id="fPlus" class="fbtn" title="Agrandar letra">A+</button>
  </h1>
  <input id="q" class="search" placeholder="Buscar por código, nombre…" autocomplete="off">
  <div class="filters">
    <select id="cat"><option value="">Todas las categorías</option></select>
  </div>
  <div class="count" id="count"></div>
</header>
<main id="list"></main>

<div class="overlay" id="ov">
  <div class="sheet" id="sheet"></div>
</div>

<script>
const TASA_DEFAULT = 4;      // % mensual para 6/9/12 cuotas (interés directo)
const CUOTAS_INT = [6,9,12]; // con interés
const DESC_CONTADO = 10;     // % efectivo
const PROMOS = [15,20,25,30];// % descuento bancario
const MAX_HIST = 15;

let PRODS = [], BYCOD = {}, tasaMensual = TASA_DEFAULT;
let FAV = getLS('fav_codigos', []);
let HIST = getLS('hist_codigos', []);

const fmt = n => '$' + Math.round(n).toLocaleString('es-AR');
const norm = s => (s||'').toString().toLowerCase()
  .normalize('NFD').replace(/[̀-ͯ]/g,'');
function getLS(k,def){ try{ return JSON.parse(localStorage.getItem(k)) ?? def }catch(e){ return def } }
function setLS(k,v){ try{ localStorage.setItem(k, JSON.stringify(v)) }catch(e){} }

// Tamaño de letra (A− / A+), se guarda en el navegador
let fontScale = getLS('font_scale', 1);
function applyScale(){ document.body.style.zoom = fontScale; }
applyScale();
document.getElementById('fMinus').onclick = ()=>{
  fontScale = Math.max(0.8, Math.round((fontScale-0.1)*10)/10);
  setLS('font_scale', fontScale); applyScale();
};
document.getElementById('fPlus').onclick = ()=>{
  fontScale = Math.min(1.6, Math.round((fontScale+0.1)*10)/10);
  setLS('font_scale', fontScale); applyScale();
};

fetch('productos.json')
  .then(r=>r.json())
  .then(data=>{
    PRODS = data;
    data.forEach(p=>{ if(p.codigo && !(p.codigo in BYCOD)) BYCOD[p.codigo]=p; });
    const cats = [...new Set(data.map(p=>p.categoria).filter(Boolean))].sort();
    const sel = document.getElementById('cat');
    cats.forEach(c=>{ const o=document.createElement('option'); o.value=c; o.textContent=c; sel.appendChild(o); });
    render();
  })
  .catch(()=>{ document.getElementById('list').innerHTML =
    '<div class="empty">No se pudo cargar productos.json.<br>Subí el archivo junto a index.html.</div>'; });

const qEl = document.getElementById('q');
const catEl = document.getElementById('cat');
qEl.addEventListener('input', render);
catEl.addEventListener('change', render);

function isFav(cod){ return FAV.includes(cod); }
function toggleFav(cod){
  if(!cod) return;
  const i = FAV.indexOf(cod);
  if(i>=0) FAV.splice(i,1); else FAV.unshift(cod);
  setLS('fav_codigos', FAV);
  render();
  if(curProd) drawDetail();
}
function pushHist(cod){
  if(!cod) return;
  HIST = HIST.filter(c=>c!==cod);
  HIST.unshift(cod);
  if(HIST.length>MAX_HIST) HIST = HIST.slice(0,MAX_HIST);
  setLS('hist_codigos', HIST);
}

function itemHtml(p){
  const fav = isFav(p.codigo);
  return `<div class="item" data-cod="${esc(p.codigo)}">
      <div class="info">
        <div class="nombre">${esc(p.nombre)||'(sin nombre)'}</div>
        <div class="meta"><span class="cod">${esc(p.codigo)||'—'}</span> · ${esc(p.categoria)}</div>
      </div>
      <div class="right">
        <div class="precio">${fmt(p.precio_lista)}</div>
        <button class="star ${fav?'on':''}" data-fav="${esc(p.codigo)}" title="Favorito">${fav?'★':'☆'}</button>
      </div>
    </div>`;
}

function render(){
  const q = norm(qEl.value.trim());
  const cat = catEl.value;
  const list = document.getElementById('list');
  const countEl = document.getElementById('count');

  // Pantalla de inicio: sin búsqueda ni filtro -> favoritos + historial
  if(!q && !cat){
    countEl.textContent = '';
    let html = '';
    const favProds = FAV.map(c=>BYCOD[c]).filter(Boolean);
    const histProds = HIST.map(c=>BYCOD[c]).filter(Boolean);
    if(favProds.length){
      html += `<div class="secttl"><span>★ Favoritos</span></div>` + favProds.map(itemHtml).join('');
    }
    if(histProds.length){
      html += `<div class="secttl"><span>Últimos consultados</span><button id="clrHist">Borrar</button></div>` + histProds.map(itemHtml).join('');
    }
    if(!html){
      html = `<div class="empty">Buscá un producto por código o nombre.<br><br>
        Tocá la estrella ☆ para guardar favoritos.<br>
        Acá vas a ver tus favoritos y los últimos consultados.</div>`;
    }
    list.innerHTML = html;
    const clr = document.getElementById('clrHist');
    if(clr) clr.onclick = ()=>{ HIST=[]; setLS('hist_codigos',HIST); render(); };
    return;
  }

  const terms = q.split(/\s+/).filter(Boolean);
  let filtered = PRODS.filter(p=>{
    if(cat && p.categoria!==cat) return false;
    if(!terms.length) return true;
    const hay = norm(p.codigo+' '+p.nombre+' '+p.categoria);
    return terms.every(t=>hay.includes(t));
  });
  filtered.sort((a,b)=>{
    const na=parseInt(a.codigo,10), nb=parseInt(b.codigo,10);
    if(!isNaN(na)&&!isNaN(nb)&&na!==nb) return na-nb;
    return (a.codigo||'').localeCompare(b.codigo||'');
  });
  countEl.textContent = filtered.length + ' producto' + (filtered.length!==1?'s':'');
  if(!filtered.length){ list.innerHTML='<div class="empty">Sin resultados.</div>'; return; }
  const shown = filtered.slice(0,300);
  list.innerHTML = shown.map(itemHtml).join('') +
    (filtered.length>300?`<div class="empty">Mostrando 300 de ${filtered.length}. Afiná la búsqueda.</div>`:'');
}

// Delegación de clics: estrella o abrir detalle
document.getElementById('list').addEventListener('click', e=>{
  const star = e.target.closest('.star');
  if(star){ e.stopPropagation(); toggleFav(star.dataset.fav); return; }
  const item = e.target.closest('.item');
  if(item){ const p = BYCOD[item.dataset.cod]; if(p) openDetail(p); }
});

function esc(s){ return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

let curProd=null, curTalle=0, promoSel=20;
function openDetail(p){
  curProd=p; curTalle=0;
  pushHist(p.codigo);
  document.getElementById('ov').classList.add('open');
  drawDetail();
}
function closeDetail(){ document.getElementById('ov').classList.remove('open'); curProd=null; render(); }
document.getElementById('ov').addEventListener('click',e=>{ if(e.target.id==='ov') closeDetail(); });

// Interés DIRECTO (simple): recargo total = tasa × n; cuota = precio×(1+tasa×n)/n
function cuotaDirecta(precio,n,r){ return precio*(1+r*n)/n; }

function drawDetail(){
  const p=curProd;
  const t=p.talles[curTalle];
  const base=t.precio;
  const r=tasaMensual/100;
  const contado=base*(1-DESC_CONTADO/100);
  const tres=base/3;
  const fav=isFav(p.codigo);

  const tallesHtml = p.talles.length>1 ? `
    <div class="label">Talle</div>
    <div class="talles">${p.talles.map((x,i)=>
      `<button class="talle ${i===curTalle?'sel':''}" data-t="${i}">${esc(x.talle)}</button>`).join('')}</div>` : '';

  const cuotasIntHtml = CUOTAS_INT.map(n=>{
    const c=cuotaDirecta(base,n,r);
    const recargo=Math.round(r*n*100);
    return `<div class="row"><div class="a">${n} cuotas<small>+${recargo}% (${tasaMensual}% × ${n})</small></div>
      <div class="b">${fmt(c)}<small>por cuota · total ${fmt(c*n)}</small></div></div>`;
  }).join('');

  const promosHtml = `<div class="row"><div class="a">Promo banco
      <select id="promoPct">${PROMOS.map(d=>
        `<option value="${d}" ${d===promoSel?'selected':''}>−${d}%</option>`).join('')}</select></div>
     <div class="b">${fmt(base*(1-promoSel/100))}</div></div>`;

  document.getElementById('sheet').innerHTML = `
    <div class="topbtns">
      <button class="star ${fav?'on':''}" onclick="toggleFav('${esc(p.codigo)}')" title="Favorito">${fav?'★':'☆'}</button>
      <button class="close" onclick="closeDetail()">×</button>
    </div>
    <h2>${esc(p.nombre)||'(sin nombre)'}</h2>
    <div class="scod">Código ${esc(p.codigo)||'—'}</div>
    <div class="scat">${esc(p.categoria)}</div>
    ${tallesHtml}
    <div class="lista">
      <div class="l">DÉBITO / TRANSFERENCIA / CRED 1 PAGO${p.talles.length>1?' · talle '+esc(t.talle):''}</div>
      <div class="v">${fmt(base)}</div>
    </div>
    <div class="grid">
      <div class="box green"><div class="t">Contado efectivo</div>
        <div class="p">${fmt(contado)}</div><div class="s">−${DESC_CONTADO}%</div></div>
      <div class="box blue"><div class="t">3 cuotas s/interés</div>
        <div class="p">${fmt(tres)}</div><div class="s">por cuota</div></div>
    </div>
    <div class="label">Cuotas con interés</div>
    ${cuotasIntHtml}
    <div class="label">Promociones bancarias</div>
    ${promosHtml}
    <div class="cfg">Interés mensual:
      <input id="tasa" type="number" value="${tasaMensual}" min="0" step="0.5"> %</div>
    <div class="note">Cuotas con <b>interés directo</b> (simple):
      recargo = interés mensual × cantidad de cuotas.<br>
      Cambiá el % arriba si tu tasa cambió.</div>`;

  [...document.querySelectorAll('.talle')].forEach(b=>
    b.onclick=()=>{ curTalle=+b.dataset.t; drawDetail(); });
  const tasaEl=document.getElementById('tasa');
  if(tasaEl) tasaEl.onchange=()=>{ tasaMensual=parseFloat(tasaEl.value)||0; drawDetail(); };
  const promoEl=document.getElementById('promoPct');
  if(promoEl) promoEl.onchange=()=>{ promoSel=parseInt(promoEl.value,10)||20; drawDetail(); };
}
</script>
</body>
</html>
