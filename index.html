<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lista de Precios</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  :root{
    --bg:#0f172a; --card:#1e293b; --card2:#273449; --text:#f1f5f9;
    --muted:#94a3b8; --accent:#38bdf8; --accent2:#22c55e; --line:#334155;
    --warn:#fbbf24; --star:#facc15;
  }
  body.light{
    --bg:#f1f5f9; --card:#ffffff; --card2:#e2e8f0; --text:#0f172a;
    --muted:#64748b; --accent:#0284c7; --accent2:#16a34a; --line:#cbd5e1;
    --warn:#b45309; --star:#ca8a04;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  body{margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    background:var(--bg); color:var(--text); padding-bottom:40px}
  header{position:sticky; top:0; z-index:10; background:var(--bg);
    padding:12px 14px 10px; border-bottom:1px solid var(--line)}
  h1{font-size:18px; margin:0 0 10px; display:flex; align-items:center; gap:8px; flex-wrap:wrap}
  h1 .ttl{flex:1 1 auto; white-space:nowrap}
  .hbtns{display:flex; align-items:center; gap:6px; flex-wrap:wrap; justify-content:flex-end}
  .fbtn{padding:4px 9px}
  h1 .tag{font-size:11px; background:var(--accent); color:#03283a; padding:2px 8px;
    border-radius:20px; font-weight:700}
  .fbtn{background:var(--card); border:1px solid var(--line); color:var(--text);
    border-radius:8px; padding:4px 11px; font-size:14px; font-weight:700; cursor:pointer}
  .fbtn:active{background:var(--card2)}
  .search{width:100%; font-size:17px; padding:13px 14px; border-radius:12px;
    border:1px solid var(--line); background:var(--card); color:var(--text)}
  .search::placeholder{color:var(--muted)}
  .filters{display:flex; gap:8px; margin-top:9px; align-items:center}
  select{flex:1 1 0; min-width:0; font-size:14px; padding:10px; border-radius:10px;
    border:1px solid var(--line); background:var(--card); color:var(--text)}
  .count{font-size:12px; color:var(--muted); margin-top:8px}
  main{padding:8px 10px}
  .secttl{font-size:12px; color:var(--muted); text-transform:uppercase;
    letter-spacing:.5px; margin:16px 4px 8px; display:flex; align-items:center;
    justify-content:space-between}
  .secttl button{background:none; border:none; color:var(--accent); font-size:12px; cursor:pointer}
  .item{background:var(--card); border:1px solid var(--line); border-radius:12px;
    padding:12px 14px; margin-bottom:8px; cursor:pointer; display:flex;
    justify-content:space-between; align-items:center; gap:10px}
  .item:active{background:var(--card2)}
  .item .info{min-width:0; flex:1}
  .item .nombre{font-size:15px; font-weight:600; white-space:nowrap;
    overflow:hidden; text-overflow:ellipsis}
  .item .meta{font-size:12px; color:var(--muted); margin-top:3px}
  .item .cod{color:var(--accent); font-weight:700; font-size:15px}
  .item .right{display:flex; align-items:center; gap:10px}
  .item .precio{font-size:18px; font-weight:800; color:var(--accent2); white-space:nowrap}
  .star{background:none; border:none; cursor:pointer; font-size:22px; line-height:1;
    color:var(--muted); padding:4px}
  .star.on{color:var(--star)}
  /* deslizar para agregar al carrito */
  .swipe-wrap{position:relative; overflow:hidden; border-radius:12px; margin-bottom:8px}
  .swipe-wrap .item{position:relative; z-index:1; margin-bottom:0;
    transition:transform .18s ease; will-change:transform; touch-action:pan-y}
  .swipe-add{position:absolute; top:0; right:0; height:100%; width:120px; z-index:0;
    border:none; background:var(--accent2); color:#04270f; font-weight:800; font-size:20px;
    cursor:pointer; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px}
  .swipe-add span{font-size:12px}
  #toast{position:fixed; left:50%; bottom:24px; transform:translateX(-50%) translateY(20px);
    background:var(--accent2); color:#04270f; font-weight:700; padding:11px 20px; border-radius:22px;
    font-size:14px; opacity:0; pointer-events:none; transition:.2s; z-index:100; box-shadow:0 4px 16px rgba(0,0,0,.3)}
  #toast.show{opacity:1; transform:translateX(-50%) translateY(0)}
  .empty{text-align:center; color:var(--muted); padding:34px 20px; line-height:1.6}
  /* modal */
  .overlay{position:fixed; inset:0; background:rgba(0,0,0,.6); display:none;
    align-items:flex-start; justify-content:center; z-index:50;
    overflow-y:auto; -webkit-overflow-scrolling:touch}
  .overlay.open{display:flex}
  .sheet{background:var(--bg); width:100%; max-width:520px; align-self:flex-start;
    border-radius:0 0 18px 18px; border-bottom:1px solid var(--line);
    padding:18px 16px 90px}
  /* Vender (POS): pantalla completa, no un desplegable tipo modal. */
  .overlay.ov-full{background:var(--bg); align-items:stretch}
  .overlay.ov-full .sheet{max-width:100%; min-height:100vh; border-radius:0; border-bottom:none}
  /* Panel de stock/venta/facturar: en pantallas grandes (PC) se acomoda en 2
     columnas (escaneo a la izquierda, confirmar/facturar a la derecha) en vez
     de quedar todo apilado y angosto como en el celular. */
  @media (min-width:900px){
    .sheet.sheet-wide{max-width:1040px; padding-left:32px; padding-right:32px}
    .sheet.sheet-wide .st-grid{display:grid; grid-template-columns:1fr 1fr; gap:32px; align-items:start}
    .sheet.sheet-wide .st-col-right{position:sticky; top:18px}
    /* Vender (POS), pantalla completa: 3 columnas equidistantes en vez de 2
       (escaneo/carrito, medios de pago/facturar, ventas de hoy). */
    .sheet.sheet-wide .st-grid-3{display:grid; grid-template-columns:1fr 1fr 1fr; gap:28px; align-items:start}
    .sheet.sheet-wide .st-grid-3 > *{position:sticky; top:18px; max-height:calc(100vh - 36px); overflow-y:auto}
  }
  .sheet h2{margin:0 0 2px; font-size:20px; padding-right:8px}
  .sheet .scod{color:var(--accent); font-weight:700; font-size:14px}
  .sheet .scat{color:var(--muted); font-size:13px; margin-bottom:14px}
  .topbtns{float:right; display:flex; gap:8px; align-items:center}
  .backbtn{background:var(--accent); color:#03283a; border:none; border-radius:12px;
    font-size:15px; font-weight:800; padding:9px 16px; cursor:pointer}
  .backbtn:active{filter:brightness(.9)}
  .label{font-size:12px; color:var(--muted); text-transform:uppercase;
    letter-spacing:.5px; margin:16px 0 7px}
  .talles{display:flex; flex-wrap:wrap; gap:8px}
  .talle{padding:9px 14px; border-radius:10px; border:1px solid var(--line);
    background:var(--card); color:var(--text); font-size:14px; cursor:pointer}
  .talle.sel{background:var(--accent); color:#03283a; border-color:var(--accent); font-weight:700}
  .lista{background:var(--card2); border-radius:14px; padding:16px; text-align:center; margin:6px 0 4px}
  .lista .l{font-size:13px; color:var(--muted)}
  .lista .v{font-size:34px; font-weight:800; color:var(--text); margin-top:2px}
  .grid{display:grid; grid-template-columns:1fr 1fr; gap:8px}
  .box{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:12px}
  .box .t{font-size:12px; color:var(--muted)}
  .box .p{font-size:20px; font-weight:800; margin-top:3px}
  .box .s{font-size:11px; color:var(--muted); margin-top:2px}
  .green .p{color:var(--accent2)}
  .blue .p{color:var(--accent)}
  .row{display:flex; justify-content:space-between; align-items:center;
    padding:11px 13px; background:var(--card); border:1px solid var(--line);
    border-radius:10px; margin-bottom:7px}
  .row .a{font-size:14px}
  .row .a small{color:var(--muted); display:block; font-size:11px}
  .row .b{font-size:17px; font-weight:700; text-align:right}
  .row .b small{display:block; font-size:11px; color:var(--muted); font-weight:400}
  .row select{flex:none; width:auto; padding:6px 8px; margin-left:6px; font-size:14px;
    border-radius:8px; border:1px solid var(--line); background:var(--card2); color:var(--text)}
  .cfg{font-size:12px; color:var(--muted); display:flex; align-items:center;
    gap:6px; margin-top:14px; justify-content:center}
  .cfg input{width:54px; padding:5px; border-radius:7px; border:1px solid var(--line);
    background:var(--card); color:var(--text); text-align:center; font-size:13px}
  .note{font-size:11px; color:var(--muted); text-align:center; margin-top:10px; line-height:1.5}
  /* carrito */
  .addcart{display:block; width:100%; margin:10px 0 2px; padding:14px;
    background:var(--accent2); color:#04270f; border:none; border-radius:12px;
    font-size:16px; font-weight:800; cursor:pointer}
  .addcart:active{filter:brightness(.9)}
  .cbadge{background:var(--accent2); color:#04270f; border-radius:20px;
    font-size:12px; font-weight:800; padding:1px 7px; margin-left:2px}
  .citem{display:flex; align-items:center; gap:10px; background:var(--card);
    border:1px solid var(--line); border-radius:12px; padding:10px 12px; margin-bottom:8px}
  .citem .cinfo{flex:1; min-width:0}
  .citem .cname{font-size:14px; font-weight:600; white-space:nowrap;
    overflow:hidden; text-overflow:ellipsis}
  .citem .cmeta{font-size:11px; color:var(--muted); margin-top:2px}
  .cqty{display:flex; align-items:center; gap:2px}
  .cqty button{width:34px; height:34px; border-radius:9px; border:1px solid var(--line);
    background:var(--card2); color:var(--text); font-size:18px; font-weight:700; cursor:pointer}
  .cqty span{min-width:24px; text-align:center; font-size:15px; font-weight:700}
  .csub{font-size:15px; font-weight:800; min-width:70px; text-align:right; color:var(--accent2)}
  .cdel{background:none; border:none; color:var(--muted); font-size:18px; cursor:pointer; padding:4px}
  .cclear{display:block; margin:14px auto 0; background:none; border:1px solid var(--line);
    color:var(--muted); border-radius:10px; padding:9px 18px; font-size:13px; cursor:pointer}
  /* aviso de aumentos */
  #aviso{display:none; align-items:center; gap:8px; margin:10px 10px 0; padding:11px 13px;
    background:#33270d; border:1px solid var(--warn); border-radius:12px;
    font-size:13.5px; line-height:1.45}
  #aviso span{flex:1}
  #aviso b{color:var(--warn)}
  #aviso button{background:none; border:none; color:var(--text); font-size:17px;
    cursor:pointer; padding:2px 6px; flex:none}
  /* aviso de funciones nuevas */
  #novedad{display:none; align-items:center; gap:8px; margin:10px 10px 0; padding:11px 13px;
    background:#0c2b3a; border:1px solid var(--accent); border-radius:12px;
    font-size:13.5px; line-height:1.45}
  body.light #novedad{background:#e0f2fe}
  #novedad span{flex:1}
  #novedad b{color:var(--accent)}
  #novedad button{background:none; border:none; color:var(--text); font-size:17px;
    cursor:pointer; padding:2px 6px; flex:none}
</style>
</head>
<body>
<header>
  <h1><span class="ttl">Lista de Precios</span>
    <div class="hbtns">
      <button id="fMinus" class="fbtn" title="Achicar letra">A−</button>
      <button id="fPlus" class="fbtn" title="Agrandar letra">A+</button>
      <button id="themeBtn" class="fbtn" title="Cambiar tema">🌙</button>
      <button id="addBtn" class="fbtn" title="Agregar producto">➕</button>
      <button id="stockBtn" class="fbtn" title="Cargar stock (escaneo)">📦</button>
      <button id="venderBtn" class="fbtn" title="Vender (POS)">🛍️</button>
      <button id="clientesBtn" class="fbtn" title="Cuenta corriente de clientes">👤</button>
      <button id="traspasosBtn" class="fbtn" title="Traspaso de stock entre locales">🔁</button>
      <button id="devolucionesBtn" class="fbtn" title="Devoluciones de mercadería">↩️</button>
      <button id="helpBtn" class="fbtn" title="Ayuda">❓</button>

    <div style="flex:1; position:relative; display:flex">
      <input id="q" class="search" placeholder="Buscar por código, nombre…" autocomplete="off" style="flex:1; padding-right:34px">
      <button id="qClear" type="button" title="Borrar búsqueda" style="display:none; position:absolute; right:6px; top:50%; transform:translateY(-50%); border:0; background:transparent; color:var(--text); font-size:18px; line-height:1; cursor:pointer; padding:4px 6px; opacity:.6">✕</button>
    </div>
    <button id="scanBtn" class="fbtn" title="Escanear código de barras" style="font-size:18px; padding:11px 13px">📷</button>

    <select id="sort">
      <option value="cod">Ordenar: código</option>
      <option value="nombre">Ordenar: nombre</option>
      <option value="precioAsc">Ordenar: precio ↑</option>
      <option value="precioDesc">Ordenar: precio ↓</option>
    </select>
  </div>
  <div class="count" id="count"></div>
</header>
<div id="aviso"></div>
<div id="novedad"></div>
<main id="list"></main>

<div class="overlay" id="ov">
  <div class="sheet" id="sheet"></div>
</div>

<div class="overlay" id="ovCart">
  <div class="sheet" id="sheetCart"></div>
</div>

<div class="overlay" id="ovPopup">
  <div class="sheet" id="sheetPopup" style="max-width:420px"></div>
</div>

<script>
// Registro del service worker (instalable como app + funciona sin internet)
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');

const TASA_DEFAULT = 4;      // % mensual para 6/9/12 cuotas (interés directo)
const CUOTAS_INT = [6,9,12]; // con interés
const DESC_CONTADO = 10;     // % efectivo
const PROMOS = [15,20,25,30];// % descuento bancario
const MAX_HIST = 15;

// === Sin vínculo con Excel/planilla: la fuente de verdad es Supabase. ===
// (Para agregar artículos, fotos o cambiar precios, se usa el panel web.)
const SCRIPT_URL = '';
const SHEET_ID = '';
// PIN del editor para AGREGAR / EDITAR / BORRAR.
// ⚠️ Cambiá este número por uno tuyo antes de subir.
const ADMIN_PIN = '2580';
let isAdmin = getLS('admin', false) === true;

let CATALOG = [];             // catálogo original (productos.json), no se toca
let OVERRIDES = {};           // codigo -> {accion:'alta'|'edit'|'baja', data:{...}}

let PRODS = [], BYCOD = {}, tasaMensual = getLS('tasa_mensual', TASA_DEFAULT);
let FAV = getLS('fav_codigos', []);
let HIST = getLS('hist_codigos', []);
let CART = getLS('carrito', []);   // {cod, nombre, talle, precio, qty}

const fmt = n => '$' + Math.round(n).toLocaleString('es-AR');
const norm = s => (s||'').toString().toLowerCase()
  .normalize('NFD').replace(/[̀-ͯ]/g,'');
function getLS(k,def){ try{ return JSON.parse(localStorage.getItem(k)) ?? def }catch(e){ return def } }
function setLS(k,v){ try{ localStorage.setItem(k, JSON.stringify(v)) }catch(e){} }

// Tamaño de letra (A− / A+), se guarda en el navegador
let fontScale = getLS('font_scale', 1);
function applyScale(){ document.body.style.zoom = fontScale; }
applyScale();
document.getElementById('fMinus').onclick = ()=>{
  fontScale = Math.max(0.8, Math.round((fontScale-0.1)*10)/10);
  setLS('font_scale', fontScale); applyScale();
};
document.getElementById('fPlus').onclick = ()=>{
  fontScale = Math.min(1.6, Math.round((fontScale+0.1)*10)/10);
  setLS('font_scale', fontScale); applyScale();
};

// Tema claro / oscuro
let theme = getLS('theme', 'dark');
function applyTheme(){
  document.body.classList.toggle('light', theme==='light');
  document.getElementById('themeBtn').textContent = theme==='light' ? '☀️' : '🌙';
}
applyTheme();
document.getElementById('themeBtn').onclick = ()=>{
  theme = theme==='light' ? 'dark' : 'light';
  setLS('theme', theme); applyTheme();
};

/* ===== Catálogo: en vivo desde Supabase (fuente de verdad), con respaldo a productos.json ===== */
const SB_URL = 'https://grswqigekcopfrozcxqj.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdyc3dxaWdla2NvcGZyb3pjeHFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzMTkxMDAsImV4cCI6MjA5Nzg5NTEwMH0.8jHhaYi9wC2D5OEixO3M3G8sN40h4ZjIksrfSiNWSVI';
function normArt(p){
  return {
    codigo: String(p.codigo),
    nombre: p.nombre,
    categoria: p.categoria,
    precio_lista: Number(p.precio_lista),
    foto_url: p.foto_url || null,
    costo: (p.costo!=null && p.costo!=='') ? Number(p.costo) : null,
    talles: (p.talles||[]).map(t=>({ talle: t.talle, precio: Number(t.precio),
      stock: Array.isArray(t.stock) ? t.stock : [] }))
  };
}
async function cargarCatalogo(){
  try{
    const all=[]; const step=1000; let off=0;
    for(;;){
      const r = await fetch(`${SB_URL}/rest/v1/articulos?select=codigo,nombre,categoria,precio_lista,talles,foto_url,costo&order=codigo.asc&limit=${step}&offset=${off}`,
        { headers:{ apikey:SB_KEY, Authorization:'Bearer '+SB_KEY }, cache:'no-store' });
      if(!r.ok) throw new Error('HTTP '+r.status);
      const page = await r.json();
      all.push(...page.map(normArt));
      if(page.length < step) break;
      off += step;
    }
    if(!all.length) throw new Error('sin datos');
    CATALOG = all; loadAltas();
  }catch(e){
    document.getElementById('list').innerHTML =
      '<div class="empty">No se pudo cargar la lista de precios.<br>Revisá la conexión.</div>';
  }
}
cargarCatalogo();

loadConfig();   // interés mensual compartido entre todos los teléfonos

/* ===== Altas / ediciones / bajas hechas desde la app ===== */
function ensureCats(){
  const sel = document.getElementById('cat');
  const have = new Set([...sel.options].map(o=>o.value));
  [...new Set(PRODS.map(p=>p.categoria).filter(Boolean))].sort().forEach(c=>{
    if(!have.has(c)){ const o=document.createElement('option'); o.value=c; o.textContent=c; sel.appendChild(o); }
  });
}
// Registra un cambio (el último por código gana)
function setOv(a){
  if(!a || !a.codigo) return;
  OVERRIDES[a.codigo] = {
    accion: a.accion || 'alta',
    data: {
      nombre: a.nombre, categoria: a.categoria, precio_lista: a.precio_lista,
      talles: (a.talles && a.talles.length) ? a.talles : [{talle:'Único', precio:a.precio_lista}]
    }
  };
}
// Reconstruye PRODS desde el catálogo aplicando los overrides
function rebuild(){
  PRODS = []; BYCOD = {};
  // Supabase (CATALOG) es la fuente de verdad: para los códigos que ya existen,
  // se usa SIEMPRE el dato de Supabase (ignoramos ediciones viejas de la planilla/celular).
  CATALOG.forEach(p=>{ PRODS.push(p); });
  Object.keys(OVERRIDES).forEach(cod=>{                   // solo altas de códigos que NO están en la base
    const ov = OVERRIDES[cod];
    if(ov.accion==='baja') return;
    if(!CATALOG.some(p=>p.codigo===cod)) PRODS.push(Object.assign({codigo:cod}, ov.data));
  });
  PRODS.forEach(p=>{ if(p.codigo && !(p.codigo in BYCOD)) BYCOD[p.codigo]=p; });
  ensureCats(); render();
}
// Aplica primero la planilla (de todos) y al final las locales (recién hechas, ganan)
function applyAll(remoteRows){
  OVERRIDES = {};
  remoteRows.forEach(setOv);
  getLS('altas_local', []).forEach(setOv);
  rebuild();
}
// Parser CSV simple (gviz devuelve campos con comillas para JSON con comas)
function parseCSV(text){
  const rows=[]; let i=0, field='', row=[], inq=false;
  while(i<text.length){
    const c=text[i];
    if(inq){
      if(c==='"'){ if(text[i+1]==='"'){ field+='"'; i+=2; continue; } inq=false; i++; continue; }
      field+=c; i++; continue;
    }
    if(c==='"'){ inq=true; i++; continue; }
    if(c===','){ row.push(field); field=''; i++; continue; }
    if(c==='\n'){ row.push(field); rows.push(row); row=[]; field=''; i++; continue; }
    if(c==='\r'){ i++; continue; }
    field+=c; i++;
  }
  if(field.length||row.length){ row.push(field); rows.push(row); }
  return rows;
}
function loadAltas(){
  // Supabase es la única fuente de verdad. Ya no se lee la planilla de Google ni el Excel.
  OVERRIDES = {};
  rebuild();
}
// Guarda un cambio local y lo envía a la planilla
function pushCambio(a){
  const locals = getLS('altas_local', []);
  locals.push(a); setLS('altas_local', locals);
  setOv(a); rebuild();
  if(SCRIPT_URL){
    return fetch(SCRIPT_URL, {method:'POST', mode:'no-cors',
      headers:{'Content-Type':'text/plain;charset=utf-8'}, body: JSON.stringify(a)});
  }
  return Promise.reject('sin SCRIPT_URL');
}

/* ===== Configuración compartida (pestaña Config de la planilla) =====
   Guarda valores que deben ser iguales en todos los teléfonos, ej. el
   interés mensual. Se lee al abrir la app; el editor lo cambia y se
   sincroniza con la planilla por el mismo Apps Script. */
function loadConfig(){
  const url = 'https://docs.google.com/spreadsheets/d/'+SHEET_ID+
    '/gviz/tq?tqx=out:csv&sheet=Config&t='+Date.now();
  fetch(url, {cache:'no-store'})
    .then(r=>r.text())
    .then(txt=>{
      const rows = parseCSV(txt);
      if(rows.length < 2) return;
      const head = rows[0].map(h=>h.trim().toLowerCase());
      const ci = {}; head.forEach((h,idx)=>ci[h]=idx);
      for(let r=1; r<rows.length; r++){
        const k = (rows[r][ci['clave']]||'').trim();
        const v = (rows[r][ci['valor']]||'').trim();
        if(k==='tasa_mensual'){ const n=parseFloat(v); if(!isNaN(n)){ tasaMensual=n; setLS('tasa_mensual', n); } }
      }
    })
    .catch(()=>{});
}
// Guarda un valor de configuración local y lo envía a la planilla
function pushConfig(clave, valor){
  setLS(clave, valor);
  if(SCRIPT_URL){
    return fetch(SCRIPT_URL, {method:'POST', mode:'no-cors',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({tipo:'config', clave, valor})});
  }
  return Promise.reject('sin SCRIPT_URL');
}

/* ===== Aviso de aumentos (avisos.json) =====
   Banner cerrable (✕) durante 5 días + notificación a las 9:30 y 17:00.
   Las notificaciones se disparan cuando la app está abierta a esa hora,
   o al abrirla más tarde ese mismo día (una sola vez por horario). */
const AVISO_DIAS = 5, NOVEDAD_DIAS = 2, AVISO_HORAS = ['09:00', '16:00'];
let AVISO = null;
fetch('avisos.json', {cache:'no-store'})
  .then(r=>r.json())
  .then(a=>{
    if(!a || !a.fecha || !Array.isArray(a.categorias) || !a.categorias.length) return;
    const dias = (Date.now() - new Date(a.fecha+'T00:00:00')) / 86400000;
    if(dias < 0 || dias >= AVISO_DIAS) return;
    AVISO = a;
    drawAviso();
    checkNotifs();
    setInterval(checkNotifs, 60000);
  })
  .catch(()=>{});

function drawAviso(){
  const el = document.getElementById('aviso');
  if(!AVISO || getLS('aviso_cerrado','') === AVISO.fecha){ el.style.display='none'; return; }
  const cats = AVISO.categorias.join(', ');
  const bell = ('Notification' in window) && Notification.permission === 'default'
    ? '<button id="avBell" title="Activar notificaciones">🔔</button>' : '';
  el.innerHTML = `<span>📢 Subieron los precios en: <b>${esc(cats)}</b></span>${bell}
    <button id="avX" title="Cerrar">✕</button>`;
  el.style.display = 'flex';
  document.getElementById('avX').onclick = ()=>{ setLS('aviso_cerrado', AVISO.fecha); drawAviso(); };
  const nb = document.getElementById('avBell');
  if(nb) nb.onclick = ()=> Notification.requestPermission().then(()=>{ drawAviso(); checkNotifs(); });
}

function checkNotifs(){
  if(!AVISO || !('Notification' in window) || Notification.permission !== 'granted') return;
  if((Date.now() - new Date(AVISO.fecha+'T00:00:00')) / 86400000 >= AVISO_DIAS) return;
  const now = new Date();
  const hoy = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
  AVISO_HORAS.forEach(h=>{
    const [hh, mm] = h.split(':').map(Number);
    if(now.getHours()*60 + now.getMinutes() < hh*60 + mm) return;
    const k = `notif_${AVISO.fecha}_${hoy}_${h}`;
    if(getLS(k, false)) return;
    setLS(k, true);
    const msg = 'Subieron los precios en: ' + AVISO.categorias.join(', ');
    if(navigator.serviceWorker && navigator.serviceWorker.controller){
      navigator.serviceWorker.ready.then(reg=>
        reg.showNotification('Lista de Precios', {body: msg, icon: 'icon-192.png', badge: 'icon-192.png'}));
    } else {
      try{ new Notification('Lista de Precios', {body: msg, icon: 'icon-192.png'}); }catch(e){}
    }
  });
}

// Agrega un botón ✕ para vaciar cualquier campo de texto de un toque
function makeClearable(input){
  if(!input || input.dataset.clearable || input.readOnly) return;
  input.dataset.clearable='1';
  // Conservar el tamaño/posición original del input en el contenedor
  const oFlex=input.style.flex, oWidth=input.style.width, oML=input.style.marginLeft;
  const wrap=document.createElement('span');
  wrap.style.cssText='position:relative; display:flex';
  if(oFlex || oWidth){
    if(oFlex) wrap.style.flex = oFlex;
    if(oWidth) wrap.style.width = oWidth;
    if(oML) wrap.style.marginLeft = oML;
  } else { wrap.style.width='100%'; }
  input.parentNode.insertBefore(wrap, input);
  wrap.appendChild(input);
  input.style.flex='1'; input.style.width='100%'; input.style.marginLeft='0'; input.style.paddingRight='30px';
  const b=document.createElement('button');
  b.type='button'; b.title='Borrar'; b.textContent='✕';
  b.style.cssText='position:absolute; right:6px; top:50%; transform:translateY(-50%); border:0; background:transparent; color:var(--text); font-size:16px; line-height:1; cursor:pointer; padding:4px 6px; opacity:.55';
  wrap.appendChild(b);
  const upd=()=>{ b.style.display = input.value ? 'block':'none'; };
  input.addEventListener('input', upd);
  b.addEventListener('click', ()=>{ input.value=''; input.dispatchEvent(new Event('input',{bubbles:true})); input.focus(); });
  upd();
}

function render(){
  const q = norm(qEl.value.trim());
  const cat = catEl.value;
  const list = document.getElementById('list');
  const countEl = document.getElementById('count');

  // Pantalla de inicio: sin búsqueda ni filtro -> favoritos + historial
  if(!q && !cat){
    countEl.textContent = '';
    let html = '';
    const favProds = FAV.map(c=>BYCOD[c]).filter(Boolean);
    const histProds = HIST.map(c=>BYCOD[c]).filter(Boolean);
    if(favProds.length){
      html += `<div class="secttl"><span>★ Favoritos</span></div>` + favProds.map(itemHtml).join('');
    }
    if(histProds.length){
      html += `<div class="secttl"><span>Últimos consultados</span><button id="clrHist">Borrar</button></div>` + histProds.map(itemHtml).join('');
    }
    if(!html){
      html = `<div class="empty">Buscá un producto por código o nombre.<br><br>
        Tocá la estrella ☆ para guardar favoritos.<br>
        Acá vas a ver tus favoritos y los últimos consultados.</div>`;
    }
    list.innerHTML = html;
    const clr = document.getElementById('clrHist');
    if(clr) clr.onclick = ()=>{ HIST=[]; setLS('hist_codigos',HIST); render(); };
    return;
  }

  const terms = q.split(/\s+/).filter(Boolean);
  let filtered = PRODS.filter(p=>{
    if(cat && p.categoria!==cat) return false;
    if(!terms.length) return true;
    const hay = norm(p.codigo+' '+p.nombre+' '+p.categoria);
    return terms.every(t=>hay.includes(t));
  });
  const sortMode = sortEl.value;
  filtered.sort((a,b)=>{
    if(sortMode==='nombre') return (a.nombre||'').localeCompare(b.nombre||'');
    if(sortMode==='precioAsc') return a.precio_lista - b.precio_lista;
    if(sortMode==='precioDesc') return b.precio_lista - a.precio_lista;
    const na=parseInt(a.codigo,10), nb=parseInt(b.codigo,10);
    if(!isNaN(na)&&!isNaN(nb)&&na!==nb) return na-nb;
    return (a.codigo||'').localeCompare(b.codigo||'');
  });
  countEl.textContent = filtered.length + ' producto' + (filtered.length!==1?'s':'');
  if(!filtered.length){ list.innerHTML='<div class="empty">Sin resultados.</div>'; return; }
  const shown = filtered.slice(0,300);
  list.innerHTML = shown.map(itemHtml).join('') +
    (filtered.length>300?`<div class="empty">Mostrando 300 de ${filtered.length}. Afiná la búsqueda.</div>`:'');
}

function addToCartQuick(cod){

  toast('✓ Agregado al carrito');

// Deslizar un producto a la izquierda para revelar el botón "Agregar"
const listEl = document.getElementById('list');
let swItem=null, swX0=0, swY0=0, swDx=0, swDir=null, swSuppress=false, swOpen=null;
function swReset(it){ if(it){ it.style.transform=''; } }
listEl.addEventListener('touchstart', e=>{
  const it = e.target.closest('.swipe-wrap .item');
  if(swOpen && swOpen!==it){ swReset(swOpen); swOpen=null; }
  if(!it) return;
  swItem=it; swX0=e.touches[0].clientX; swY0=e.touches[0].clientY; swDx=0; swDir=null;
}, {passive:true});
listEl.addEventListener('touchmove', e=>{
  if(!swItem) return;
  const dx=e.touches[0].clientX-swX0, dy=e.touches[0].clientY-swY0;
  if(swDir===null) swDir = Math.abs(dx)>Math.abs(dy) ? 'h' : 'v';
  if(swDir==='v'){ swItem=null; return; }
  swDx=dx;
  const base = (swOpen===swItem) ? -120 : 0;
  const tx = Math.min(0, Math.max(-120, base+dx));
  swItem.style.transform = `translateX(${tx}px)`;
  e.preventDefault();
}, {passive:false});
listEl.addEventListener('touchend', ()=>{
  if(!swItem) return;
  const base = (swOpen===swItem) ? -120 : 0;
  const open = (base+swDx) < -60;
  swItem.style.transform = open ? 'translateX(-120px)' : '';
  swOpen = open ? swItem : (swOpen===swItem ? null : swOpen);
  if(Math.abs(swDx)>8){ swSuppress=true; setTimeout(()=>swSuppress=false, 350); }
  swItem=null; swDx=0; swDir=null;
});

// Clics: agregar rápido, estrella, o abrir detalle
listEl.addEventListener('click', e=>{

  if(add){ addToCartQuick(add.dataset.add); swReset(add.parentElement.querySelector('.item'));
    if(swOpen===add.parentElement.querySelector('.item')) swOpen=null; return; }
  if(swSuppress){ swSuppress=false; e.stopPropagation(); return; }
  const star = e.target.closest('.star');
  if(star){ e.stopPropagation(); toggleFav(star.dataset.fav); return; }
  const item = e.target.closest('.item');
  if(item){ const p = BYCOD[item.dataset.cod]; if(p) openDetail(p); }
});

async function guardarProducto(esEdit){
  const msg = document.getElementById('apMsg');
  const ok = document.getElementById('apSave');
  const catSel = document.getElementById('apCat');
  const categoria = catSel.value==='__new' ? document.getElementById('apCatNew').value.trim() : catSel.value;
  const codigo = document.getElementById('apCod').value.trim();
  const nombre = document.getElementById('apNom').value.trim();
  const costoVal = document.getElementById('apCostoReal').value;
  const costo = costoVal.trim()!=='' ? Number(costoVal) : null;
  const talles = [];
  document.querySelectorAll('#apTalles .row').forEach(r=>{
    const t = r.querySelector('.apT').value.trim();
    const p = parseFloat(r.querySelector('.apP').value);
    if(!isNaN(p) && p>0) talles.push({talle: t||'Único', precio: Math.round(p), stock: []});
  });
  if(!codigo){ msg.textContent='Falta el código.'; return; }
  if(!nombre){ msg.textContent='Falta el nombre.'; return; }
  if(!categoria){ msg.textContent='Falta la categoría.'; return; }
  if(!talles.length){ msg.textContent='Cargá al menos un precio.'; return; }
  // agregar y editar requieren PIN del editor, más una sesión real (📦/🛍️)
  // para poder escribir en el catálogo compartido de Supabase.
  if(!pedirAdmin()){ msg.textContent='Necesitás el PIN del editor.'; return; }
  ok.disabled = true; msg.textContent = 'Guardando…';
  try{
    const body = { nombre, categoria, precio_lista: talles[0].precio, talles, costo };
    const r = esEdit
      ? await sbAuthed(`/rest/v1/articulos?codigo=eq.${encodeURIComponent(codigo)}`, { method:'PATCH', body: JSON.stringify(body) })
      : await sbAuthed('/rest/v1/articulos', { method:'POST', body: JSON.stringify(Object.assign({codigo}, body)) });
    if(!r.ok){ const d = await r.json().catch(()=>({})); throw new Error(d.message || 'No se pudo guardar.'); }
    // rebuild() usa CATALOG (Supabase) como fuente de verdad para códigos ya
    // existentes — los OVERRIDES locales no alcanzan para reflejar una edición
    // al toque, así que actualizamos CATALOG directamente con lo ya confirmado.
    const nuevoArt = normArt({codigo, nombre, categoria, precio_lista: talles[0].precio, talles, costo});
    const idx = CATALOG.findIndex(p=>p.codigo===codigo);
    if(idx>=0) CATALOG[idx] = nuevoArt; else CATALOG.push(nuevoArt);
    rebuild();
    msg.textContent = '✓ Guardado';
    setTimeout(closeDetail, 700);
  }catch(e){
    ok.disabled = false;
    msg.textContent = String(e.message)==='login'
      ? 'Necesitás iniciar sesión (botón 📦 o 🛍️) para guardar en el catálogo compartido.'
      : 'No se pudo guardar: '+(e.message||e);
  }
}

/* ===== Escaneo de código de barras =====
   El código de barras trae el código completo (8 díg + talle), pero en la
   lista los productos están como prefijo de 5 díg + "XXX". Probamos de lo
   más específico a lo más general: completo → 8 díg → 5 díg, y nos quedamos
   con la primera variante que tenga resultados. */
function searchByBarcode(raw){
  const digits = (raw||'').replace(/\D/g,'');
  const tries = [...new Set([digits, digits.slice(0,8), digits.slice(0,5)])].filter(Boolean);
  for(const t of tries){
    const nt = norm(t);
    if(PRODS.some(p=>norm(p.codigo).includes(nt))){ qEl.value = t; render(); return; }
  }
  qEl.value = digits.slice(0,5) || raw; render();
}

// Carga perezosa de Tesseract.js (OCR) solo cuando hace falta leer números.
function loadTesseract(){
  if(window.Tesseract) return Promise.resolve();
  return new Promise((res,rej)=>{
    const s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';
    s.onload=res; s.onerror=rej; document.head.appendChild(s);
  });
}

// Beep corto al capturar un código en la pantalla de Vender (confirmación
// sonora de que el escaneo se registró, sin depender de mirar la pantalla).
let stAudioCtx = null;
function beepScan(){
  try{
    if(!stAudioCtx) stAudioCtx = new (window.AudioContext||window.webkitAudioContext)();
    if(stAudioCtx.state==='suspended') stAudioCtx.resume();
    const osc = stAudioCtx.createOscillator();
    const gain = stAudioCtx.createGain();
    osc.type = 'sine'; osc.frequency.value = 1300;
    gain.gain.setValueAtTime(0.25, stAudioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, stAudioCtx.currentTime+0.15);
    osc.connect(gain); gain.connect(stAudioCtx.destination);
    osc.start(); osc.stop(stAudioCtx.currentTime+0.15);
  }catch(e){}
}

// Carga perezosa de ZXing: lector de códigos de barra en JS puro, para
// navegadores que no tienen la API nativa BarcodeDetector (Safari/iPhone,
// y la mayoría de los navegadores de escritorio) — sin esto, en esos
// navegadores la cámara del POS no leía sola, solo quedaba la carga manual.
function loadZXing(){
  if(window.ZXing) return Promise.resolve();
  return new Promise((res,rej)=>{
    const s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/@zxing/library@0.21.3/umd/index.min.js';
    s.onload=res; s.onerror=rej; document.head.appendChild(s);
  });
}

// Worker de Tesseract reutilizable, configurado para leer solo dígitos en una
// sola línea (mucho más preciso que el modo "texto en inglés" por defecto,
// que es la razón principal por la que "Leer número" casi nunca funcionaba).
let tessWorker = null;
async function getTessWorker(){
  if(tessWorker) return tessWorker;
  await loadTesseract();
  tessWorker = await Tesseract.createWorker('eng');
  await tessWorker.setParameters({
    tessedit_char_whitelist: '0123456789',
    tessedit_pageseg_mode: '7', // trata la imagen como una sola línea de texto
  });
  return tessWorker;
}

document.getElementById('scanBtn').onclick = async ()=>{
  let stream;
  try{
    // Resolución media (antes 640x480): muy baja para que el foco automático
    // tenga suficiente detalle para trabajar, y para leer números a mano.
    // El detector de código de barras sigue andando rápido igual a esta resolución.
    stream = await navigator.mediaDevices.getUserMedia({video:{
      facingMode:'environment', width:{ideal:1280}, height:{ideal:720},
      // Pedimos foco automático continuo: sin esto, varios Android arrancan
      // con un solo autofoco al abrir la cámara y después quedan fijos.
      advanced:[{focusMode:'continuous'}],
    }});
  }catch(e){
    alert('No se pudo acceder a la cámara.');
    return;
  }
  const track = stream.getVideoTracks()[0];
  // Si el navegador soporta foco continuo pero no lo tomó de los constraints
  // iniciales (pasa en algunos Android), lo reforzamos con applyConstraints.
  try{
    const caps = track.getCapabilities ? track.getCapabilities() : {};
    if(caps.focusMode && caps.focusMode.includes('continuous')){
      await track.applyConstraints({advanced:[{focusMode:'continuous'}]});
    }
  }catch(e){}
  const video = document.createElement('video');
  video.srcObject = stream; video.setAttribute('playsinline','');
  video.style = 'width:100%; border-radius:12px; display:block';
  const hayBarras = ('BarcodeDetector' in window);
  document.getElementById('sheet').classList.remove('sheet-wide');
  document.getElementById('sheet').innerHTML = `
    <div class="topbtns"><button class="backbtn" id="scanClose">✕ Cerrar</button></div>
    <h2>📷 Escanear código</h2>
    <div class="scat">${hayBarras
      ? 'Apuntá al código de barras, o tocá “Leer número” si no tiene.'
      : 'Apuntá la cámara al número y tocá “Leer número”.'}</div>`;
  const sheetEl = document.getElementById('sheet');

  // Contenedor con un recuadro guía: acota qué parte del cuadro se manda a
  // OCR, para que no confunda ruido de fondo (costuras, logos) con un dígito.
  const videoWrap = document.createElement('div');
  videoWrap.style = 'position:relative; margin-top:6px';
  videoWrap.appendChild(video);
  const guide = document.createElement('div');
  // Recuadro: 82% de ancho, 26% de alto, centrado.
  guide.style = 'position:absolute; left:9%; right:9%; top:37%; bottom:37%; '+
    'border:2px solid #22c55e; border-radius:8px; pointer-events:none';
  videoWrap.appendChild(guide);
  sheetEl.appendChild(videoWrap);
  const guideNote = document.createElement('div');
  guideNote.className='note'; guideNote.style.marginTop='4px';
  guideNote.textContent = 'Para leer el número, encuadrá solo esos dígitos dentro del recuadro verde.';
  sheetEl.appendChild(guideNote);

  const ocrBtn = document.createElement('button');
  ocrBtn.className='addcart'; ocrBtn.textContent='🔢 Leer número'; ocrBtn.style.marginTop='10px';
  sheetEl.appendChild(ocrBtn);
  const ocrMsg = document.createElement('div');
  ocrMsg.className='note'; sheetEl.appendChild(ocrMsg);
  document.getElementById('ov').classList.add('open');
  history.pushState({detalle:1}, '');
  video.play();

  let stopped = false;
  let scanZXingReader = null;
  function stop(){ stopped=true; try{ stream.getTracks().forEach(t=>t.stop()); }catch(e){}
    try{ if(scanZXingReader) scanZXingReader.reset(); }catch(e){} scanZXingReader=null; }
  function finish(val){
    if(stopped) return;
    stop();                                   // apaga la cámara
    document.getElementById('ov').classList.remove('open');  // cierra ya, sin depender del historial
    if(history.state && history.state.detalle) history.back();
    searchByBarcode(val);
  }
  document.getElementById('scanClose').onclick = ()=>{ stop(); closeDetail(); };

  // Leer número impreso (sin código de barras) con OCR
  ocrBtn.onclick = async ()=>{
    ocrMsg.textContent='Leyendo número…';
    try{
      const worker = await getTessWorker();

      // Recortamos solo lo que queda dentro del recuadro guía (9%..91% de
      // ancho, 37%..63% de alto, ver estilos de "guide" más arriba). Antes se
      // mandaba el cuadro completo, así que cualquier logo, costura o borde
      // de la etiqueta podía leerse como "un dígito suelto".
      const sx = video.videoWidth * 0.09, sy = video.videoHeight * 0.37;
      const sw = video.videoWidth * 0.82, sh = video.videoHeight * 0.26;
      // Escalamos el recorte hacia arriba para que Tesseract tenga buena
      // resolución aunque el recuadro guía sea chico en la imagen original.
      const scale = 3;
      const c=document.createElement('canvas');
      c.width = sw * scale; c.height = sh * scale;
      const ctx = c.getContext('2d');
      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(video, sx, sy, sw, sh, 0, 0, c.width, c.height);

      // Blanco y negro con umbral: mejora mucho la lectura de números
      // impresos chicos frente a dejarle la imagen a color tal cual.
      const img = ctx.getImageData(0,0,c.width,c.height);
      const d = img.data;
      for(let i=0;i<d.length;i+=4){
        const gray = 0.299*d[i] + 0.587*d[i+1] + 0.114*d[i+2];
        const v = gray < 140 ? 0 : 255;
        d[i]=d[i+1]=d[i+2]=v;
      }
      ctx.putImageData(img,0,0);

      const {data} = await worker.recognize(c);
      const num=(data.text||'').replace(/\D/g,'');
      if(num) finish(num);
      else ocrMsg.textContent='No se leyó ningún número. Acercá la cámara y reintentá.';
    }catch(e){
      console.error(e);
      ocrMsg.textContent='No se pudo leer (¿sin internet?). Escribí el número a mano.';
    }
  };

  // Detección automática de código de barras.
  // Limitamos los formatos a los que realmente usan las etiquetas de ropa (EAN/UPC y
  // Code128) — sin esto, el detector prueba TODOS los formatos que soporta el celular
  // en cada cuadro, que es la causa principal de que se sienta lento.
  if(hayBarras){
    const FORMATOS = ['ean_13','ean_8','upc_a','upc_e','code_128'];
    let detector;
    try{ detector = new BarcodeDetector({formats: FORMATOS}); }
    catch(e){ detector = new BarcodeDetector(); } // por si el navegador no soporta filtrar formatos
    (async function loop(){
      while(!stopped){
        if(video.readyState >= 2){ // HAVE_CURRENT_DATA: recién ahí hay un cuadro real para analizar
          try{
            const codes = await detector.detect(video);
            if(codes.length){ finish(codes[0].rawValue); return; }
          }catch(e){}
        }
        await new Promise(r=>setTimeout(r, 120));
      }
    })();
  }else{
    // Sin BarcodeDetector nativo (Safari/iPhone, y varios de escritorio):
    // ZXing como respaldo, igual que en la cámara de Cargar/Vender.
    loadZXing().then(()=>{
      if(stopped) return;
      const hints = new Map();
      hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
        ZXing.BarcodeFormat.EAN_13, ZXing.BarcodeFormat.EAN_8,
        ZXing.BarcodeFormat.UPC_A, ZXing.BarcodeFormat.UPC_E,
        ZXing.BarcodeFormat.CODE_128,
      ]);
      const reader = new ZXing.BrowserMultiFormatReader(hints);
      scanZXingReader = reader;
      reader.decodeFromVideoElementContinuously(video, (result)=>{
        if(stopped || !result) return;
        finish(result.getText());
      });
    }).catch(()=>{});
  }
};

/* ===== 📦 Modo Stock: escanear prendas para cargar inventario =====
   Código de barras Taverniti: 11 dígitos = 5 artículo + 3 color + 3 talle.
   Cada lectura suma +1 al stock del color+talle en el local elegido
   (articulos.talles[].stock[], vía el RPC ajustar_stock de Supabase).
   Escribir stock exige iniciar sesión con una cuenta del panel (RLS is_admin);
   el PIN del modo editor NO alcanza. */
let sbSession = getLS('sb_session', null);
let stOpen=false, stStream=null, stStopped=true, stBusy=false, stCount=0, stLast=null, stVentaTotal=0, stVentaItems=[], stZXingReader=null;
let stSeccion='carga';   // 'carga' (cargar stock, descuenta al toque) o 'venta' (carrito, descuenta al Guardar venta)
let stCoolCode='', stCoolUntil=0;
let MAPS = {color:{}, talle:{}};   // código de barras → nombre (compartido, tabla barcode_maps)

// Los vendedores entran con un usuario corto (sin @), no con su email real.
// Si no trae "@" le agregamos un dominio interno fijo, que Supabase Auth usa
// solo como identificador — nunca se envía ningún correo a esa dirección.
function usuarioAEmail(u){
  u = (u||'').trim().toLowerCase();
  return u.includes('@') ? u : u+'@vendedores.local';
}
function mostrarUsuario(email){ return (email||'').replace('@vendedores.local',''); }
async function sbLogin(email, pass){
  const r = await fetch(`${SB_URL}/auth/v1/token?grant_type=password`, {
    method:'POST', headers:{ apikey:SB_KEY, 'Content-Type':'application/json' },
    body: JSON.stringify({email, password: pass}),
  });
  const d = await r.json().catch(()=>({}));
  if(!r.ok || !d.access_token) throw new Error(d.error_description || d.msg || 'Email o contraseña incorrectos.');
  sbSession = { access_token: d.access_token, refresh_token: d.refresh_token,
    expires_at: Math.floor(Date.now()/1000) + (d.expires_in||3600), email };
  setLS('sb_session', sbSession);
  // Si había quedado en caché el rol/local de una sesión anterior en esta
  // misma pestaña (sin recargar la página), hay que olvidarlo al loguear.
  miRolCache = null;
  miLocalAsignadoCache = undefined;
}
// Token vigente; renueva con el refresh_token si está por vencer. Si no se
// puede renovar, tira 'login' para que la vista vuelva a pedir la sesión.
async function sbToken(){
  if(!sbSession) throw new Error('login');
  if(sbSession.expires_at - 60 > Math.floor(Date.now()/1000)) return sbSession.access_token;
  const r = await fetch(`${SB_URL}/auth/v1/token?grant_type=refresh_token`, {
    method:'POST', headers:{ apikey:SB_KEY, 'Content-Type':'application/json' },
    body: JSON.stringify({refresh_token: sbSession.refresh_token}),
  });
  const d = await r.json().catch(()=>({}));
  if(!r.ok || !d.access_token){ sbSession=null; setLS('sb_session', null); throw new Error('login'); }
  sbSession = { access_token: d.access_token, refresh_token: d.refresh_token,
    expires_at: Math.floor(Date.now()/1000) + (d.expires_in||3600), email: sbSession.email };
  setLS('sb_session', sbSession);
  return sbSession.access_token;
}
async function sbAuthed(path, opts={}){
  const token = await sbToken();
  const headers = Object.assign({ apikey: SB_KEY, Authorization: 'Bearer '+token,
    'Content-Type':'application/json' }, opts.headers||{});
  return fetch(`${SB_URL}${path}`, Object.assign({}, opts, {headers}));
}

const isoLocal = d => { const p=n=>String(n).padStart(2,'0'); return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`; };

// Arma la URL del QR obligatorio de AFIP (RG 4291) a partir de los datos del comprobante.
function afipQrUrl(d){
  const payload = {
    ver: 1,
    fecha: d.fecha ? `${d.fecha.slice(0,4)}-${d.fecha.slice(4,6)}-${d.fecha.slice(6,8)}` : isoLocal(new Date()),
    cuit: Number(d.cuit),
    ptoVta: Number(d.puntoVenta),
    tipoCmp: d.tipo==='A' ? 1 : 6,
    nroCmp: Number(d.numero),
    importe: Number(d.monto),
    moneda: 'PES',
    ctz: 1,
    tipoDocRec: d.tipo==='A' ? 80 : 99,
    nroDocRec: d.tipo==='A' ? Number(d.clienteCuit||0) : 0,
    tipoCodAut: 'E',
    codAut: Number(d.cae),
  };
  return 'https://www.afip.gob.ar/fe/qr/?p=' + btoa(JSON.stringify(payload));
}

// Dibuja el ticket estilo comprobante (fondo blanco, como el papel) en un canvas
// y devuelve un Blob JPG — se usa para compartir la imagen por WhatsApp.
function buildTicketImage(d, localSel){
  return new Promise((resolve, reject)=>{
    const qrUrl = afipQrUrl(d);
    const qrImgUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=700x700&data=' + encodeURIComponent(qrUrl);
    const qrImg = new Image();
    qrImg.crossOrigin = 'anonymous';
    qrImg.onload = ()=>{
      const homolog = d.ambiente==='homologacion';
      const info = LOCAL_INFO[localSel] || LOCAL_INFO.camerino;
      const W = 380, pad = 20, lineH = 24, smallH = 17, qrSize = 220;
      const font = w => `${w} 14px "Courier New", monospace`;
      const smallFont = w => `${w} 11px "Courier New", monospace`;
      const draw = ctx => {
        let y = pad + 14;
        const divider = ()=>{ if(ctx){ ctx.strokeStyle='#000'; ctx.setLineDash([4,3]); ctx.beginPath(); ctx.moveTo(pad,y); ctx.lineTo(W-pad,y); ctx.stroke(); ctx.setLineDash([]); } y += 16; };
        const center = (t,w)=>{ if(ctx){ ctx.font=font(w); ctx.textAlign='center'; ctx.fillText(t, W/2, y); } y += lineH; };
        const centerSmall = (t,w)=>{ if(ctx){ ctx.font=smallFont(w); ctx.textAlign='center'; ctx.fillText(t, W/2, y); } y += smallH; };
        const left = (t,w)=>{ if(ctx){ ctx.font=font(w); ctx.textAlign='left'; ctx.fillText(t, pad, y); } y += lineH; };
        const row = (a,b,w)=>{ if(ctx){ ctx.font=font(w); ctx.textAlign='left'; ctx.fillText(a, pad, y); ctx.textAlign='right'; ctx.fillText(b, W-pad, y); } y += lineH; };
        const rowSmall = (a,b)=>{
          if(ctx){
            ctx.font=smallFont('normal'); ctx.textAlign='right'; ctx.fillText(b, W-pad, y);
            const maxW = W-pad*2-ctx.measureText(b).width-10;
            let txt=a; while(ctx.measureText(txt).width>maxW && txt.length>1) txt=txt.slice(0,-1);
            if(txt!==a) txt=txt.slice(0,-1)+'…';
            ctx.textAlign='left'; ctx.fillText(txt, pad, y);
          }
          y += smallH;
        };
        if(ctx) ctx.fillStyle = '#000';
        center(info.razonSocial, 'bold');
        centerSmall('CUIT '+cuitFmt(d.cuit), 'normal');
        centerSmall('Ing. Brutos: '+info.ingBrutos, 'normal');
        centerSmall('Domicilio: '+info.domicilio, 'normal');
        centerSmall('Inicio de Actividades: '+info.inicioActividades, 'normal');
        centerSmall(info.condicionIva, 'normal');
        centerSmall(d.tipo==='A' ? 'A RESPONSABLE INSCRIPTO' : 'A CONSUMIDOR FINAL', 'normal');
        y += 4; divider();
        left(`FACTURA ${d.tipo} (Cód. ${d.tipo==='A'?'001':'006'})`, 'bold');
        left(`P.V. ${String(d.puntoVenta).padStart(4,'0')} · Nro. ${String(d.numero).padStart(8,'0')}`, 'normal');
        left(`Fecha: ${fechaFmtDe(d.fecha)}`, 'normal');
        if(d.tipo==='A') left(`CUIT cliente: ${cuitFmt(d.clienteCuit)}`, 'normal');
        y += 4; divider();
        (d.items||[]).forEach(it=> rowSmall(`${it.codigo} ${it.nombre}${it.talle?` (${it.talle}${it.color?' · '+it.color:''})`:''}`, money(it.precio)));
        if((d.items||[]).length){ y += 4; divider(); }
        row('TOTAL', money(d.monto), 'bold');
        y += 4; divider();
        left(`CAE: ${d.cae}`, 'normal');
        left(`Vto. CAE: ${fechaFmtDe(d.caeVencimiento)}`, 'normal');
        if(homolog){ y += 6; center('⚠ HOMOLOGACIÓN', 'bold'); center('Sin validez fiscal real', 'normal'); }
        y += 10;
        if(ctx) ctx.drawImage(qrImg, (W-qrSize)/2, y, qrSize, qrSize);
        y += qrSize + pad;
        return y;
      };
      const totalH = draw(null);
      const scale = 3; // alta densidad para que la imagen no se vea borrosa al ampliar o imprimir
      const canvas = document.createElement('canvas');
      canvas.width = W*scale; canvas.height = totalH*scale;
      const ctx = canvas.getContext('2d');
      ctx.scale(scale, scale);
      ctx.fillStyle = '#fff'; ctx.fillRect(0,0,W,totalH);
      draw(ctx);
      canvas.toBlob(blob => blob ? resolve(blob) : reject(new Error('No se pudo generar la imagen.')), 'image/jpeg', 0.95);
    };
    qrImg.onerror = ()=> reject(new Error('No se pudo cargar el QR.'));
    qrImg.src = qrImgUrl;
  });
}

// Deja el teléfono en formato E.164 sin '+' para el link wa.me (asume Argentina
// si no viene con código de país).
function telParaWA(tel){
  let t = String(tel||'').replace(/\D/g,'');
  if(!t) return '';
  if(!t.startsWith('54')) t = '549'+t.replace(/^0/,'').replace(/^15/,'');
  return t;
}

function wireTicketButtons(card, d, localSel, telefono){
  card.querySelector('#stTicketWADirecto').onclick = ()=>{
    const err = card.querySelector('#stTicketWAErr');
    err.textContent = '';
    const tel = telefono || prompt('Teléfono de WhatsApp del cliente (con código de área, sin 0 ni 15):');
    if(!tel) return;
    const url = `https://wa.me/${telParaWA(tel)}?text=`+encodeURIComponent(textoTicket(d, localSel));
    window.open(url, '_blank');
  };
  card.querySelector('#stTicketWA').onclick = async ()=>{
    const btn = card.querySelector('#stTicketWA');
    const err = card.querySelector('#stTicketWAErr');
    const caption = textoTicket(d, localSel);
    err.textContent = '';
    btn.disabled = true; btn.textContent = 'Generando imagen…';
    try{
      const blob = await buildTicketImage(d, localSel);
      const file = new File([blob], `ticket-${d.tipo}-${d.numero}.jpg`, { type:'image/jpeg' });
      if(navigator.canShare && navigator.canShare({ files:[file] })){
        await navigator.share({ files:[file], text: caption });
      } else {
        // Sin soporte para compartir archivos: descarga la imagen y abre WhatsApp
        // con el texto — hay que adjuntarla a mano en el chat.
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = file.name;
        a.click();
        const tel = telParaWA(telefono);
        const url = (tel ? `https://wa.me/${tel}` : 'https://wa.me/') + '?text='+encodeURIComponent(caption);
        window.open(url, '_blank');
        err.textContent = 'Se descargó la imagen del ticket — adjuntala a mano en el chat que se abrió.';
      }
    }catch(e){
      if(e.name!=='AbortError') err.textContent = 'No se pudo compartir: '+(e.message||e);
    }
    btn.disabled = false; btn.textContent = '🖼️ Compartir imagen (elegir contacto)';
  };
  card.querySelector('#stTicketPrint').onclick = ()=>{
    const ticket = card.querySelector('#stTicket');
    const w = window.open('', '_blank');
    w.document.write(`<html><head><title>Ticket</title><style>
      body{font-family:sans-serif; padding:16px; max-width:340px}
      *{color:#000!important; background:#fff!important; border-color:#000!important}
    </style></head><body>${ticket.outerHTML}</body></html>`);
    w.document.close();
    w.focus();
    setTimeout(()=> w.print(), 300);
  };
}

      const tel = clienteTelefono || prompt(`Teléfono de WhatsApp de ${nombreAfip} (con código de área, sin 0 ni 15):`);

    try{

        method:'POST',

        body: JSON.stringify({ local: localSel, cuit }),
      });
      const d = await r.json().catch(()=>({}));
      if(!r.ok) throw new Error(d.error || 'No se pudo consultar.');
      if(d.nombre){ nombreEl.textContent = '✓ '+d.nombre; guardarClienteBtn(d.nombre); }
      else nombreEl.textContent = 'No se encontró esa persona en AFIP.';
    }catch(e){ nombreEl.textContent = 'No se pudo verificar: '+(e.message||e); }
  };
  card.querySelector('#stFcCuit').addEventListener('input', ()=>{ clienteTelefono = null; });
  card.querySelector('#stFcCuit').addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); consultarCuit(); } });
  card.querySelector('#stFcBuscarCliente').onclick = ()=>{
    const picker = card.querySelector('#stFcClientePicker');
    if(picker.innerHTML){ picker.innerHTML=''; return; }
    picker.innerHTML = `
      <input id="stFcBuscarInput" class="search" placeholder="Buscar por nombre o teléfono…" style="margin-top:6px">
      <div id="stFcBuscarResultados"></div>`;
    const buscarInput = picker.querySelector('#stFcBuscarInput');
    const resultadosEl = picker.querySelector('#stFcBuscarResultados');
    makeClearable(buscarInput);
    buscarInput.focus();
    let t;
    buscarInput.addEventListener('input', ()=>{
      clearTimeout(t);
      t = setTimeout(async ()=>{
        const q = buscarInput.value.trim();
        if(q.length<2){ resultadosEl.innerHTML=''; return; }
        resultadosEl.innerHTML = 'Buscando…';
        try{
          const r = await sbAuthed(`/rest/v1/clientes?select=cuit,nombre,telefono&or=(nombre.ilike.*${encodeURIComponent(q)}*,telefono.ilike.*${encodeURIComponent(q)}*)&limit=8`);
          const rows = r.ok ? await r.json() : [];
          resultadosEl.innerHTML = rows.length ? rows.map((c,i)=>
            `<div class="lista" data-i="${i}" style="margin-top:4px; cursor:pointer">
               <div class="l">${esc(c.nombre||'(sin nombre)')}</div>
               <div class="v" style="font-size:13px">${esc(c.cuit||'sin CUIT')} · ${esc(c.telefono||'sin tel')}</div>
             </div>`).join('') : '<div class="note">Sin resultados.</div>';
          [...resultadosEl.querySelectorAll('[data-i]')].forEach(el=> el.onclick=()=>{
            const c = rows[Number(el.dataset.i)];
            clienteTelefono = c.telefono || null;
            if(c.cuit){ card.querySelector('#stFcCuit').value = c.cuit; consultarCuit(); }
            picker.innerHTML='';
          });
        }catch(e){ resultadosEl.innerHTML = 'Error al buscar.'; }
      }, 300);
    });
  };
  card.querySelector('#stFcCuit').addEventListener('blur', consultarCuit);
  card.querySelector('#stFcCancel').onclick = ()=>{
    stVentaTotal = 0; stVentaItems = [];
    drawVender();
  };
  card.querySelector('#stFcOk').onclick = async ()=>{
    const err = card.querySelector('#stFcErr');
    const ok = card.querySelector('#stFcOk');
    const localSel = stLocal();
    const cuotasTCred = cuotasSeleccionadas();
    const recargoPct = CUOTAS_INT.includes(cuotasTCred) ? Number((tasaMensual*cuotasTCred).toFixed(2)) : 0;
    const pagoTCred = montoFinalTarjeta();
    const transfDescuentoActivo = descuentoTransferenciaActivo();
    const transfDescuentoPct = transfDescuentoActivo ? DESCUENTO_TRANSFERENCIA : 0;
    const pagoTransf = montoFinalTransferencia();
    const total = totalConRecargo();
    const pagoContado = Number(card.querySelector('#stCvContado').value)||0;
    const transfAlias = card.querySelector('#stCvTransfAlias').value||null;
    const pagoTDeb = Number(card.querySelector('#stCvTDeb').value)||0;
    const pagoCPer = Number(card.querySelector('#stCvCPer').value)||0;
    const pagoCFin = Number(card.querySelector('#stCvCFin').value)||0;
    const saldoPendiente = Math.max(0, total - (pagoContado+pagoTransf+pagoTCred+pagoTDeb+pagoCPer+pagoCFin));
    const cuit = (card.querySelector('#stFcCuit').value||'').replace(/\D/g,'');
    const fecha = card.querySelector('#stFcFecha').value;
    if(!(total>0)){ err.textContent='Agregá al menos un producto al carrito.'; return; }
    if(saldoPendiente>0){ err.textContent='⚠ Falta cargar medios de pago — el saldo pendiente tiene que quedar en $0 para guardar la venta.'; return; }
    if(pagoTransf>0 && !transfAlias){ err.textContent='Elegí a qué alias se transfirió.'; return; }
    if(pagoCPer>0 && !clienteCreditoId){ err.textContent='Elegí un cliente (arriba, junto al total) para el crédito personal.'; return; }
    if(facturar && tipo==='A' && cuit.length!==11){ err.textContent='Para Factura A escribí el CUIT del cliente (11 dígitos).'; return; }
    if(facturar && !fecha){ err.textContent='Elegí la fecha del comprobante.'; return; }
    err.textContent=''; ok.disabled=true; ok.textContent = 'Verificando caja…';
    const sesionAbierta = await obtenerCajaAbierta(localSel);
    if(!sesionAbierta){
      ok.disabled=false; ok.textContent = facturar?'Guardar y facturar':'Guardar venta';
      err.textContent = `⚠ No hay caja abierta en ${stLocalNombre(localSel)} — abrila arriba antes de vender.`;
      return;
    }
    ok.textContent = 'Guardando…';
    let ventaId = null;
    let stockAplicado = false;
    try{
      // 1) Se crea el registro de la venta primero (sin facturar todavía), para
      //    poder referenciarlo en el historial de stock.
      const rVenta = await sbAuthed('/rest/v1/ventas', { method:'POST',
        headers:{ Prefer:'return=representation' },
        body: JSON.stringify({
          local: localSel, vendedor: sbSession.email||null, items: stVentaItems, total,
          pago_contado: pagoContado, pago_transferencia: pagoTransf, transferencia_alias: transfAlias,
          transferencia_descuento_pct: transfDescuentoPct,
          pago_tarjeta_credito: pagoTCred, pago_tarjeta_debito: pagoTDeb,
          pago_credito_personal: pagoCPer, pago_credito_financiero: pagoCFin, saldo_pendiente: saldoPendiente,
          tarjeta_credito_cuotas: cuotasTCred, tarjeta_credito_recargo_pct: recargoPct,
          cliente_id: clienteCreditoId,
          caja_sesion_id: sesionAbierta.id,
          facturada: false,
        }) });
      const ventaRows = await rVenta.json().catch(()=>null);
      if(!rVenta.ok || !ventaRows || !ventaRows[0]) throw new Error('No se pudo guardar la venta.');
      ventaId = ventaRows[0].id;

      // 2) Recién ahora se descuenta el stock de todo el carrito, en una sola
      //    transacción (todo o nada), referenciando la venta recién creada.
      ok.textContent = 'Descontando stock…';
      await rpcAplicarVentaStock(stVentaItems, localSel, ventaId);
      stockAplicado = true;

      // 2.b) Si parte de la venta quedó como crédito personal, se carga a la
      // cuenta corriente del cliente elegido.
      if(pagoCPer>0 && clienteCreditoId){
        await sbAuthed('/rest/v1/cuenta_corriente_movimientos', { method:'POST', body: JSON.stringify({
          cliente_id: clienteCreditoId, tipo:'cargo', monto: pagoCPer, local: localSel,
          referencia_venta_id: ventaId, usuario: sbSession.email||null,
        }) }).catch(e=>console.error('No se pudo registrar el cargo en cuenta corriente:', e));
      }

      // 3) Si corresponde, se factura.
      let d = null;
      if(facturar){
        ok.textContent = 'Emitiendo…';
        const token = await sbToken();
        const r = await fetch(API_FACTURAR, {
          method:'POST',
          headers:{ 'Content-Type':'application/json', Authorization:'Bearer '+token },
          body: JSON.stringify({ local: localSel, tipo, montoTotal: total, clienteCuit: cuit, fecha, items: stVentaItems }),
        });
        d = await r.json().catch(()=>({}));
        if(!r.ok) throw new Error(d.error || 'No se pudo facturar.');
        await sbAuthed(`/rest/v1/ventas?id=eq.${ventaId}`, { method:'PATCH', body: JSON.stringify({
          facturada: true, factura_tipo: d.tipo, factura_pto_vta: d.puntoVenta,
          factura_numero: d.numero, factura_cae: d.cae,
        }) }).catch(e=>console.error('No se pudo actualizar la venta con los datos de la factura:', e));
      }
      const resultadoEl = card.querySelector('#stFcResultado');
      if(facturar){
        resultadoEl.style.flex = '1 1 100%';   // el ticket necesita todo el ancho, no comparte fila
        resultadoEl.innerHTML = renderTicket(d, localSel);
        wireTicketButtons(card, d, localSel, clienteTelefono);
      } else {
        resultadoEl.style.flex = '2 1 200px';   // comparte fila con el botón "Nueva venta"
        resultadoEl.innerHTML = `<div class="lista" style="display:flex; align-items:center; justify-content:space-between; text-align:left; padding:10px 14px; height:100%; box-sizing:border-box"><div class="l" style="margin:0">✓ Venta guardada</div><div class="v" style="font-size:20px; margin:0">${money(total)}</div></div>`;
      }
      stVentaTotal = 0; stVentaItems = [];
      renderCarrito();
      renderResumenDia();
      ok.style.display='none';
      card.querySelector('#stFcCancel').textContent='Nueva venta';
      card.querySelector('#stFcCancel').onclick = ()=> drawVender();
    }catch(e){
      ok.disabled=false; ok.textContent = facturar?'Guardar y facturar':'Guardar venta';
      if(ventaId && !stockAplicado){
        // Todavía no se tocó el stock: la venta quedó a medio crear, se descarta.
        await sbAuthed(`/rest/v1/ventas?id=eq.${ventaId}`, { method:'DELETE' }).catch(()=>{});
        err.textContent = e.message || 'No se pudo guardar la venta.';
      } else if(stockAplicado){
        // El stock ya se descontó de verdad (la venta es real) — lo que falló
        // fue la factura. Se deja la venta guardada sin facturar.
        err.textContent = 'La venta se guardó y el stock ya se descontó, pero no se pudo facturar: '+(e.message||e)+
          ' — todavía no hay forma de reintentar la factura sola, avisale a Juan si esto pasa.';
      } else {
        err.textContent = e.message || 'No se pudo guardar la venta.';
      }
    }
  };
}

// Busca el artículo por el código de barras, de lo más específico a lo más
// general: completo → 8 díg (artículo+color) → 5 díg + 'XXX' → 5 díg.
function buscarArticuloBarcode(digits){
  const art5 = digits.slice(0,5);
  const tries = [...new Set([digits, digits.slice(0,8), art5+'XXX', art5])].filter(Boolean);
  for(const c of tries){ if(BYCOD[c]) return BYCOD[c]; }
  return null;
}

// real del header (que sigue existiendo en el DOM, solo tapado).
function navIconsHtml(){
  return `<div class="hbtns" style="justify-content:flex-end; flex-wrap:wrap; margin-bottom:10px">
    <button type="button" class="fbtn" data-nav="fMinus" title="Achicar letra">A−</button>

    <button type="button" class="fbtn" data-nav="addBtn" title="Agregar producto">➕</button>
    <button type="button" class="fbtn" data-nav="stockBtn" title="Cargar stock (escaneo)">📦</button>
    <button type="button" class="fbtn" data-nav="venderBtn" title="Vender (POS)">🛍️</button>
    <button type="button" class="fbtn" data-nav="clientesBtn" title="Cuenta corriente de clientes">👤</button>
    <button type="button" class="fbtn" data-nav="traspasosBtn" title="Traspaso de stock entre locales">🔁</button>
    <button type="button" class="fbtn" data-nav="devolucionesBtn" title="Devoluciones de mercadería">↩️</button>

  </div>`;
}
function wireNavIcons(container){
  (container||document).querySelectorAll('[data-nav]').forEach(b=>{
    b.onclick = ()=>{ const orig = document.getElementById(b.dataset.nav); if(orig) orig.click(); };
  });
}

    });
  });
  document.getElementById('stUndo').onclick = stDeshacer;

  stCamara();
}

// ===== Sesión de caja real: hay que abrirla (con un fondo inicial) antes de
// poder guardar una venta en ese local, y se cierra con arqueo/gastos/
// retiros/adelantos, calculando la diferencia contra lo esperado.
async function obtenerCajaAbierta(local){
  try{
    const r = await sbAuthed(`/rest/v1/caja_sesiones?local=eq.${local}&estado=eq.abierta&select=*&limit=1`);
    const rows = r.ok ? await r.json() : [];
    return rows[0] || null;
  }catch(e){ return null; }
}

async function renderCajaStatus(){
  const box = document.getElementById('stCajaStatus');
  const formBox = document.getElementById('stCajaFormBox');
  if(!box) return;
  box.textContent = 'Verificando estado de caja…';
  formBox.innerHTML = '';
  const localSel = stLocal();
  const sesion = await obtenerCajaAbierta(localSel);
  if(!sesion){
    box.innerHTML = `🔒 No hay caja abierta en <b>${esc(stLocalNombre(localSel))}</b> — hay que abrirla para poder vender.
      <button class="fbtn" id="stCajaAbrirBtn" style="margin-left:6px">Abrir caja</button>`;
    document.getElementById('stCajaAbrirBtn').onclick = ()=> armarAbrirCaja(formBox, localSel);
  } else {
    const hora = sesion.abierta_at ? new Date(sesion.abierta_at).toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'}) : '';
    box.innerHTML = `🔓 Caja abierta en <b>${esc(stLocalNombre(localSel))}</b> desde las ${hora} · fondo inicial ${money(sesion.fondo_inicial)}
      <button class="fbtn" id="stCajaCerrarBtn" style="margin-left:6px">Cerrar caja</button>`;
    document.getElementById('stCajaCerrarBtn').onclick = ()=> armarCerrarCaja(formBox, sesion, localSel);
  }
}

function armarAbrirCaja(formBox, localSel){
  formBox.innerHTML = `
    <div class="lista" style="margin-top:8px; text-align:left">
      <div class="label" style="margin:0">Abrir caja en ${esc(stLocalNombre(localSel))}</div>
      <div class="note" style="margin-top:4px">Fondo inicial (efectivo con el que arranca)</div>
      <input id="stCajaFondo" class="search" type="number" inputmode="decimal" value="0" style="margin-top:4px">
      <button class="addcart" id="stCajaAbrirOk" style="margin-top:8px">🔓 Abrir caja</button>
      <div class="note" id="stCajaErr"></div>
    </div>`;
  document.getElementById('stCajaAbrirOk').onclick = async ()=>{
    const err = document.getElementById('stCajaErr');
    const ok = document.getElementById('stCajaAbrirOk');
    const fondo = Number(document.getElementById('stCajaFondo').value)||0;
    err.textContent=''; ok.disabled=true; ok.textContent='Abriendo…';
    try{
      const r = await sbAuthed('/rest/v1/rpc/abrir_caja_sesion', { method:'POST', body: JSON.stringify({
        p_local: localSel, p_fondo_inicial: fondo,
      }) });
      if(!r.ok){ const d = await r.json().catch(()=>({})); throw new Error(d.message || 'No se pudo abrir la caja.'); }
      renderCajaStatus();
    }catch(e){
      ok.disabled=false; ok.textContent='🔓 Abrir caja';
      err.textContent = e.message||e;
    }
  };
}

async function armarCerrarCaja(formBox, sesion, localSel){
  formBox.innerHTML = `<div class="note" style="margin-top:8px">Calculando ventas de esta caja…</div>`;
  const r = await sbAuthed(`/rest/v1/ventas?caja_sesion_id=eq.${sesion.id}&select=*`);
  const ventas = r.ok ? await r.json() : [];
  const totales = ventas.reduce((acc,v)=>({
    contado: acc.contado + Number(v.pago_contado||0),
    total: acc.total + Number(v.total||0),
    cant: acc.cant + 1,
  }), {contado:0, total:0, cant:0});
  formBox.innerHTML = `
    <div class="lista" style="margin-top:8px; text-align:left">
      <div class="label" style="margin:0">Cerrar caja de ${esc(stLocalNombre(localSel))}</div>
      <div class="note" style="margin-top:4px">Ventas de esta caja: ${totales.cant} · efectivo vendido ${money(totales.contado)} · total ${money(totales.total)}</div>
      <div class="grid" style="margin-top:6px">
        <div><div class="note" style="margin:0 0 4px">Fondo inicial</div><input id="ccFondo" class="search" type="number" value="${sesion.fondo_inicial}" readonly></div>
        <div><div class="note" style="margin:0 0 4px">Cambio</div><input id="ccCambio" class="search" type="number" value="0"></div>
        <div><div class="note" style="margin:0 0 4px">Gastos</div><input id="ccGastos" class="search" type="number" value="0"></div>
        <div><div class="note" style="margin:0 0 4px">Retiros</div><input id="ccRetiros" class="search" type="number" value="0"></div>
        <div><div class="note" style="margin:0 0 4px">Adelantos</div><input id="ccAdelantos" class="search" type="number" value="0"></div>
        <div><div class="note" style="margin:0 0 4px">Arqueo (efectivo contado a mano)</div><input id="ccArqueo" class="search" type="number" value="0"></div>
      </div>
      <input id="ccObs" class="search" placeholder="Observaciones (detalle de gastos, retiros, adelantos)" style="margin-top:6px">
      <div class="note" id="ccEsperadoInfo" style="margin-top:6px"></div>
      <button class="addcart" id="stCajaCerrarOk" style="margin-top:8px">🔒 Confirmar cierre</button>
      <button class="fbtn" id="stCajaCancelar" style="width:100%; margin-top:6px">Cancelar</button>
      <div class="note" id="stCajaErr"></div>
    </div>`;
  const recalc = ()=>{
    const cambio = Number(document.getElementById('ccCambio').value)||0;
    const gastos = Number(document.getElementById('ccGastos').value)||0;
    const retiros = Number(document.getElementById('ccRetiros').value)||0;
    const adelantos = Number(document.getElementById('ccAdelantos').value)||0;
    const arqueo = Number(document.getElementById('ccArqueo').value)||0;
    const esperado = Number(sesion.fondo_inicial) + totales.contado + cambio - gastos - retiros - adelantos;
    const diferencia = arqueo - esperado;
    document.getElementById('ccEsperadoInfo').innerHTML = `Efectivo esperado: <b>${money(esperado)}</b> · Diferencia: <b style="${diferencia!==0?'color:var(--warn)':''}">${money(diferencia)}</b>`;
  };
  ['ccCambio','ccGastos','ccRetiros','ccAdelantos','ccArqueo'].forEach(id=> document.getElementById(id).addEventListener('input', recalc));
  recalc();
  document.getElementById('stCajaCancelar').onclick = ()=>{ formBox.innerHTML=''; };
  document.getElementById('stCajaCerrarOk').onclick = async ()=>{
    const err = document.getElementById('stCajaErr');
    const ok = document.getElementById('stCajaCerrarOk');
    err.textContent=''; ok.disabled=true; ok.textContent='Cerrando…';
    try{
      const rc = await sbAuthed('/rest/v1/rpc/cerrar_caja_sesion', { method:'POST', body: JSON.stringify({
        p_sesion_id: sesion.id,
        p_gastos: Number(document.getElementById('ccGastos').value)||0,
        p_retiros: Number(document.getElementById('ccRetiros').value)||0,
        p_adelantos: Number(document.getElementById('ccAdelantos').value)||0,
        p_cambio: Number(document.getElementById('ccCambio').value)||0,
        p_arqueo: Number(document.getElementById('ccArqueo').value)||0,
        p_observaciones: document.getElementById('ccObs').value||null,
      }) });
      if(!rc.ok){ const d = await rc.json().catch(()=>({})); throw new Error(d.message || 'No se pudo cerrar la caja.'); }
      formBox.innerHTML = '';
      renderCajaStatus();
    }catch(e){
      ok.disabled=false; ok.textContent='🔒 Confirmar cierre';
      err.textContent = e.message||e;
    }
  };
}

// Rol del usuario logueado (vendedor|gerente), consultado una sola vez por
// sesión — habilita la opción de editar una venta en "Ventas de hoy".
let miRolCache = null;
async function cargarMiRol(){
  if(miRolCache) return miRolCache;
  try{
    const r = await sbAuthed('/rest/v1/admins?select=rol');
    const rows = r.ok ? await r.json() : [];
    miRolCache = (rows[0] && rows[0].rol) || 'vendedor';
  }catch(e){ miRolCache = 'vendedor'; }
  return miRolCache;
}

// Local al que está limitado este usuario (null = sin restricción, puede
// operar en cualquiera de los dos). Los usuarios "camerino"/"giustozzi" solo
// pueden cargar stock/vender/facturar en su propio local — pero la vista de
// stock del catálogo principal sigue mostrando siempre los dos locales.
let miLocalAsignadoCache = undefined;
async function cargarMiLocalAsignado(){
  if(miLocalAsignadoCache !== undefined) return miLocalAsignadoCache;
  try{
    const r = await sbAuthed('/rest/v1/admins?select=local_asignado');
    const rows = r.ok ? await r.json() : [];
    miLocalAsignadoCache = (rows[0] && rows[0].local_asignado) || null;
  }catch(e){ miLocalAsignadoCache = null; }
  return miLocalAsignadoCache;
}

// Aplica la restricción de local a los botones Camerino/Giustozzi de Cargar y
// Vender: si el usuario tiene un local asignado, fuerza ese local y deshabilita
// el botón del otro.
async function aplicarRestriccionLocal(bC, bG){
  const asignado = await cargarMiLocalAsignado();
  if(!asignado) return;
  if(getLS('stock_local','camerino') !== asignado) setLS('stock_local', asignado);
  const otro = asignado==='camerino' ? bG : bC;
  otro.disabled = true;
  otro.title = `Tu usuario solo puede operar en ${stLocalNombre(asignado)}.`;
  otro.style.opacity = '0.5';
  otro.style.cursor = 'not-allowed';
}
