    <div class="scat">Sesión: ${esc(mostrarUsuario(sbSession.email))} · <a href="#" id="stLogout" style="color:var(--accent)">salir</a></div>
    <div class="scat">Compartidos entre Camerino y Giustozzi — cualquier usuario ve el panorama completo.</div>
    <div class="st-grid st-grid-3">
      <div class="st-col-left">
        <button class="addcart" id="ccNuevoBtn" style="margin-bottom:8px">➕ Nuevo cliente</button>
        <div class="label">Buscar cliente</div>
        <input id="ccBuscarInput" class="search" placeholder="Nombre, teléfono o DNI…" autocomplete="off">
        <div id="ccResultados"></div>
      </div>
      <div class="st-col-right" id="ccDetalle">
        <div class="note">Buscá y elegí un cliente, o creá uno nuevo.</div>
      </div>
      <div class="st-col-dia" id="ccConSaldo"></div>
    </div>`;
  wireNavIcons(sheet);
  document.getElementById('stClose').onclick = ()=> stCerrar(false);
  document.getElementById('stLogout').onclick = (e)=>{ e.preventDefault();
    sbSession=null; setLS('sb_session', null); miRolCache=null; miLocalAsignadoCache=undefined; drawClientes(); };
  document.getElementById('ccNuevoBtn').onclick = ()=> armarFormCliente(document.getElementById('ccDetalle'), null);
  const buscarInput = document.getElementById('ccBuscarInput');
  const resultadosEl = document.getElementById('ccResultados');
  makeClearable(buscarInput);
  let t;
  buscarInput.addEventListener('input', ()=>{
    clearTimeout(t);
    t = setTimeout(async ()=>{
      const q = buscarInput.value.trim();
      if(q.length<2){ resultadosEl.innerHTML=''; return; }
      resultadosEl.innerHTML = '<div class="note">Buscando…</div>';
      try{
        const r = await sbAuthed(`/rest/v1/clientes?select=id,nombre,telefono,etiqueta,dni&or=(nombre.ilike.*${encodeURIComponent(q)}*,telefono.ilike.*${encodeURIComponent(q)}*,dni.ilike.*${encodeURIComponent(q)}*)&limit=10`);
        const rows = r.ok ? await r.json() : [];
        resultadosEl.innerHTML = rows.length ? rows.map((c,i)=>`
          <div class="lista" data-i="${i}" style="margin-top:4px; cursor:pointer; text-align:left">
            <div class="l">${esc(c.nombre||'(sin nombre)')}${c.etiqueta?` · <span style="text-transform:none">${esc(c.etiqueta)}</span>`:''}</div>
            <div class="v" style="font-size:13px">${esc(c.telefono||'sin tel')}${c.dni?' · DNI '+esc(c.dni):''}</div>
          </div>`).join('') : '<div class="note">Sin resultados.</div>';
        [...resultadosEl.querySelectorAll('[data-i]')].forEach(el=> el.onclick=()=> mostrarDetalleCliente({id: rows[Number(el.dataset.i)].id}));
      }catch(e){ resultadosEl.innerHTML = '<div class="note">Error al buscar.</div>'; }
    }, 300);
  });
  renderClientesConSaldo();
}

async function renderClientesConSaldo(){
  const box = document.getElementById('ccConSaldo');
  if(!box) return;
  box.innerHTML = `<div class="label">⚠ Con saldo pendiente</div><div class="note">Cargando…</div>`;
  try{
    const r = await sbAuthed(`/rest/v1/v_cuenta_corriente_saldo?saldo=gt.0&order=ultimo_movimiento.asc&select=cliente_id,nombre,telefono,saldo,ultimo_movimiento&limit=50`);
    const rows = r.ok ? await r.json() : [];
    const ahora = Date.now();
    box.innerHTML = `
      <div class="label">⚠ Con saldo pendiente (${rows.length})</div>
      <div class="note">Ordenados por más atrasados primero.</div>
      ${rows.length ? rows.map((r,i)=>{
        const dias = r.ultimo_movimiento ? Math.floor((ahora - new Date(r.ultimo_movimiento).getTime())/86400000) : null;
        const urgente = dias!=null && dias>=30;
        return `
        <div class="lista" data-i="${i}" style="margin-top:6px; cursor:pointer; text-align:left; ${urgente?'border:1px solid var(--warn)':''}">
          <div style="display:flex; justify-content:space-between; gap:8px">
            <span class="l">${esc(r.nombre||'(sin nombre)')}${urgente?' ⚠':''}</span>
            <span class="v" style="font-size:15px">${money(r.saldo)}</span>
          </div>
          ${dias!=null ? `<div class="note" style="margin-top:2px">Sin movimientos hace ${dias} día${dias===1?'':'s'}</div>` : ''}
        </div>`;
      }).join('') : '<div class="note">Nadie tiene saldo pendiente ahora mismo.</div>'}`;
    [...box.querySelectorAll('[data-i]')].forEach(el=> el.onclick=()=> mostrarDetalleCliente({id: rows[Number(el.dataset.i)].cliente_id}));
  }catch(e){ box.innerHTML = `<div class="note">No se pudo cargar.</div>`; }
}

// Formulario de alta/edición de cliente. cliente=null para uno nuevo.
function armarFormCliente(box, cliente){
  const esEdit = !!cliente;
  box.innerHTML = `
    <div class="label">${esEdit?'✏️ Editar cliente':'➕ Nuevo cliente'}</div>
    <div class="label" style="margin-top:8px">Nombre</div>
    <input id="cfNombre" class="search" value="${esEdit?esc(cliente.nombre||''):''}">
    <div class="label">Teléfono</div>
    <input id="cfTelefono" class="search" placeholder="con código de área" value="${esEdit?esc(cliente.telefono||''):''}">
    <div class="label">DNI</div>
    <input id="cfDni" class="search" inputmode="numeric" placeholder="ej. 30123456" value="${esEdit?esc(cliente.dni||''):''}">
    <div class="label">Email</div>
    <input id="cfEmail" class="search" type="email" value="${esEdit?esc(cliente.email||''):''}">
    <div class="label">CUIT (para Factura A)</div>
    <input id="cfCuit" class="search" inputmode="numeric" value="${esEdit?esc(cliente.cuit||''):''}">
    <div class="label">Dirección</div>
    <input id="cfDireccion" class="search" placeholder="Calle, número, ciudad" value="${esEdit?esc(cliente.direccion||''):''}">
    <div class="label">Instagram</div>
    <input id="cfInstagram" class="search" placeholder="@usuario (opcional)" value="${esEdit?esc(cliente.instagram||''):''}">
    <div class="label">Facebook</div>
    <input id="cfFacebook" class="search" placeholder="usuario o nombre de perfil (opcional)" value="${esEdit?esc(cliente.facebook||''):''}">
    <div class="label">Fecha de nacimiento</div>
    <input id="cfNacimiento" class="search" type="date" value="${esEdit&&cliente.fecha_nacimiento?cliente.fecha_nacimiento:''}">
    <div class="label">Etiqueta</div>
    <input id="cfEtiqueta" class="search" placeholder="ej. VIP, mayorista…" value="${esEdit?esc(cliente.etiqueta||''):''}">
    <div class="label">Notas</div>
    <textarea id="cfNotas" class="search" style="min-height:60px">${esEdit?esc(cliente.notas||''):''}</textarea>
    <button class="addcart" id="cfOk" style="margin-top:8px">💾 ${esEdit?'Guardar cambios':'Crear cliente'}</button>
    <button class="fbtn" id="cfCancelar" style="width:100%; margin-top:6px">Cancelar</button>
    <div class="note" id="cfErr"></div>`;
  document.getElementById('cfCancelar').onclick = ()=>{ esEdit ? mostrarDetalleCliente(cliente) : box.innerHTML=''; };
  document.getElementById('cfOk').onclick = async ()=>{
    const err = document.getElementById('cfErr');
    const ok = document.getElementById('cfOk');
    const nombre = document.getElementById('cfNombre').value.trim();
    if(!nombre){ err.textContent='Falta el nombre.'; return; }
    const body = {
      nombre,
      telefono: document.getElementById('cfTelefono').value.trim()||null,
      dni: document.getElementById('cfDni').value.trim()||null,
      email: document.getElementById('cfEmail').value.trim()||null,
      cuit: document.getElementById('cfCuit').value.trim()||null,
      direccion: document.getElementById('cfDireccion').value.trim()||null,
      instagram: document.getElementById('cfInstagram').value.trim()||null,
      facebook: document.getElementById('cfFacebook').value.trim()||null,
      fecha_nacimiento: document.getElementById('cfNacimiento').value||null,
      etiqueta: document.getElementById('cfEtiqueta').value.trim()||null,
      notas: document.getElementById('cfNotas').value.trim()||null,
    };
    err.textContent=''; ok.disabled=true; ok.textContent='Guardando…';
    try{
      let clienteId = esEdit ? cliente.id : null;
      const r = esEdit
        ? await sbAuthed(`/rest/v1/clientes?id=eq.${cliente.id}`, { method:'PATCH', body: JSON.stringify(body) })
        : await sbAuthed('/rest/v1/clientes', { method:'POST', headers:{Prefer:'return=representation'}, body: JSON.stringify(body) });
      if(!r.ok){ const d = await r.json().catch(()=>({})); throw new Error(d.message || 'No se pudo guardar.'); }
      if(!esEdit){ const rows = await r.json().catch(()=>null); clienteId = rows && rows[0] && rows[0].id; }
      renderClientesConSaldo();
      mostrarDetalleCliente({id: clienteId});
    }catch(e){
      ok.disabled=false; ok.textContent = esEdit?'💾 Guardar cambios':'💾 Crear cliente';
      err.textContent = e.message||e;
    }
  };
}

// Popup genérico chico (ej. detalle de la compra que originó un cargo en la
// cuenta corriente) — mismo patrón visual overlay+sheet que el resto de la
// app, pero sin ocupar toda la pantalla ni pisar el historial de navegación.
function abrirPopup(html){
  document.getElementById('sheetPopup').innerHTML = html;
  document.getElementById('ovPopup').classList.add('open');
}
function cerrarPopup(){ document.getElementById('ovPopup').classList.remove('open'); }
document.getElementById('ovPopup').addEventListener('click', e=>{ if(e.target.id==='ovPopup') cerrarPopup(); });

async function mostrarDetalleCompraDeCargo(ventaId){
  abrirPopup('<div class="note">Cargando…</div>');
  try{
    const r = await sbAuthed(`/rest/v1/ventas?id=eq.${ventaId}&select=*`);
    const rows = r.ok ? await r.json() : [];
    const v = rows[0];
    if(!v){ abrirPopup('<div class="note">No se encontró la venta.</div><button class="fbtn" id="ppCerrar" style="width:100%; margin-top:8px">Cerrar</button>'); document.getElementById('ppCerrar').onclick = cerrarPopup; return; }
    const fecha = v.created_at ? new Date(v.created_at).toLocaleString('es-AR') : '';
    const items = (v.items||[]);
    abrirPopup(`
      <div style="display:flex; justify-content:space-between; align-items:center">
        <div class="label" style="margin:0">🧾 Detalle de la compra</div>
        <button class="fbtn" id="ppCerrar">✕</button>
      </div>
      <div class="note" style="margin-top:6px">${esc(fecha)} · ${esc(stLocalNombre(v.local))}</div>
      ${items.length ? items.map(it=>`
        <div class="lista" style="margin-top:6px; text-align:left">
          <div class="l">${esc(it.nombre||it.codigo||'')}</div>
          <div class="v" style="font-size:14px">${esc(it.codigo||'')}${it.talle?` · ${esc(it.talle)}`:''}${it.color?` · ${esc(it.color)}`:''} — ${money(it.precio)}</div>
        </div>`).join('') : '<div class="note">Sin detalle de items para esta venta.</div>'}
      <div class="lista" style="margin-top:8px; display:flex; align-items:center; justify-content:space-between; text-align:left; padding:10px 14px">
        <div class="l" style="margin:0">Total</div>
        <div class="v" style="font-size:18px; margin:0">${money(v.total)}</div>
      </div>
      <div class="note" style="margin-top:4px">${mediosDePagoVenta(v)}</div>`);
    document.getElementById('ppCerrar').onclick = cerrarPopup;
  }catch(e){
    abrirPopup('<div class="note">No se pudo cargar el detalle.</div><button class="fbtn" id="ppCerrar" style="width:100%; margin-top:8px">Cerrar</button>');
    document.getElementById('ppCerrar').onclick = cerrarPopup;
  }
}

async function mostrarDetalleCliente(clienteParcial){
  const box = document.getElementById('ccDetalle');
  if(!box || !clienteParcial) return;
  box.innerHTML = `<div class="note">Cargando…</div>`;
  try{
    const [rCliente, rSaldo, rSaldoLocal, rMovs, rCompras] = await Promise.all([
      sbAuthed(`/rest/v1/clientes?id=eq.${clienteParcial.id}&select=*`),
      sbAuthed(`/rest/v1/v_cuenta_corriente_saldo?cliente_id=eq.${clienteParcial.id}&select=saldo`),
      sbAuthed(`/rest/v1/v_cuenta_corriente_saldo_local?cliente_id=eq.${clienteParcial.id}&select=local,saldo`),
      sbAuthed(`/rest/v1/cuenta_corriente_movimientos?cliente_id=eq.${clienteParcial.id}&order=created_at.desc&limit=30&select=*`),
      sbAuthed(`/rest/v1/ventas?cliente_id=eq.${clienteParcial.id}&order=created_at.desc&select=id,total,local,created_at`),
    ]);
    const clienteRows = rCliente.ok ? await rCliente.json() : [];
    const cliente = clienteRows[0] || clienteParcial;
    const saldoRows = rSaldo.ok ? await rSaldo.json() : [];
    const saldo = (saldoRows[0] && Number(saldoRows[0].saldo)) || 0;
    const saldoLocalRows = (rSaldoLocal.ok ? await rSaldoLocal.json() : []).filter(r=> Number(r.saldo)!==0);
    const movs = rMovs.ok ? await rMovs.json() : [];
    const compras = rCompras.ok ? await rCompras.json() : [];
    const totalGastado = compras.reduce((a,v)=> a+Number(v.total||0), 0);

    let cumpleHtml = '';
    if(cliente.fecha_nacimiento){

      cumpleHtml = `<div class="note" style="margin-top:2px">🎂 ${String(partes[2]).padStart(2,'0')}/${String(partes[1]).padStart(2,'0')}${esHoy?' · 🎉 ¡Es hoy!':''}</div>`;

        <a href="${cliente.facebook ? 'https://www.facebook.com/'+encodeURIComponent(cliente.facebook) : 'https://www.facebook.com/search/people/?q='+nombreEnc}" target="_blank" rel="noopener" class="fbtn" style="text-decoration:none; flex:1; text-align:center">📘 Facebook</a>

      ${cumpleHtml}

      ${redesHtml}
      ${mapsHtml}

      <div class="lista" style="margin-top:10px; display:flex; align-items:center; justify-content:space-between; text-align:left; padding:10px 14px">
        <div class="l" style="margin:0">Saldo actual (los 2 locales)</div>

    if(recordarBtn) recordarBtn.onclick = ()=>{
      const msg = `Hola ${cliente.nombre||''}! Te escribimos de ${stLocalNombre(stLocal())} para recordarte que tenés un saldo pendiente de ${money(saldo)}. Cualquier consulta, ¡estamos para ayudarte! 😊`;
      const tel = cliente.telefono || prompt('Este cliente no tiene teléfono cargado. Ingresalo para enviar el recordatorio:');
      if(tel) window.open(`https://wa.me/${telParaWA(tel)}?text=${encodeURIComponent(msg)}`, '_blank');
    };
    const CC_CAMPOS_PAGO = ['ccPgContado','ccPgTransf','ccPgTDeb','ccPgTCred'];
    const ccCuotasSel = ()=>{ const el=document.getElementById('ccPgTCredCuotas'); return el ? Number(el.value)||1 : 1; };
    const ccMontoBaseTCred = ()=>{ const el=document.getElementById('ccPgTCred'); return el ? Number(el.value)||0 : 0; };
    const ccMontoFinalTCred = ()=> ccMontoBaseTCred() * factorCuotas(ccCuotasSel());
    const ccRecalcInfo = ()=>{
      const recargoEl = document.getElementById('ccPgRecargoInfo');
      if(recargoEl){
        const n = ccCuotasSel(), base = ccMontoBaseTCred(), final = ccMontoFinalTCred();
        recargoEl.textContent = base>0 && n>1
          ? (final>base ? `Con ${n} cuotas: ${money(final)} (recargo +${money(final-base)})` : `${n} cuotas sin interés: ${money(final)}`)
          : '';
      }
      const totalInfoEl = document.getElementById('ccPgTotalInfo');
      if(totalInfoEl){
        const contado = Number(document.getElementById('ccPgContado').value)||0;
        const transf = Number(document.getElementById('ccPgTransf').value)||0;
        const tdeb = Number(document.getElementById('ccPgTDeb').value)||0;
        const totalPago = contado + transf + tdeb + ccMontoFinalTCred();
        totalInfoEl.textContent = totalPago>0 ? `Total a registrar: ${money(totalPago)}${totalPago>saldo?' — más que el saldo pendiente':''}` : '';
      }
    };
    CC_CAMPOS_PAGO.forEach(id=>{ const el=document.getElementById(id); if(el) el.addEventListener('input', ccRecalcInfo); });
    const ccCuotasEl = document.getElementById('ccPgTCredCuotas');
    if(ccCuotasEl) ccCuotasEl.addEventListener('change', ccRecalcInfo);
    [...document.querySelectorAll('[data-cc-usar-total]')].forEach(b=> b.onclick=()=>{
      const campo = b.dataset.ccUsarTotal;
      CC_CAMPOS_PAGO.forEach(id=>{ const el=document.getElementById(id); if(el) el.value = id===campo ? saldo : 0; });
      ccRecalcInfo();
    });
    const pagoOk = document.getElementById('ccPagoOk');
    if(pagoOk) pagoOk.onclick = async ()=>{
      const err = document.getElementById('ccPagoErr');
      const localSel = stLocal();
      const pagoContado = Number(document.getElementById('ccPgContado').value)||0;
      const pagoTransf = Number(document.getElementById('ccPgTransf').value)||0;
      const transfAlias = document.getElementById('ccPgTransfAlias').value||null;
      const pagoTDeb = Number(document.getElementById('ccPgTDeb').value)||0;
      const cuotasTCred = ccCuotasSel();
      const recargoPct = CUOTAS_INT.includes(cuotasTCred) ? Number((tasaMensual*cuotasTCred).toFixed(2)) : 0;
      const pagoTCred = ccMontoFinalTCred();
      const nota = document.getElementById('ccPagoNota').value||null;
      if(!(pagoContado+pagoTransf+pagoTDeb+pagoTCred>0)){ err.textContent='Ingresá un monto mayor a 0 en algún medio de pago.'; return; }
      if(pagoTransf>0 && !transfAlias){ err.textContent='Elegí a qué alias se transfirió.'; return; }
      err.textContent=''; pagoOk.disabled = true; pagoOk.textContent = 'Guardando…';
      try{
        const r = await sbAuthed('/rest/v1/rpc/registrar_pago_cuenta_corriente', { method:'POST', body: JSON.stringify({
          p_cliente_id: cliente.id, p_local: localSel,
          p_pago_contado: pagoContado, p_pago_transferencia: pagoTransf, p_transferencia_alias: transfAlias,
          p_pago_tarjeta_debito: pagoTDeb, p_pago_tarjeta_credito: pagoTCred,
          p_tarjeta_credito_cuotas: cuotasTCred>1?cuotasTCred:null, p_tarjeta_credito_recargo_pct: recargoPct||null,
          p_nota: nota,
        }) });
        if(!r.ok){ const d = await r.json().catch(()=>({})); throw new Error(d.message || 'No se pudo registrar el pago.'); }
        mostrarDetalleCliente(cliente);
        renderClientesConSaldo();
      }catch(e){ pagoOk.disabled=false; pagoOk.textContent='💰 Registrar pago'; err.textContent = e.message||e; }
    };
  }catch(e){ box.innerHTML = `<div class="note">No se pudo cargar la cuenta del cliente.</div>`; }
}

// Cualquier admin puede enviar stock (desde su propio local, si está
// restringido) y confirmar/cancelar recepciones de su local. El gerente,
// sin restricción, ve y puede operar los dos locales, y además tiene a mano
// el traspaso directo (sin paso de confirmación) para cuando mueve la
// mercadería él mismo entre los dos negocios.
function armarTraspasos(body, rol, localAsignado){
  body.innerHTML = `
    ${localAsignado ? `<div class="note">Tu usuario envía desde <b>${esc(stLocalNombre(localAsignado))}</b> y confirma lo que llega ahí.</div>` : ''}
    <div class="st-grid st-grid-3">
      <div class="st-col-left">
        <div class="label">📤 Buscar artículo para enviar</div>
        <input id="tsBuscarInput" class="search" placeholder="Código o nombre…" autocomplete="off">
        <div id="tsResultados"></div>
        <div id="tsDetalle" style="margin-top:8px">
          <div class="note">Buscá un artículo para ver su stock en cada local.</div>
        </div>
      </div>
      <div class="st-col-right" id="tsPendientes"></div>
      <div class="st-col-dia" id="tsHistorial"></div>
    </div>`;
  const buscarInput = document.getElementById('tsBuscarInput');
  const resultadosEl = document.getElementById('tsResultados');
  buscarInput.addEventListener('input', ()=>{
    const q = norm(buscarInput.value.trim());
    if(q.length<2){ resultadosEl.innerHTML=''; return; }
    const terms = q.split(/\s+/).filter(Boolean);
    const encontrados = PRODS.filter(p=>{
      const hay = norm(p.codigo+' '+p.nombre+' '+(p.categoria||''));
      return terms.every(t=>hay.includes(t));
    }).slice(0,8);
    resultadosEl.innerHTML = encontrados.length ? encontrados.map((p,i)=>`
      <div class="lista" data-i="${i}" style="margin-top:4px; cursor:pointer; text-align:left">
        <div class="l">${esc(p.codigo)} · ${esc(p.categoria||'')}</div>
        <div class="v" style="font-size:15px">${esc(p.nombre)}</div>
      </div>`).join('') : '<div class="note">Sin resultados.</div>';
    [...resultadosEl.querySelectorAll('[data-i]')].forEach(el=> el.onclick=()=> armarDetalleTraspaso(encontrados[Number(el.dataset.i)], localAsignado, rol));
  });
  renderPendientesTraspaso(localAsignado);
  renderHistorialTraspasos();
}

function armarDetalleTraspaso(p, localAsignado, rol){
  const box = document.getElementById('tsDetalle');
  let talleIdx = 0;
  function talleColorOpciones(){
    const t = p.talles[talleIdx];
    const colores = (t.stock||[]).length ? t.stock : [{color:'Único', camerino:0, giustozzi:0}];
    return {t, colores};
  }
  function render(){
    const {t, colores} = talleColorOpciones();
    box.innerHTML = `
      <div class="label">${esc(p.nombre)}</div>
      <div class="note">${esc(p.codigo)}</div>
      ${p.talles.length>1 ? `
        <div class="label" style="margin-top:8px">Talle</div>
        <div class="talles">${p.talles.map((x,i)=>`<button class="talle ${i===talleIdx?'sel':''}" data-ti="${i}">${esc(x.talle)}</button>`).join('')}</div>` : ''}
      <div class="label" style="margin-top:8px">Color / stock actual</div>
      ${colores.map((c,i)=>`
        <div class="lista" data-ci="${i}" style="margin-top:6px; cursor:pointer; text-align:left">
          <div class="l">${esc(c.color||'Único')}</div>
          <div class="v" style="font-size:15px">Camerino ${Number(c.camerino)||0} · Giustozzi ${Number(c.giustozzi)||0}</div>
        </div>`).join('')}
      <div id="tsFormBox" style="margin-top:8px"></div>`;
    [...box.querySelectorAll('[data-ti]')].forEach(el=> el.onclick=()=>{ talleIdx = Number(el.dataset.ti); render(); });
    [...box.querySelectorAll('[data-ci]')].forEach(el=> el.onclick=()=> armarFormTraspaso(box.querySelector('#tsFormBox'), p, t.talle, colores[Number(el.dataset.ci)], localAsignado, rol));
  }
  render();
}

function armarFormTraspaso(formBox, p, talle, colorObj, localAsignado, rol){
  const color = colorObj.color || 'Único';
  const cam = Number(colorObj.camerino)||0, giu = Number(colorObj.giustozzi)||0;
  let dir = localAsignado==='giustozzi' ? 'gc' : 'cg';   // por defecto, el propio local como origen
  const direccionHtml = localAsignado
    ? `<div class="note">Enviando: <b>${esc(stLocalNombre(localAsignado))} → ${esc(stLocalNombre(localAsignado==='camerino'?'giustozzi':'camerino'))}</b></div>`
    : `<div class="talles">
        <button class="talle ${dir==='cg'?'sel':''}" data-dir="cg">Camerino → Giustozzi</button>
        <button class="talle ${dir==='gc'?'sel':''}" data-dir="gc">Giustozzi → Camerino</button>
      </div>`;
  formBox.innerHTML = `
    <div class="label">Enviar "${esc(color)}"</div>
    ${direccionHtml}
    <div class="note" id="tsDisponible" style="margin-top:4px">Disponible en ${esc(stLocalNombre(dir==='cg'?'camerino':'giustozzi'))}: ${dir==='cg'?cam:giu}</div>
    <input id="tsCantidad" class="search" type="number" min="1" placeholder="Cantidad" style="margin-top:6px">
    <button class="addcart" id="tsOk" style="margin-top:8px">📤 Enviar</button>
    <div class="note" id="tsErr"></div>
    ${rol==='gerente' ? `<button class="fbtn" id="tsDirecto" style="width:100%; margin-top:10px">⚡ Traspaso directo, sin esperar confirmación</button>` : ''}`;
  const disponibleEl = formBox.querySelector('#tsDisponible');
  if(!localAsignado){
    [...formBox.querySelectorAll('[data-dir]')].forEach(b=> b.onclick=()=>{
      dir = b.dataset.dir;
      [...formBox.querySelectorAll('[data-dir]')].forEach(x=>x.classList.remove('sel'));
      b.classList.add('sel');
      disponibleEl.textContent = `Disponible en ${stLocalNombre(dir==='cg'?'camerino':'giustozzi')}: ${dir==='cg'?cam:giu}`;
    });
  }
  formBox.querySelector('#tsOk').onclick = async ()=>{
    const err = formBox.querySelector('#tsErr');
    const ok = formBox.querySelector('#tsOk');
    const cantidad = Number(formBox.querySelector('#tsCantidad').value)||0;
    if(!(cantidad>0)){ err.textContent='Ingresá una cantidad mayor a 0.'; return; }
    const origen = dir==='cg' ? 'camerino' : 'giustozzi';
    const destino = dir==='cg' ? 'giustozzi' : 'camerino';
    err.textContent=''; ok.disabled=true; ok.textContent='Enviando…';
    try{
      const r = await sbAuthed('/rest/v1/rpc/iniciar_traspaso_stock', { method:'POST', body: JSON.stringify({
        p_codigo: p.codigo, p_talle: talle, p_color: color,
        p_local_origen: origen, p_local_destino: destino, p_cantidad: cantidad,
      }) });
      if(!r.ok){ const d = await r.json().catch(()=>({})); throw new Error(d.message || 'No se pudo enviar.'); }
      await cargarCatalogo();
      const pActualizado = BYCOD[p.codigo];
      if(pActualizado) armarDetalleTraspaso(pActualizado, localAsignado, rol);
      renderPendientesTraspaso(localAsignado);
      renderHistorialTraspasos();
    }catch(e){
      ok.disabled=false; ok.textContent='📤 Enviar';
      err.textContent = e.message||e;
    }
  };
  const directoBtn = formBox.querySelector('#tsDirecto');
  if(directoBtn) directoBtn.onclick = async ()=>{
    const err = formBox.querySelector('#tsErr');
    const cantidad = Number(formBox.querySelector('#tsCantidad').value)||0;
    if(!(cantidad>0)){ err.textContent='Ingresá una cantidad mayor a 0.'; return; }
    const origen = dir==='cg' ? 'camerino' : 'giustozzi';
    const destino = dir==='cg' ? 'giustozzi' : 'camerino';
    err.textContent=''; directoBtn.disabled=true; directoBtn.textContent='Traspasando…';
    try{
      const r = await sbAuthed('/rest/v1/rpc/gerente_traspasar_stock', { method:'POST', body: JSON.stringify({
        p_codigo: p.codigo, p_talle: talle, p_color: color,
        p_local_origen: origen, p_local_destino: destino, p_cantidad: cantidad,
      }) });
      if(!r.ok){ const d = await r.json().catch(()=>({})); throw new Error(d.message || 'No se pudo traspasar.'); }
      await cargarCatalogo();
      const pActualizado = BYCOD[p.codigo];
      if(pActualizado) armarDetalleTraspaso(pActualizado, localAsignado, rol);
      renderHistorialTraspasos();
    }catch(e){
      directoBtn.disabled=false; directoBtn.textContent='⚡ Traspaso directo, sin esperar confirmación';
      err.textContent = e.message||e;
    }
  };
}

async function renderPendientesTraspaso(localAsignado){
  const box = document.getElementById('tsPendientes');
  if(!box) return;
  box.innerHTML = `<div class="label">📥 Traspasos en tránsito</div><div class="note">Cargando…</div>`;
  try{
    const r = await sbAuthed(`/rest/v1/traspasos_stock?estado=eq.enviado&order=enviado_at.desc&select=*&limit=30`);
    const rows = r.ok ? await r.json() : [];
    box.innerHTML = `
      <div class="label">📥 Traspasos en tránsito (${rows.length})</div>
      ${rows.length ? rows.map(t=>{
        const puedeConfirmar = !localAsignado || localAsignado===t.local_destino;
        const puedeCancelar = !localAsignado || localAsignado===t.local_origen;
        const hora = t.enviado_at ? new Date(t.enviado_at).toLocaleString('es-AR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) : '';
        return `
        <div class="lista" style="margin-top:6px; text-align:left">
          <div class="l">${esc(t.codigo)} · ${esc(t.talle)}${t.color?' · '+esc(t.color):''} — ${t.cantidad} u.</div>
          <div class="note" style="margin-top:2px">${esc(stLocalNombre(t.local_origen))} → ${esc(stLocalNombre(t.local_destino))} · ${hora}</div>
          ${t.enviado_por ? `<div class="note" style="margin-top:1px">Envió: ${esc(mostrarUsuario(t.enviado_por))}</div>` : ''}
          <div style="display:flex; gap:6px; margin-top:6px">
            ${puedeConfirmar ? `<button class="fbtn" data-accion="confirmar" data-id="${t.id}" style="flex:1">✅ Confirmar</button>` : ''}
            ${puedeCancelar ? `<button class="fbtn" data-accion="cancelar" data-id="${t.id}" style="flex:1">✕ Cancelar</button>` : ''}
          </div>
        </div>`;
      }).join('') : '<div class="note">No hay traspasos esperando confirmación.</div>'}`;
    [...box.querySelectorAll('[data-accion="confirmar"]')].forEach(b=> b.onclick=()=> resolverTraspaso(b, 'confirmar_traspaso_stock', localAsignado));
    [...box.querySelectorAll('[data-accion="cancelar"]')].forEach(b=> b.onclick=()=> resolverTraspaso(b, 'cancelar_traspaso_stock', localAsignado));
  }catch(e){ box.innerHTML = `<div class="note">No se pudo cargar.</div>`; }
}

async function resolverTraspaso(btn, rpcName, localAsignado){
  const id = btn.dataset.id;
  btn.disabled = true; const original = btn.textContent; btn.textContent = '…';
  try{
    const r = await sbAuthed(`/rest/v1/rpc/${rpcName}`, { method:'POST', body: JSON.stringify({ p_traspaso_id: id }) });
    if(!r.ok){ const d = await r.json().catch(()=>({})); throw new Error(d.message || 'No se pudo completar.'); }
    await cargarCatalogo();
    renderPendientesTraspaso(localAsignado);
    renderHistorialTraspasos();
  }catch(e){
    btn.disabled = false; btn.textContent = original;
    alert(e.message||e);
  }
}

async function renderHistorialTraspasos(){
  const box = document.getElementById('tsHistorial');
  if(!box) return;
  box.innerHTML = `<div class="label">🕒 Historial</div><div class="note">Cargando…</div>`;
  try{
    const r = await sbAuthed(`/rest/v1/traspasos_stock?order=enviado_at.desc&limit=30&select=*`);
    const rows = r.ok ? await r.json() : [];
    const estadoTxt = {enviado:'En tránsito', recibido:'Recibido', cancelado:'Cancelado'};
    box.innerHTML = `
      <div class="label">🕒 Historial</div>

        const hora = t.enviado_at ? new Date(t.enviado_at).toLocaleString('es-AR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) : '';

          <div style="display:flex; justify-content:space-between; gap:8px">

          </div>
          <div class="note" style="margin-top:2px">${esc(t.codigo)} · ${esc(t.talle)}${t.color?' · '+esc(t.color):''} — ${t.cantidad} u.</div>
          <div class="note" style="margin-top:1px">${esc(stLocalNombre(t.local_origen))} → ${esc(stLocalNombre(t.local_destino))}</div>
        </div>`;
      }).join('') : '<div class="note">Todavía no se hicieron traspasos.</div>'}`;

  return [
    v.pago_contado>0 && `Efectivo ${money(v.pago_contado)}`,
    v.pago_transferencia>0 && `Transf.${v.transferencia_alias?` (${esc(v.transferencia_alias)})`:''} ${money(v.pago_transferencia)}${v.transferencia_descuento_pct>0?` (−${v.transferencia_descuento_pct}%)`:''}`,
    v.pago_tarjeta_credito>0 && `T.Créd ${money(v.pago_tarjeta_credito)}${v.tarjeta_credito_cuotas>1?` (${v.tarjeta_credito_cuotas} cuotas, +${v.tarjeta_credito_recargo_pct}%)`:''}`,

    v.pago_credito_personal>0 && `Créd.Pers ${money(v.pago_credito_personal)}${v.clientes&&v.clientes.nombre?` (${esc(v.clientes.nombre)})`:''}`,
    v.pago_credito_financiero>0 && `Créd.Fin ${money(v.pago_credito_financiero)}`,
  ].filter(Boolean).join(' · ') || 'Sin medio de pago cargado';
}

// facturada) y botón Editar (solo gerente, y solo si no está facturada).
function armarDetalleVenta(detBox, v, rol, localSel){
  const puedeEditar = rol==='gerente' && !v.facturada;
  detBox.innerHTML = `
    ${!v.facturada ? `<button class="fbtn" type="button" data-accion="facturar" style="width:100%">🧾 Facturar esta venta</button>` : ''}

  const bFacturar = detBox.querySelector('[data-accion="facturar"]');

  if(bEditar) bEditar.onclick = ()=> armarEditarVentaExistente(accionBox, v, localSel);

// Facturar una venta ya guardada (no facturada todavía) — mismo flujo de
// AFIP que al guardar, pero disparado después, desde "Ventas de hoy".
function armarFacturarVentaExistente(box, v, localSel){
  const hoy = new Date();
  const fMin = new Date(hoy); fMin.setDate(fMin.getDate()-5);
  const fMax = new Date(hoy); fMax.setDate(fMax.getDate()+5);
  let tipo = 'B';
  box.innerHTML = `
    <div class="label">Tipo de factura</div>
    <div class="talles">
      <button class="talle sel" data-t="B">Factura B (consumidor final)</button>
      <button class="talle" data-t="A">Factura A (con CUIT)</button>
    </div>
    <div class="label" id="vfCuitLabel" style="display:none">CUIT del cliente</div>
    <input id="vfCuit" class="search" placeholder="ej. 20345678901" inputmode="numeric" style="display:none">
    <div class="label">Fecha del comprobante</div>
    <input id="vfFecha" class="search" type="date" value="${isoLocal(hoy)}" min="${isoLocal(fMin)}" max="${isoLocal(fMax)}">
    <button class="addcart" id="vfOk" style="margin-top:10px">Emitir factura</button>
    <div class="note" id="vfErr"></div>
    <div id="vfResultado"></div>`;
  [...box.querySelectorAll('[data-t]')].forEach(b=> b.onclick=()=>{
    tipo = b.dataset.t;
    [...box.querySelectorAll('[data-t]')].forEach(x=>x.classList.remove('sel'));
    b.classList.add('sel');
    const esA = tipo==='A';
    box.querySelector('#vfCuitLabel').style.display = esA?'':'none';
    box.querySelector('#vfCuit').style.display = esA?'':'none';
  });
  box.querySelector('#vfOk').onclick = async ()=>{
    const err = box.querySelector('#vfErr');
    const ok = box.querySelector('#vfOk');
    const cuit = (box.querySelector('#vfCuit').value||'').replace(/\D/g,'');
    const fecha = box.querySelector('#vfFecha').value;
    if(tipo==='A' && cuit.length!==11){ err.textContent='Para Factura A escribí el CUIT del cliente (11 dígitos).'; return; }
    if(!fecha){ err.textContent='Elegí la fecha del comprobante.'; return; }
    err.textContent=''; ok.disabled=true; ok.textContent='Emitiendo…';
    try{
      const token = await sbToken();
      const r = await fetch(API_FACTURAR, {
        method:'POST',
        headers:{ 'Content-Type':'application/json', Authorization:'Bearer '+token },
        body: JSON.stringify({ local: localSel, tipo, montoTotal: v.total, clienteCuit: cuit, fecha, items: v.items }),
      });
      const d = await r.json().catch(()=>({}));
      if(!r.ok) throw new Error(d.error || 'No se pudo facturar.');
      await sbAuthed(`/rest/v1/ventas?id=eq.${v.id}`, { method:'PATCH', body: JSON.stringify({
        facturada: true, factura_tipo: d.tipo, factura_pto_vta: d.puntoVenta,
        factura_numero: d.numero, factura_cae: d.cae,
      }) });
      box.innerHTML = renderTicket(d, localSel);
      wireTicketButtons(box, d, localSel, null);
      renderResumenDia();
    }catch(e){
      ok.disabled=false; ok.textContent='Emitir factura';
      err.textContent = e.message || 'No se pudo facturar.';
    }
  };
}

// Cuotas con interés en tarjeta de crédito: reutiliza la misma tasa mensual y
// cantidades (6/9/12) configuradas para el carrito de la lista de precios,
// así el recargo que ve el cliente es el mismo en los dos lugares.
function factorCuotas(n){ n = Number(n)||1; return CUOTAS_INT.includes(n) ? 1 + (tasaMensual/100)*n : 1; }
function cuotasSeleccionadas(){ const el=document.getElementById('stCvTCredCuotas'); return el ? Number(el.value)||1 : 1; }
function montoBaseTarjeta(){ const el=document.getElementById('stCvTCred'); return el ? Number(el.value)||0 : 0; }
function montoFinalTarjeta(){ return montoBaseTarjeta() * factorCuotas(cuotasSeleccionadas()); }

// Descuento −5% en transferencia (incentiva ese medio de pago frente a tarjeta).
const DESCUENTO_TRANSFERENCIA = 5;
function descuentoTransferenciaActivo(){ const el=document.getElementById('stCvTransfDescuento'); return !!(el && el.checked); }
function montoBaseTransferencia(){ const el=document.getElementById('stCvTransf'); return el ? Number(el.value)||0 : 0; }
function montoFinalTransferencia(){ return montoBaseTransferencia() * (descuentoTransferenciaActivo() ? (1-DESCUENTO_TRANSFERENCIA/100) : 1); }

// El total de la venta sube por el recargo de financiar en cuotas y baja por
// el descuento de transferencia — los demás medios de pago siguen
// calculándose sobre el precio de contado del carrito.
function totalConRecargo(){
  return stVentaTotal + (montoFinalTarjeta() - montoBaseTarjeta()) + (montoFinalTransferencia() - montoBaseTransferencia());
}

function actualizarTotalVenta(){
  recalcSaldoVenta();
}
function recalcSaldoVenta(){
  const saldoEl = document.getElementById('stCvSaldo');
  if(!saldoEl) return;
  const total = totalConRecargo();
  const totalEl = document.getElementById('stCvTotalDisplay');
  if(totalEl) totalEl.textContent = money(total);
  const recargoEl = document.getElementById('stCvRecargoInfo');
  if(recargoEl){
    const n = cuotasSeleccionadas(), base = montoBaseTarjeta(), final = montoFinalTarjeta();
    recargoEl.textContent = base>0 && n>1
      ? (final>base ? `Con ${n} cuotas: ${money(final)} (recargo +${money(final-base)})` : `${n} cuotas sin interés: ${money(final)}`)
      : '';
  }
  const descEl = document.getElementById('stCvTransfDescuentoInfo');
  if(descEl){
    const baseT = montoBaseTransferencia(), finalT = montoFinalTransferencia();
    descEl.textContent = (descuentoTransferenciaActivo() && baseT>0) ? `Con descuento: ${money(finalT)} (−${money(baseT-finalT)})` : '';
  }
  const pagado = ['stCvContado','stCvTDeb','stCvCPer','stCvCFin']
    .reduce((acc,id)=>{ const el=document.getElementById(id); return acc + (el ? Number(el.value)||0 : 0); }, 0)
    + montoFinalTarjeta() + montoFinalTransferencia();
  const saldo = Math.max(0, total-pagado);
  saldoEl.textContent = money(saldo);
  saldoEl.style.color = saldo>0 ? 'var(--warn)' : '';
  const saldoBox = saldoEl.closest('.lista');
  if(saldoBox) saldoBox.style.border = saldo>0 ? '1px solid var(--warn)' : '';
}

// Cámara continua: no se cierra tras cada lectura — se escanea prenda tras prenda.
async function stCamara(){
  stStopped=false;
  let stream;
  try{
    stream = await navigator.mediaDevices.getUserMedia({video:{
      facingMode:'environment', width:{ideal:1280}, height:{ideal:720},
      advanced:[{focusMode:'continuous'}],
    }});
  }catch(e){
    const box=document.getElementById('stVideoBox');
    if(box) box.innerHTML='<div class="note">Sin cámara: escribí el código a mano abajo.</div>';
    return;
  }
  if(!stOpen){ try{ stream.getTracks().forEach(t=>t.stop()); }catch(e){} return; }
  stStream = stream;
  try{
    const track = stream.getVideoTracks()[0];
    const caps = track.getCapabilities ? track.getCapabilities() : {};
    if(caps.focusMode && caps.focusMode.includes('continuous')){
      await track.applyConstraints({advanced:[{focusMode:'continuous'}]});
    }
  }catch(e){}
  const video=document.createElement('video');
  video.srcObject=stream; video.setAttribute('playsinline','');
  video.style='width:100%; border-radius:12px; display:block';
  const wrap=document.createElement('div'); wrap.style='position:relative; margin-top:6px';
  wrap.appendChild(video);
  const guide=document.createElement('div');
  guide.style='position:absolute; left:9%; right:9%; top:37%; bottom:37%; '+
    'border:2px solid #22c55e; border-radius:8px; pointer-events:none';
  wrap.appendChild(guide);
  const box=document.getElementById('stVideoBox');
  if(!box) return;
  box.innerHTML=''; box.appendChild(wrap);
  video.play();
  if('BarcodeDetector' in window){
    const FORMATOS = ['ean_13','ean_8','upc_a','upc_e','code_128','itf'];
    let detector;
    try{ detector = new BarcodeDetector({formats: FORMATOS}); }
    catch(e){ detector = new BarcodeDetector(); }
    (async function loop(){
      while(!stStopped){
        if(!stBusy && video.readyState >= 2){
          try{
            const codes = await detector.detect(video);
            if(codes.length){
              const digits = (codes[0].rawValue||'').replace(/\D/g,'');
              const now = Date.now();
              // no re-leer la misma prenda apenas confirmada
              if(digits && !(digits===stCoolCode && now<stCoolUntil)){
                stCoolCode=digits; stCoolUntil=now+2500;
                if(stSeccion==='venta') beepScan();
                stProcesar(digits);
              }
            }
          }catch(e){}
        }
        await new Promise(r=>setTimeout(r, 150));
      }
    })();
  }else{
    // Este navegador no tiene BarcodeDetector nativo (típico en iPhone/Safari
    // y en varios de escritorio) — usamos ZXing (JS puro) como respaldo,
    // leyendo cuadro a cuadro del mismo <video> ya abierto.
    const n=document.createElement('div'); n.className='note';
    n.textContent='Cargando lector de códigos…';
    box.appendChild(n);
    loadZXing().then(()=>{
      if(stStopped) return;
      const hints = new Map();
      hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
        ZXing.BarcodeFormat.EAN_13, ZXing.BarcodeFormat.EAN_8,
        ZXing.BarcodeFormat.UPC_A, ZXing.BarcodeFormat.UPC_E,
        ZXing.BarcodeFormat.CODE_128, ZXing.BarcodeFormat.ITF,
      ]);
      const reader = new ZXing.BrowserMultiFormatReader(hints);
      stZXingReader = reader;
      n.textContent = 'Apuntá la cámara al código de barras.';
      reader.decodeFromVideoElementContinuously(video, (result)=>{
        if(stStopped || stBusy || !result) return;
        const digits = (result.getText()||'').replace(/\D/g,'');
        const now = Date.now();
        if(digits && !(digits===stCoolCode && now<stCoolUntil)){
          stCoolCode=digits; stCoolUntil=now+2500;
          if(stSeccion==='venta') beepScan();
          stProcesar(digits);
        }
      });
    }).catch(()=>{
      n.textContent='No se pudo cargar el lector automático (¿sin internet?): escribí el código a mano abajo.';
    });
  }
}

function stProcesar(raw){
  const digits = (raw||'').replace(/\D/g,'');
  if(!digits) return;
  stBusy = true;   // pausa la detección mientras la tarjeta está abierta
  const p = buscarArticuloBarcode(digits);
  if(!p){ stCardNuevo(digits); return; }
  if(stSeccion==='venta') ventaCardConfirm(p, digits);
  else stCardConfirm(p, digits);
}

async function stDeshacer(){
  if(!stLast) return;
  const u=document.getElementById('stUndo');
  try{
    if(u){ u.disabled=true; u.textContent='Deshaciendo…'; }
    const deltaDeshacer = -(stLast.delta || 1);
    const ret = await rpcAjustarStock(stLast.codigo, stLast.talle, stLast.color, stLast.local, deltaDeshacer);
    if(Array.isArray(ret) && stLast.prod) stLast.prod.talles = stMapTalles(ret);
    stCount = Math.max(0, stCount-1);
    const nEl=document.getElementById('stN'); if(nEl) nEl.textContent=stCount;
    toast(`↩ Deshecho: ${deltaDeshacer>0?'+1':'−1'} `+stLast.nombre);
    stLast=null;
    if(u){ u.disabled=false; u.textContent='↩ Deshacer último'; u.style.display='none'; }
    renderHistorialCarga();
  }catch(e){
    if(u){ u.disabled=false; u.textContent='↩ Deshacer último'; }
    if(String(e.message)==='login'){ drawStock(); return; }
    toast(e.message || 'No se pudo deshacer');
  }
}

    <button class="addcart" id="resumenBtn" style="background:var(--accent); color:#03283a">🧾 Compartir resumen</button>
    <button class="cclear" id="clrCart">Vaciar carrito</button>`;

  const tasaEl=document.getElementById('tasaC');
  if(tasaEl) tasaEl.onchange=()=>{ tasaMensual=parseFloat(tasaEl.value)||0; pushConfig('tasa_mensual', tasaMensual); drawCart(); };
  const promoEl=document.getElementById('promoPctC');
  if(promoEl) promoEl.onchange=()=>{ promoSel=parseInt(promoEl.value,10)||20; drawCart(); };
  document.getElementById('clrCart').onclick=()=>{
    if(confirm('¿Vaciar el carrito?')){ CART=[]; saveCart(); drawCart(); }
  };
  document.getElementById('shareBtn').onclick = ()=> shareCart(total, contado, tres, nItems, itemsHtmlText());
  document.getElementById('resumenBtn').onclick = ()=> drawResumen();
}

/* ===== Resumen / factura de compra ===== */
let resumenPago = 'debito';

function formasPago(total){
  const r=tasaMensual/100;
  const contado=total*(1-DESC_CONTADO/100);
  const arr=[
    {k:'debito', label:'Débito', monto:total, detalle:''},
    {k:'transferencia', label:'Transferencia', monto:total, detalle:''},
    {k:'credito1', label:'Crédito 1 pago', monto:total, detalle:''},
    {k:'efectivo', label:'Contado efectivo (−'+DESC_CONTADO+'%)', monto:contado, detalle:''},
    {k:'3sin', label:'3 cuotas sin interés', monto:total, detalle:fmt(total/3)+' x3'}
  ];
  CUOTAS_INT.forEach(n=>{ const c=cuotaDirecta(total,n,r); arr.push({k:'c'+n, label:n+' cuotas con interés', monto:c*n, detalle:fmt(c)+' x'+n}); });
  arr.push({k:'promo', label:'Promo banco −'+promoSel+'%', monto:total*(1-promoSel/100), detalle:''});
  return arr;
}

function drawResumen(){
  const sheet=document.getElementById('sheetCart');
  const total=CART.reduce((s,i)=>s+i.precio*i.qty,0);
  const formas=formasPago(total);
  const fp=formas.find(f=>f.k===resumenPago)||formas[0];
  const fecha=new Date().toLocaleDateString('es-AR');
  const filas=CART.map(i=>`<tr>
      <td style="padding:3px 0;vertical-align:top">${i.qty}</td>
      <td style="padding:3px 6px">${esc(i.nombre)||'(sin nombre)'}<br><span style="color:#777;font-size:11px">${esc(i.cod)||'—'} · talle ${esc(i.talle)}</span></td>
      <td style="padding:3px 0;text-align:right;vertical-align:top;white-space:nowrap">${fmt(i.precio*i.qty)}</td></tr>`).join('');
  sheet.innerHTML=`
    <div class="topbtns"><button class="backbtn" onclick="drawCart()">← Volver al carrito</button></div>
    <h2>🧾 Resumen de compra</h2>
    <div class="label">Forma de pago</div>
    <select id="fpSel" style="width:100%">${formas.map(f=>`<option value="${f.k}" ${f.k===resumenPago?'selected':''}>${f.label} — ${fmt(f.monto)}</option>`).join('')}</select>
    <div id="factura" style="background:#fff;color:#111;padding:18px;border-radius:10px;margin-top:12px;font-family:'Segoe UI',system-ui,sans-serif">
      <div style="text-align:center;margin-bottom:8px">
        <div style="font-size:24px;font-weight:800;letter-spacing:3px">CAMERINO</div>
        <div style="font-size:12px;color:#555">San Jerónimo 2362, Santa Fe</div>
        <div style="font-size:12px;color:#555">Recibo X · ${fecha}</div>
      </div>
      <div style="border-top:1px dashed #bbb;margin:8px 0"></div>
      <table style="width:100%;border-collapse:collapse;font-size:13px">
        <thead><tr style="border-bottom:1px solid #ddd;color:#666;font-size:11px;text-transform:uppercase">
          <th style="text-align:left;padding-bottom:4px">Cant</th><th style="text-align:left;padding-bottom:4px">Producto</th><th style="text-align:right;padding-bottom:4px">Importe</th></tr></thead>
        <tbody>${filas}</tbody>
      </table>
      <div style="border-top:1px dashed #bbb;margin:8px 0"></div>
      <div style="display:flex;justify-content:space-between;font-size:13px"><span style="color:#555">Forma de pago</span><span style="text-align:right">${fp.label}</span></div>
      ${fp.detalle?`<div style="text-align:right;font-size:12px;color:#777">${fp.detalle}</div>`:''}
      <div style="display:flex;justify-content:space-between;align-items:baseline;font-weight:800;font-size:20px;margin-top:8px"><span>TOTAL</span><span>${fmt(fp.monto)}</span></div>
      <div style="text-align:center;font-size:11px;color:#999;margin-top:12px">¡Gracias por su compra!</div>
    </div>
    <button class="addcart" id="resTxt" style="margin-top:12px">📋 Compartir texto</button>
    <button class="addcart" id="resImg" style="background:var(--accent); color:#03283a">🖼 Compartir imagen</button>`;
  document.getElementById('fpSel').onchange=e=>{ resumenPago=e.target.value; drawResumen(); };
  document.getElementById('resTxt').onclick=()=>shareResumenTexto(fp);
  document.getElementById('resImg').onclick=()=>shareResumenImagen();
}

function shareResumenTexto(fp){
  const fecha=new Date().toLocaleDateString('es-AR');
  const lineas=CART.map(i=>`${i.qty}x ${i.nombre||'(sin nombre)'} (talle ${i.talle}) — ${fmt(i.precio*i.qty)}`).join('\n');
  const texto=`CAMERINO\nSan Jerónimo 2362, Santa Fe\nRecibo X · ${fecha}\n\n${lineas}\n\nForma de pago: ${fp.label}${fp.detalle?' ('+fp.detalle+')':''}\nTOTAL: ${fmt(fp.monto)}\n\n¡Gracias por su compra!`;
  if(navigator.share){ navigator.share({title:'Resumen de compra', text:texto}).catch(()=>{}); }
  else if(navigator.clipboard){ navigator.clipboard.writeText(texto).then(()=>alert('Resumen copiado al portapapeles.')); }
  else { alert(texto); }
}

function loadHtml2Canvas(){
  if(window.html2canvas) return Promise.resolve();
  return new Promise((res,rej)=>{
    const s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js';
    s.onload=res; s.onerror=rej; document.head.appendChild(s);
  });
}

async function shareResumenImagen(){
  try{ await loadHtml2Canvas(); }
  catch(e){ alert('No se pudo cargar el generador de imagen (¿sin internet?).'); return; }
  const node=document.getElementById('factura');
  let canvas;
  try{ canvas=await html2canvas(node,{scale:2,backgroundColor:'#ffffff'}); }
  catch(e){ alert('No se pudo generar la imagen.'); return; }
  canvas.toBlob(async blob=>{
    if(!blob){ alert('No se pudo generar la imagen.'); return; }
    const file=new File([blob],'resumen-camerino.png',{type:'image/png'});
    if(navigator.canShare && navigator.canShare({files:[file]})){
      try{ await navigator.share({files:[file], title:'Resumen de compra'}); return; }catch(e){}
    }
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url; a.download='resumen-camerino.png'; a.click();
    setTimeout(()=>URL.revokeObjectURL(url),2000);
  },'image/png');
}

function itemsHtmlText(){
  return CART.map(i=>`• ${i.nombre||'(sin nombre)'} (${i.cod||'—'}, talle ${i.talle}) x${i.qty} = ${fmt(i.precio*i.qty)}`).join('\n');
}

function shareCart(total, contado, tres, nItems, itemsTxt){
  const texto = `🛒 Presupuesto (${nItems} artículo${nItems!==1?'s':''})\n\n${itemsTxt}\n\n`+
    `TOTAL: ${fmt(total)}\n`+
    `Contado efectivo (−${DESC_CONTADO}%): ${fmt(contado)}\n`+
    `3 cuotas sin interés: ${fmt(tres)} c/u`;
  if(navigator.share){
    navigator.share({title:'Presupuesto', text:texto}).catch(()=>{});
  } else if(navigator.clipboard){
    navigator.clipboard.writeText(texto).then(()=>alert('Presupuesto copiado al portapapeles.'));
  } else {
    alert(texto);
  }
}

document.getElementById('sheetCart').addEventListener('click', e=>{
  const q=e.target.closest('[data-q]');
  if(q){
    const i=+q.dataset.i, d=+q.dataset.q;
    CART[i].qty+=d;
    if(CART[i].qty<1) CART.splice(i,1);
    saveCart(); drawCart(); return;
  }
  const del=e.target.closest('[data-del]');
  if(del){ CART.splice(+del.dataset.del,1); saveCart(); drawCart(); }
});

// Interés DIRECTO (simple): recargo total = tasa × n; cuota = precio×(1+tasa×n)/n
function cuotaDirecta(precio,n,r){ return precio*(1+r*n)/n; }

function drawDetail(){
  const p=curProd;
  const t=p.talles[curTalle];
  const base=t.precio;
  const r=tasaMensual/100;
  const contado=base*(1-DESC_CONTADO/100);
  const tres=base/3;
  const fav=isFav(p.codigo);

  const tallesHtml = p.talles.length>1 ? `
    <div class="label">Talle</div>
    <div class="talles">${p.talles.map((x,i)=>
      `<button class="talle ${i===curTalle?'sel':''}" data-t="${i}">${esc(x.talle)}</button>`).join('')}</div>` : '';

  // Stock del talle elegido (solo en modo editor): suma de colores por local.
  const stSum = (t.stock||[]).reduce((a,c)=>({
    cam: a.cam + (Number(c.camerino)||0), giu: a.giu + (Number(c.giustozzi)||0),
  }), {cam:0, giu:0});
  const stockHtml = (isAdmin && (t.stock||[]).length)
    ? `<div class="note" style="margin-top:4px">Stock${p.talles.length>1?' talle '+esc(t.talle):''}:
        <b>${stSum.cam+stSum.giu}</b> (Camerino ${stSum.cam} · Giustozzi ${stSum.giu})</div>` : '';

  // Margen (solo modo editor): costo es un valor por producto, no por talle,
  // así que puede variar el % si el talle elegido tiene otro precio.
  const margenHtml = (isAdmin && p.costo!=null && p.costo>0)
    ? (()=>{ const margen=base-p.costo; const pct=base>0?(margen/base*100):0;
        return `<div class="note" style="margin-top:4px">Costo: ${fmt(p.costo)} · Margen: <b>${fmt(margen)}</b> (${pct.toFixed(1)}%)</div>`; })()
    : (isAdmin ? `<div class="note" style="margin-top:4px">Sin costo cargado (no se puede calcular margen).</div>` : '');

  const cuotasIntHtml = CUOTAS_INT.map(n=>{
    const c=cuotaDirecta(base,n,r);
    const recargo=Math.round(r*n*100);
    return `<div class="row"><div class="a">${n} cuotas<small>+${recargo}% (${tasaMensual}% × ${n})</small></div>
      <div class="b">${fmt(c)}<small>por cuota · total ${fmt(c*n)}</small></div></div>`;
  }).join('');

  const promosHtml = `<div class="row"><div class="a">Promo banco
      <select id="promoPct">${PROMOS.map(d=>
        `<option value="${d}" ${d===promoSel?'selected':''}>−${d}%</option>`).join('')}</select></div>
     <div class="b">${fmt(base*(1-promoSel/100))}</div></div>`;

  document.getElementById('sheet').classList.remove('sheet-wide');
  document.getElementById('sheet').innerHTML = `
    ${navIconsHtml()}
    <div class="topbtns">
      <button class="star ${fav?'on':''}" onclick="toggleFav('${esc(p.codigo)}')" title="Favorito">${fav?'★':'☆'}</button>
      <button class="backbtn" onclick="closeDetail()">← Atrás</button>
    </div>
    <h2>${esc(p.nombre)||'(sin nombre)'}</h2>
    <div class="scod">Código ${esc(p.codigo)||'—'}</div>
    <div class="scat">${esc(p.categoria)}</div>
    ${p.foto_url ? `<img src="${esc(p.foto_url)}" alt="" style="width:100%;max-width:320px;border-radius:10px;margin:10px auto;display:block;">` : ''}
    ${tallesHtml}
    ${stockHtml}
    ${margenHtml}
    <div class="lista">
      <div class="l">DÉBITO / TRANSFERENCIA / CRED 1 PAGO${p.talles.length>1?' · talle '+esc(t.talle):''}</div>
      <div class="v">${fmt(base)}</div>
    </div>
    <button class="addcart" id="addCart" onclick="addToCart()">🛒 Agregar al carrito</button>
    <div class="grid">
      <div class="box green"><div class="t">Contado efectivo</div>
        <div class="p">${fmt(contado)}</div><div class="s">−${DESC_CONTADO}%</div></div>
      <div class="box blue"><div class="t">3 cuotas s/interés</div>
        <div class="p">${fmt(tres)}</div><div class="s">por cuota</div></div>
    </div>
    <div class="label">Cuotas con interés</div>
    ${cuotasIntHtml}
    <div class="label">Promociones bancarias</div>
    ${promosHtml}
    ${isAdmin ? `<div class="cfg">Interés mensual:
      <input id="tasa" type="number" value="${tasaMensual}" min="0" step="0.5"> %</div>
    <div class="note">Cuotas con <b>interés directo</b> (simple):
      recargo = interés mensual × cantidad de cuotas.<br>
      Cambiá el % arriba si tu tasa cambió.</div>` : ''}
    ${isAdmin ? `<div style="display:flex; gap:8px; margin-top:14px">
      <button class="addcart" style="margin:0; flex:1; background:var(--accent); color:#03283a"
        onclick="openAddProduct(curProd)">✏️ Editar</button>
      <button class="addcart" style="margin:0; flex:1; background:#ef4444; color:#fff"
        onclick="borrarProducto('${esc(p.codigo)}')">🗑 Borrar</button>
    </div>` : ''}`;

  wireNavIcons(document.getElementById('sheet'));
  [...document.querySelectorAll('.talle')].forEach(b=>
    b.onclick=()=>{ curTalle=+b.dataset.t; drawDetail(); });
  const tasaEl=document.getElementById('tasa');
  if(tasaEl) tasaEl.onchange=()=>{ tasaMensual=parseFloat(tasaEl.value)||0; pushConfig('tasa_mensual', tasaMensual); drawDetail(); };
  const promoEl=document.getElementById('promoPct');
  if(promoEl) promoEl.onchange=()=>{ promoSel=parseInt(promoEl.value,10)||20; drawDetail(); };
}
</script>
