  }catch(e){ box.innerHTML = `<div class="note">No se pudo cargar.</div>`; }
}

function armarDetalleDevolucion(venta){
  const box = document.getElementById('dvDetalle');
  const items = venta.items || [];
  const itemsNuevos = [];   // prendas que el cliente se lleva a cambio (opcional)
  box.innerHTML = `
    <div class="label">Venta de ${money(venta.total)}</div>
    <div class="note">${venta.created_at ? new Date(venta.created_at).toLocaleString('es-AR') : ''}</div>
    ${venta.facturada ? '<div class="note">🧾 Venta facturada — esta devolución no emite Nota de Crédito, se registra igual.</div>' : ''}
    <div class="label" style="margin-top:8px">Elegí qué productos vuelven</div>
    ${items.length ? items.map((it,i)=>`
      <label class="lista" style="margin-top:6px; text-align:left; display:flex; align-items:center; gap:8px; cursor:pointer">
        <input type="checkbox" class="dvItem" data-i="${i}" style="flex:none; width:auto">
        <span style="flex:1">
          <div class="l">${esc(it.codigo)} ${esc(it.nombre)}${it.talle?` (${esc(it.talle)}${it.color?' · '+esc(it.color):''})`:''}</div>
        </span>
        <span class="v" style="font-size:14px">${money(it.precio)}</span>
      </label>`).join('') : '<div class="note">Esta venta no tiene detalle de items.</div>'}

    <div class="label" style="margin-top:14px">¿Se lleva otra prenda a cambio? (opcional)</div>
    <input id="dvBuscarNueva" class="search" placeholder="Código o nombre de la prenda nueva…" autocomplete="off">
    <div id="dvBuscarNuevaResultados"></div>
    <div id="dvNuevaCard"></div>
    <div id="dvItemsNuevos" style="margin-top:6px"></div>

    <div id="dvMedioBox" style="margin-top:10px">
      <div class="label">Medio de reintegro</div>
      <div class="talles">
        <button class="talle sel" data-medio="efectivo">Efectivo</button>
        <button class="talle" data-medio="transferencia">Transferencia</button>
      </div>
    </div>
    <input id="dvMotivo" class="search" placeholder="Motivo (opcional)" style="margin-top:6px">
    <div class="note" id="dvMontoInfo" style="margin-top:6px">Monto a devolver: $0</div>
    <button class="addcart" id="dvOk" style="margin-top:8px">↩️ Confirmar devolución</button>
    <div class="note" id="dvErr"></div>`;
  let medio = 'efectivo';
  const montoInfo = box.querySelector('#dvMontoInfo');
  const medioBox = box.querySelector('#dvMedioBox');
  const actualizarMonto = ()=>{
    const montoDevuelto = [...box.querySelectorAll('.dvItem:checked')].reduce((acc,el)=> acc + (Number(items[Number(el.dataset.i)].precio)||0), 0);
    const montoNuevo = itemsNuevos.reduce((acc,it)=> acc + (Number(it.precio)||0), 0);
    const diferencia = montoNuevo - montoDevuelto;
    if(diferencia < 0){
      medioBox.style.display = '';
      montoInfo.textContent = `Se reintegran ${money(-diferencia)} al cliente.`;
    } else if(diferencia > 0){
      medioBox.style.display = 'none';
      montoInfo.textContent = `El cliente paga ${money(diferencia)} de diferencia — al confirmar se abre la venta para cobrarla.`;
    } else {
      medioBox.style.display = 'none';
      montoInfo.textContent = montoNuevo>0 ? 'Cambio sin diferencia de precio.' : 'Monto a devolver: $0';
    }
    return diferencia;
  };
  box.querySelectorAll('.dvItem').forEach(cb=> cb.addEventListener('change', actualizarMonto));
  [...box.querySelectorAll('[data-medio]')].forEach(b=> b.onclick=()=>{
    medio = b.dataset.medio;
    [...box.querySelectorAll('[data-medio]')].forEach(x=>x.classList.remove('sel'));
    b.classList.add('sel');
  });

  // Buscador de la prenda nueva (mismo patrón que el buscador manual de Vender).
  const buscarNuevaInput = box.querySelector('#dvBuscarNueva');
  const resultadosNuevaBox = box.querySelector('#dvBuscarNuevaResultados');
  const nuevaCardBox = box.querySelector('#dvNuevaCard');
  makeClearable(buscarNuevaInput);
  buscarNuevaInput.addEventListener('input', ()=>{
    const q = norm(buscarNuevaInput.value.trim());
    if(q.length<2){ resultadosNuevaBox.innerHTML=''; return; }
    const terms = q.split(/\s+/).filter(Boolean);
    const encontrados = PRODS.filter(p=>{
      const hay = norm(p.codigo+' '+p.nombre+' '+(p.categoria||''));
      return terms.every(t=>hay.includes(t));
    }).slice(0,8);
    resultadosNuevaBox.innerHTML = encontrados.length ? encontrados.map((p,i)=>`
      <div class="lista" data-i="${i}" style="margin-top:4px; cursor:pointer; text-align:left">
        <div class="l">${esc(p.codigo)} · ${esc(p.categoria||'')}</div>
        <div class="v" style="font-size:15px">${esc(p.nombre)}</div>
      </div>`).join('') : '<div class="note">Sin resultados.</div>';
    [...resultadosNuevaBox.querySelectorAll('[data-i]')].forEach(el=> el.onclick=()=>{
      const p = encontrados[Number(el.dataset.i)];
      buscarNuevaInput.value=''; resultadosNuevaBox.innerHTML='';
      armarSelectorTalleNueva(p);
    });
  });
  function armarSelectorTalleNueva(p){
    const colores = [...new Set([].concat(...p.talles.map(t=>(t.stock||[]).map(s=>s.color))))].filter(c=>c && c!=='Único').sort();
    let sel = p.talles.length===1 ? 0 : -1;
    nuevaCardBox.innerHTML = `
      <div class="lista" style="margin-top:8px; text-align:left">
        <div class="l">${esc(p.nombre)||'(sin nombre)'} · Código ${esc(p.codigo)}</div>
        <div class="label" style="margin-top:6px">Color</div>
        <input id="dvNuevaColor" class="search" list="dvNuevaColores" placeholder="ej. Negro" value="${colores.length===1?esc(colores[0]):'Único'}" autocomplete="off">
        <datalist id="dvNuevaColores">${colores.map(c=>`<option value="${esc(c)}">`).join('')}</datalist>
        <div class="label" style="margin-top:6px">Talle</div>
        <div class="talles" id="dvNuevaTalles">${p.talles.map((t,i)=>`<button class="talle ${i===sel?'sel':''}" data-i="${i}">${esc(t.talle)}</button>`).join('')}</div>
        <button class="addcart" id="dvNuevaOk" style="margin-top:8px">➕ Agregar prenda</button>
        <button class="fbtn" id="dvNuevaCancel" style="width:100%; margin-top:6px">Cancelar</button>
        <div class="note" id="dvNuevaErr"></div>
      </div>`;
    [...nuevaCardBox.querySelectorAll('#dvNuevaTalles .talle')].forEach(b=> b.onclick=()=>{
      sel = +b.dataset.i;
      [...nuevaCardBox.querySelectorAll('#dvNuevaTalles .talle')].forEach(x=>x.classList.remove('sel'));
      b.classList.add('sel');
    });
    nuevaCardBox.querySelector('#dvNuevaCancel').onclick = ()=>{ nuevaCardBox.innerHTML=''; };
    nuevaCardBox.querySelector('#dvNuevaOk').onclick = ()=>{
      if(sel<0){ nuevaCardBox.querySelector('#dvNuevaErr').textContent='Elegí el talle.'; return; }
      const talle = p.talles[sel].talle;
      const color = (nuevaCardBox.querySelector('#dvNuevaColor').value||'').trim() || 'Único';
      const precio = Number(p.talles[sel].precio)||0;
      itemsNuevos.push({codigo:p.codigo, nombre:p.nombre, talle, color, precio});
      nuevaCardBox.innerHTML = '';
      renderItemsNuevos();
      actualizarMonto();
    };
  }
  function renderItemsNuevos(){
    const elBox = box.querySelector('#dvItemsNuevos');
    elBox.innerHTML = itemsNuevos.map((it,i)=>`
      <div class="lista" style="margin-top:4px; display:flex; justify-content:space-between; align-items:center; gap:8px; text-align:left">
        <div>
          <div class="l">${esc(it.codigo)} ${esc(it.nombre)}</div>
          <div class="v" style="font-size:13px">${esc(it.talle)}${it.color?' · '+esc(it.color):''} · ${money(it.precio)}</div>
        </div>
        <button class="fbtn" data-rm-nueva="${i}" style="flex:none; padding:6px 10px">✕</button>
      </div>`).join('');
    [...elBox.querySelectorAll('[data-rm-nueva]')].forEach(b=> b.onclick=()=>{
      itemsNuevos.splice(Number(b.dataset.rmNueva),1);
      renderItemsNuevos();
      actualizarMonto();
    });
  }

  box.querySelector('#dvOk').onclick = async ()=>{
    const err = box.querySelector('#dvErr');
    const ok = box.querySelector('#dvOk');
    const elegidos = [...box.querySelectorAll('.dvItem:checked')].map(el=> items[Number(el.dataset.i)]);
    if(!elegidos.length){ err.textContent='Elegí al menos un producto.'; return; }
    const diferencia = actualizarMonto();
    if(diferencia < 0 && !medio){ err.textContent='Elegí el medio de reintegro.'; return; }
    err.textContent=''; ok.disabled=true; ok.textContent='Procesando…';
    try{
      const r = await sbAuthed('/rest/v1/rpc/registrar_devolucion', { method:'POST', body: JSON.stringify({
        p_venta_id: venta.id,
        p_items: elegidos.map(it=>({codigo:it.codigo, nombre:it.nombre, talle:it.talle, color:it.color, precio:it.precio})),
        p_items_nuevos: itemsNuevos.map(it=>({codigo:it.codigo, nombre:it.nombre, talle:it.talle, color:it.color, precio:it.precio})),
        p_medio_devolucion: diferencia < 0 ? medio : null,
        p_motivo: box.querySelector('#dvMotivo').value||null,
      }) });
      if(!r.ok){ const d = await r.json().catch(()=>({})); throw new Error(d.message || 'No se pudo registrar la devolución.'); }
      const resultado = await r.json().catch(()=>null);
      const devolucionId = resultado && resultado.id;
      await cargarCatalogo();
      renderVentasDevolucion();
      renderHistorialDevoluciones();
      if(diferencia > 0 && devolucionId){
        const detalle = `Devolvió: ${elegidos.map(it=>`${it.codigo} ${it.nombre}`).join(', ')} · Se llevó: ${itemsNuevos.map(it=>`${it.codigo} ${it.nombre}`).join(', ')}`;
        box.innerHTML = `<div class="note">✓ Cambio registrado. Abriendo la venta para cobrar la diferencia de ${money(diferencia)}…</div>`;
        stVentaItems = [{codigo:null, nombre:'Diferencia por cambio', detalle, talle:'', color:'', precio: diferencia, manual:true}];
        stVentaTotal = diferencia;
        stVentaDevolucionId = devolucionId;
        drawVender();
        const btnUsarTotal = document.querySelector('[data-usar-total="stCvContado"]');
        if(btnUsarTotal) btnUsarTotal.click();
      } else {
        box.innerHTML = `<div class="note">✓ ${diferencia<0 ? `Cambio registrado. Se reintegraron ${money(-diferencia)}.` : 'Devolución registrada.'}</div>`;
      }
    }catch(e){
      ok.disabled=false; ok.textContent='↩️ Confirmar devolución';
      err.textContent = e.message||e;
    }
  };
}

async function renderHistorialDevoluciones(){
  const box = document.getElementById('dvHistorial');
  if(!box) return;
  box.innerHTML = `<div class="label">🕒 Últimas devoluciones</div><div class="note">Cargando…</div>`;
  try{
    const r = await sbAuthed(`/rest/v1/devoluciones?order=created_at.desc&limit=30&select=*`);
    const rows = r.ok ? await r.json() : [];
    box.innerHTML = `
      <div class="label">🕒 Últimas devoluciones</div>
      ${rows.length ? rows.map(d=>{
        const hora = d.created_at ? new Date(d.created_at).toLocaleString('es-AR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) : '';
        const items = (d.items||[]).map(it=> `${esc(it.codigo)} ${esc(it.nombre||'')}`).join(', ');
        const itemsNuevos = (d.items_nuevos||[]).map(it=> `${esc(it.codigo)} ${esc(it.nombre||'')}`).join(', ');
        const diferencia = Number(d.diferencia||0);
        const importeTxt = diferencia < 0 ? `${money(-diferencia)} · ${esc(d.medio_devolucion||'')}`
          : diferencia > 0 ? `${money(diferencia)} a cobrar` : 'sin diferencia';
        return `
        <div class="lista" style="margin-top:6px; text-align:left">
          <div style="display:flex; justify-content:space-between; gap:8px">
            <span class="l">${hora}</span>
            <span class="v" style="font-size:14px">${importeTxt}</span>
          </div>
          <div class="note" style="margin-top:2px">${items || '(sin detalle)'}</div>
          ${itemsNuevos ? `<div class="note" style="margin-top:1px">↔️ Se llevó: ${itemsNuevos}</div>` : ''}
          ${d.usuario ? `<div class="note" style="margin-top:1px">${esc(mostrarUsuario(d.usuario))}</div>` : ''}
        </div>`;
      }).join('') : '<div class="note">Todavía no se registraron devoluciones.</div>'}`;

}

async function renderDashboardAsoem(){
  const box = document.getElementById('daBox');
  box.innerHTML = `<div class="note">Cargando ventas ASOEM…</div>`;
  try{
    const r = await sbAuthed(`/rest/v1/ventas?pago_credito_financiero=gt.0&order=fecha.desc,created_at.desc&select=*,clientes(nombre,cuit,telefono)&limit=500`);

    const sinAutorizacion = ventas.filter(v=> !v.asoem_autorizacion).length;
    box.innerHTML = `
      <div class="grid" style="margin-top:10px; grid-template-columns:repeat(auto-fit,minmax(150px,1fr))">
        <div class="box blue"><div class="t">Total financiado</div><div class="p">${money(totalFinanciado)}</div><div class="s">${ventas.length} venta${ventas.length!==1?'s':''}</div></div>

        <div class="box" style="${sinAutorizacion>0?'border-color:var(--warn)':''}"><div class="t">Sin N° de autorización</div><div class="p" style="${sinAutorizacion>0?'color:var(--warn)':''}">${sinAutorizacion}</div><div class="s">a revisar</div></div>
      </div>
      <div class="label" style="margin-top:16px">Ventas financiadas por ASOEM</div>
      <input id="daFiltro" class="search" placeholder="Buscar por cliente, autorización o local…" autocomplete="off" style="margin-bottom:8px">
      <div id="daLista"></div>`;
    const listaEl = document.getElementById('daLista');
    const renderLista = (q)=>{
      const qn = norm(q||'');
      const filtradas = qn ? ventas.filter(v=>{
        const hay = norm((v.clientes&&v.clientes.nombre||'')+' '+(v.asoem_autorizacion||'')+' '+(v.local||''));
        return hay.includes(qn);
      }) : ventas;
      listaEl.innerHTML = filtradas.length ? filtradas.map(v=>{
        const fechaFmt = v.fecha ? v.fecha.split('-').reverse().join('/') : '—';
        const cuotasTxt = v.asoem_cuotas>1
          ? `${v.asoem_cuotas} cuotas${v.asoem_recargo_pct>0?` (+${v.asoem_recargo_pct}%)`:' sin interés'}`
          : '1 pago';
        return `<div class="lista" style="margin-top:6px; text-align:left">
          <div style="display:flex; justify-content:space-between; gap:8px">
            <span class="l">${esc(fechaFmt)} · ${esc(stLocalNombre(v.local))}</span>
            <span class="v" style="font-size:16px">${money(v.pago_credito_financiero)}</span>
          </div>
          <div class="note" style="margin-top:2px">${esc(v.clientes && v.clientes.nombre || 'Sin cliente asociado')}${v.clientes&&v.clientes.cuit?` · ${esc(v.clientes.cuit)}`:''}${v.clientes&&v.clientes.telefono?` · ${esc(v.clientes.telefono)}`:''}</div>
          <div class="note" style="margin-top:1px">${esc(cuotasTxt)} · Autorización: ${v.asoem_autorizacion?esc(v.asoem_autorizacion):'⚠ sin cargar'} · ${v.facturada?'Facturada':'No facturada'}</div>
        </div>`;
      }).join('') : '<div class="note">Sin resultados.</div>';
    };
    renderLista('');
    document.getElementById('daFiltro').addEventListener('input', e=> renderLista(e.target.value));
  }catch(e){
    box.innerHTML = `<div class="note">No se pudo cargar el dashboard: ${esc(e.message||e)}</div>`;
  }
}

// ---- Calendario mensual: quién trabaja cada turno, por día ----
async function renderMesCalendario(){
  const box = document.getElementById('calMesBox');
  if(!box) return;
  box.innerHTML = `<div class="note">Cargando…</div>`;
  const primerDia = new Date(calAnio, calMes, 1);
  const totalDias = new Date(calAnio, calMes+1, 0).getDate();
  const fechaDesde = isoFecha(calAnio, calMes, 1);
  const fechaHasta = isoFecha(calAnio, calMes, totalDias);
  try{
    const [vendedores, turnosRes, feriadosRes] = await Promise.all([
      cargarVendedores(calLocal, true),
      sbAuthed(`/rest/v1/turnos?local=eq.${calLocal}&fecha=gte.${fechaDesde}&fecha=lte.${fechaHasta}&select=*,vendedores(nombre)`),
      sbAuthed(`/rest/v1/feriados?fecha=gte.${fechaDesde}&fecha=lte.${fechaHasta}&select=*`),
    ]);
    const turnos = turnosRes.ok ? await turnosRes.json() : [];
    const feriados = feriadosRes.ok ? await feriadosRes.json() : [];
    const feriadoPorFecha = {}; feriados.forEach(f=> feriadoPorFecha[f.fecha]=f.nombre);
    const turnosPorFecha = {};
    turnos.forEach(t=>{
      turnosPorFecha[t.fecha] = turnosPorFecha[t.fecha] || {manana:[], tarde:[]};
      turnosPorFecha[t.fecha][t.turno].push({id:t.id, vendedorId:t.vendedor_id, nombre:(t.vendedores&&t.vendedores.nombre)||'—'});
    });
    // getDay(): Domingo=0 … Sábado=6 — lo paso a Lunes=0 … Domingo=6.
    const offset = (primerDia.getDay()+6)%7;
    const hoyIso = isoLocal(new Date());
    let celdas = '';
    for(let i=0;i<offset;i++) celdas += `<div class="cal-celda cal-vacia"></div>`;
    for(let d=1; d<=totalDias; d++){
      const fecha = isoFecha(calAnio, calMes, d);
      const feriado = feriadoPorFecha[fecha];
      const t = turnosPorFecha[fecha] || {manana:[], tarde:[]};
      const nombreCorto = n => (n||'').split(' ')[0];
      // El gerente edita cualquier fecha; un vendedor solo hoy en adelante.
      const editable = calPuedeEditar || fecha>=hoyIso;
      const soloLectura = editable ? '' : 'disabled style="cursor:default"';
      const esHoy = fecha===hoyIso;
      celdas += `
        <div class="cal-celda ${feriado?'cal-feriado':''} ${esHoy?'cal-hoy':''}" data-fecha="${fecha}">
          <div class="cal-dia">${esHoy?'📍 ':''}${d}</div>
          ${feriado ? `<div class="cal-feriado-nombre" title="${esc(feriado)}">🎌 ${esc(feriado)}</div>` : ''}
          <button type="button" class="cal-turno" data-turno="manana" title="Turno mañana" ${soloLectura}>M: ${t.manana.length? esc(t.manana.map(x=>nombreCorto(x.nombre)).join(', ')) : '—'}</button>
          <button type="button" class="cal-turno" data-turno="tarde" title="Turno tarde" ${soloLectura}>T: ${t.tarde.length? esc(t.tarde.map(x=>nombreCorto(x.nombre)).join(', ')) : '—'}</button>
        </div>`;
    }
    box.innerHTML = `
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:8px">
        <button class="fbtn" id="calMesAnterior">‹ Anterior</button>
        <div class="label" style="margin:0">${MESES_NOMBRE[calMes]} ${calAnio}</div>
        <button class="fbtn" id="calMesSiguiente">Siguiente ›</button>
      </div>
      <div class="cal-grid cal-grid-head">${DIAS_SEMANA.map(d=>`<div class="cal-celda-head">${d}</div>`).join('')}</div>
      <div class="cal-grid">${celdas}</div>
      ${!vendedores.length ? '<div class="note" style="margin-top:8px">Todavía no hay vendedores cargados en el plantel de este local.</div>' : ''}`;
    document.getElementById('calMesAnterior').onclick = ()=>{ calMes--; if(calMes<0){calMes=11; calAnio--;} renderMesCalendario(); };
    document.getElementById('calMesSiguiente').onclick = ()=>{ calMes++; if(calMes>11){calMes=0; calAnio++;} renderMesCalendario(); };
    [...box.querySelectorAll('.cal-turno')].forEach(b=>{
      if(b.disabled) return;
      const fecha = b.closest('[data-fecha]').dataset.fecha;
      const turno = b.dataset.turno;
      b.onclick = ()=> abrirAsignarTurno(fecha, turno, vendedores, (turnosPorFecha[fecha]||{manana:[],tarde:[]})[turno]);
    });
  }catch(e){
    box.innerHTML = `<div class="note">No se pudo cargar el calendario.</div>`;
  }
}

// Popup para asignar/sacar vendedores de un turno puntual (tocás un chip
// para sumarlo o quitarlo — no hace falta guardar, queda al toque).
function abrirAsignarTurno(fecha, turno, vendedoresActivos, asignadosActuales){
  const fechaFmt = fecha.split('-').reverse().join('/');
  const asignadosIds = new Set((asignadosActuales||[]).map(a=>a.vendedorId));
  abrirPopup(`
    <div style="display:flex; justify-content:space-between; align-items:center">
      <div class="label" style="margin:0">${turno==='manana'?'☀️ Turno mañana':'🌆 Turno tarde'} — ${esc(fechaFmt)}</div>
      <button class="fbtn" id="ppCerrar">✕</button>
    </div>
    ${vendedoresActivos.length ? `
      <div class="talles" style="margin-top:10px">
        ${vendedoresActivos.map(v=>`<button type="button" class="talle ${asignadosIds.has(v.id)?'sel':''}" data-vid="${v.id}">${esc(v.nombre)}</button>`).join('')}
      </div>` : '<div class="note" style="margin-top:8px">No hay vendedores activos cargados en el plantel de este local.</div>'}
    <div class="note" id="calAsigErr" style="margin-top:8px"></div>`);
  [...document.querySelectorAll('#sheetPopup [data-vid]')].forEach(b=>{
    b.onclick = async ()=>{
      const vid = b.dataset.vid;
      const err = document.getElementById('calAsigErr');
      b.disabled = true;
      try{
        if(asignadosIds.has(vid)){
          const actual = (asignadosActuales||[]).find(a=>a.vendedorId===vid);
          await sbAuthed(`/rest/v1/turnos?id=eq.${actual.id}`, { method:'DELETE' });
          asignadosIds.delete(vid);
        } else {
          await sbAuthed('/rest/v1/turnos', { method:'POST', body: JSON.stringify({ local: calLocal, fecha, turno, vendedor_id: vid }) });
          asignadosIds.add(vid);
        }
        b.classList.toggle('sel');
        renderMesCalendario();
      }catch(e){ err.textContent = 'No se pudo actualizar.'; }
      finally{ b.disabled = false; }
    };
  });
  document.getElementById('ppCerrar').onclick = cerrarPopup;
}

  const hastaDefault = isoLocal(hoy);

    </div>

  let localSel = '';

async function cargarRendimiento(local, desde, hasta){
  const box = document.getElementById('rendLista');
  box.innerHTML = '<div class="note">Cargando…</div>';
  try{
    const filtroLocal = local ? `&local=eq.${local}` : '';
    const r = await sbAuthed(`/rest/v1/ventas?fecha=gte.${desde}&fecha=lte.${hasta}${filtroLocal}&select=total,vendedor_id,vendedores(nombre)`);
    if(!r.ok) throw new Error('No se pudieron consultar las ventas.');
    const ventas = await r.json();
    const porVendedor = {};   // vendedor_id (o 'null') -> {nombre, cantidad, total}
    ventas.forEach(v=>{
      const key = v.vendedor_id || 'sin_asignar';
      const nombre = v.vendedor_id ? ((v.vendedores&&v.vendedores.nombre)||'—') : 'Sin vendedor asignado';
      if(!porVendedor[key]) porVendedor[key] = { nombre, cantidad:0, total:0 };
      porVendedor[key].cantidad += 1;
      porVendedor[key].total += Number(v.total)||0;
    });
    const filas = Object.values(porVendedor).sort((a,b)=> b.total-a.total);
    const totalGeneral = ventas.reduce((s,v)=> s+(Number(v.total)||0), 0);
    box.innerHTML = `
      <div class="lista" style="margin-bottom:10px">
        <div class="l">Total del período</div>
        <div class="v" style="font-size:22px">${money(totalGeneral)}</div>
        <div class="note" style="margin-top:2px">${ventas.length} venta${ventas.length!==1?'s':''}</div>
      </div>
      ${filas.length ? filas.map((f,i)=>{
        const promedio = f.cantidad ? f.total/f.cantidad : 0;
        const sinAsignar = f.nombre==='Sin vendedor asignado';
        return `
        <div class="lista" style="margin-top:6px; text-align:left; ${sinAsignar?'opacity:.7':''}">
          <div style="display:flex; justify-content:space-between; align-items:center; gap:8px">
            <span class="l" style="margin:0">${sinAsignar?'':`${i+1}º · `}${esc(f.nombre)}</span>
            <span class="v" style="font-size:17px">${money(f.total)}</span>
          </div>
          <div class="note" style="margin-top:2px">${f.cantidad} venta${f.cantidad!==1?'s':''} · ticket promedio ${money(promedio)}</div>
        </div>`;
      }).join('') : '<div class="note">No hay ventas en este período.</div>'}`;
  }catch(e){
    box.innerHTML = `<div class="note">No se pudo cargar el rendimiento: ${esc(e.message||e)}</div>`;
  }
}

function mediosDePagoVenta(v){
  return [
    v.pago_contado>0 && `Efectivo ${money(v.pago_contado)}${v.contado_descuento_pct>0?` (−${v.contado_descuento_pct}%)`:''}`,
    v.pago_transferencia>0 && `Transf.${v.transferencia_alias?` (${esc(v.transferencia_alias)})`:''} ${money(v.pago_transferencia)}${v.transferencia_descuento_pct>0?` (−${v.transferencia_descuento_pct}%)`:''}`,
    v.pago_tarjeta_credito>0 && `T.Créd ${money(v.pago_tarjeta_credito)}${v.tarjeta_credito_cuotas>1?` (${v.tarjeta_credito_cuotas} cuotas, +${v.tarjeta_credito_recargo_pct}%)`:''}`,
    v.pago_tarjeta_debito>0 && `T.Déb ${money(v.pago_tarjeta_debito)}`,
    v.pago_credito_personal>0 && `Créd.Pers ${money(v.pago_credito_personal)}${v.clientes&&v.clientes.nombre?` (${esc(v.clientes.nombre)})`:''}`,
    v.pago_credito_financiero>0 && `Créd.Fin ASOEM ${money(v.pago_credito_financiero)}${v.asoem_cuotas>1?` (${v.asoem_cuotas} cuotas${v.asoem_recargo_pct>0?`, +${v.asoem_recargo_pct}%`:' sin interés'})`:''}${v.asoem_autorizacion?` · autorización ${esc(v.asoem_autorizacion)}`:''}`,
  ].filter(Boolean).join(' · ') || 'Sin medio de pago cargado';
}

// Visión general del día — reemplaza la planilla de papel: todas las ventas
// de hoy en este local, con sus productos, medios de pago y si se facturaron.
// Cada venta se puede tocar para desplegar el detalle con acciones (facturar
// si no está facturada; editar, solo si el usuario es gerente).
async function renderResumenDia(){
  const box = document.getElementById('stResumenDia');
  if(!box) return;
  box.innerHTML = `<div class="label">📋 Ventas de hoy — ${esc(stLocalNombre(stLocal()))}</div><div class="note">Cargando…</div>`;
  try{
    const hoyIso = isoLocal(new Date());
    const localSel = stLocal();
    const [rol, r] = await Promise.all([
      cargarMiRol(),
      sbAuthed(`/rest/v1/ventas?local=eq.${localSel}&fecha=eq.${hoyIso}&order=created_at.desc&select=*,clientes(nombre)`),
    ]);
    const rows = r.ok ? await r.json() : [];
    const totalDia = rows.reduce((a,v)=> a + Number(v.total||0), 0);
    box.innerHTML = `
      <div class="label" style="display:flex; justify-content:space-between; align-items:center">
        <span>📋 Ventas de hoy — ${esc(stLocalNombre(localSel))} (${rows.length})</span>
        <span style="text-transform:none; font-weight:700; color:var(--text)">${money(totalDia)}</span>
      </div>
      ${rows.length ? rows.map(v=>{
        const hora = v.created_at ? new Date(v.created_at).toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'}) : '';
        const items = (v.items||[]).map(it=> `${esc(it.codigo)} ${esc(it.nombre)}${it.talle?` (${esc(it.talle)}${it.color?' · '+esc(it.color):''})`:''}`).join(', ');
        return `
        <div class="lista ventaFila" data-venta-id="${v.id}" style="margin-top:6px; text-align:left; cursor:pointer">
          <div style="display:flex; justify-content:space-between; gap:8px">
            <span class="l">${hora} ${v.facturada?`<span class="v" style="font-size:11px; color:var(--accent2)">· Factura ${esc(v.factura_tipo)} N° ${esc(String(v.factura_numero))}</span>`:''}</span>
            <span class="v" style="font-size:16px">${money(v.total)}</span>
          </div>
          <div class="note" style="margin-top:2px">${items || '(sin detalle de items)'}</div>
          <div class="note" style="margin-top:2px">${mediosDePagoVenta(v)}${v.saldo_pendiente>0?` · ⚠ Saldo pendiente: ${money(v.saldo_pendiente)}`:''}</div>
          ${v.nota ? `<div class="note" style="margin-top:2px">📝 ${esc(v.nota)}</div>` : ''}
          <div class="ventaDetalle" style="display:none; margin-top:8px; padding-top:8px; border-top:1px solid var(--border)"></div>
        </div>`;
      }).join('') : '<div class="note">Todavía no hay ventas registradas hoy en este local.</div>'}`;
    [...box.querySelectorAll('.ventaFila')].forEach(fila=>{
      fila.addEventListener('click', (e)=>{
        if(e.target.closest('.ventaDetalle')) return; // no recolapsar al tocar algo adentro del detalle
        const v = rows.find(x=>x.id===fila.dataset.ventaId);
        const detBox = fila.querySelector('.ventaDetalle');
        const abierto = detBox.style.display !== 'none';
        [...box.querySelectorAll('.ventaDetalle')].forEach(d=>{ if(d!==detBox) d.style.display='none'; });
        detBox.style.display = abierto ? 'none' : '';
        if(!abierto && !detBox.dataset.armado){
          detBox.dataset.armado = '1';
          armarDetalleVenta(detBox, v, rol, localSel);
        }
      });
    });
  }catch(e){
    console.error('renderResumenDia:', e);
    box.innerHTML = `<div class="note">No se pudo cargar el resumen del día: ${esc(String((e&&e.message)||e))}</div>`;
  }
}

// Contenido del desplegable de una venta: botón Facturar (si no está
// facturada) y botón Editar (solo gerente, y solo si no está facturada).
function armarDetalleVenta(detBox, v, rol, localSel){
  const puedeEditar = rol==='gerente' && !v.facturada;
  detBox.innerHTML = `
    ${!v.facturada ? `<button class="fbtn" type="button" data-accion="facturar" style="width:100%">🧾 Facturar esta venta</button>` : ''}
    ${v.facturada ? `<button class="fbtn" type="button" data-accion="ticket" style="width:100%">📤 Compartir / imprimir factura</button>` : ''}
    <button class="fbtn" type="button" data-accion="recibo" style="width:100%; margin-top:6px">🧾 Compartir / imprimir Recibo X</button>
    ${puedeEditar ? `<button class="fbtn" type="button" data-accion="editar" style="width:100%; margin-top:6px">✏️ Editar venta</button>` : ''}
    <div class="ventaAccionBox" style="margin-top:8px"></div>`;
  const accionBox = detBox.querySelector('.ventaAccionBox');
  const bFacturar = detBox.querySelector('[data-accion="facturar"]');
  const bTicket = detBox.querySelector('[data-accion="ticket"]');
  const bRecibo = detBox.querySelector('[data-accion="recibo"]');
  const bEditar = detBox.querySelector('[data-accion="editar"]');
  if(bFacturar) bFacturar.onclick = ()=> armarFacturarVentaExistente(accionBox, v, localSel);
  if(bTicket) bTicket.onclick = ()=> armarTicketVentaExistente(accionBox, v);
  if(bRecibo) bRecibo.onclick = ()=> armarReciboVentaExistente(accionBox, v);
  if(bEditar) bEditar.onclick = ()=> armarEditarVentaExistente(accionBox, v, localSel);
}

// Reconstruye el Recibo X (sin valor fiscal) de una venta ya guardada, con
// sus items y medios de pago reales — mismo botón "Compartir/imprimir" que
// ya existe para la factura, pero disponible para cualquier venta.
function armarReciboVentaExistente(box, v){
  const formaPagoTexto = mediosDePagoVenta(v);
  const total = Number(v.total)||0;
  const items = v.items||[];
  box.innerHTML = renderReciboX(items, total, formaPagoTexto, v.local);
  wireReciboXButtons(box, items, total, formaPagoTexto, v.local);
}

// Reconstruye el ticket (mismas opciones de compartir/imprimir que al
// facturar) de una venta que ya está facturada. Primero intenta leer el
// comprobante guardado en "facturas" (tiene CAE de vencimiento, CUIT emisor
// y ambiente, que la venta sola no tiene). Si no lo encuentra (factura
// vieja u otro desfasaje), arma igual el ticket con lo que sabe la venta —
// falta el vencimiento del CAE, pero el resto (ítems, total, CAE, número)
// alcanza para compartirlo o imprimirlo.
async function armarTicketVentaExistente(box, v){
  box.innerHTML = '<div class="note">Cargando factura…</div>';
  try{
    const r = await sbAuthed(`/rest/v1/facturas?local=eq.${v.local}&tipo=eq.${v.factura_tipo}&pto_vta=eq.${v.factura_pto_vta}&numero=eq.${v.factura_numero}&select=*&limit=1`);
    const rows = r.ok ? await r.json() : [];
    const f = rows[0];
    let d, incompleto = false;
    if(f){
      d = {
        ambiente: f.ambiente, cuit: f.cuit_emisor, tipo: f.tipo, puntoVenta: f.pto_vta, numero: f.numero,
        fecha: (f.fecha||'').replace(/-/g,''), clienteCuit: f.cliente_cuit,
        items: (f.items && f.items.length) ? f.items : v.items,
        monto: f.monto!=null ? f.monto : v.total,
        cae: f.cae, caeVencimiento: (f.cae_vencimiento||'').replace(/-/g,''),
      };
    } else {
      incompleto = true;
      // El CUIT emisor es fijo por local — se busca en cualquier otra
      // factura de ese local ya que la venta no lo guarda.
      let cuitEmisor = '';
      try{
        const r2 = await sbAuthed(`/rest/v1/facturas?local=eq.${v.local}&select=cuit_emisor&limit=1`);
        const rows2 = r2.ok ? await r2.json() : [];
        cuitEmisor = (rows2[0] && rows2[0].cuit_emisor) || '';
      }catch(e){}
      d = {
        ambiente: undefined, cuit: cuitEmisor, tipo: v.factura_tipo, puntoVenta: v.factura_pto_vta, numero: v.factura_numero,
        fecha: (v.fecha||'').replace(/-/g,''), clienteCuit: null,
        items: v.items, monto: v.total, cae: v.factura_cae, caeVencimiento: '',
      };
    }
    box.innerHTML = renderTicket(d, v.local);
    wireTicketButtons(box, d, v.local, null);
    if(incompleto) box.insertAdjacentHTML('beforeend',
      '<div class="note">⚠ No se encontró el comprobante completo guardado — este ticket se armó con los datos de la venta (puede faltar el vencimiento del CAE).</div>');
  }catch(e){
    box.innerHTML = `<div class="note">No se pudo cargar la factura: ${esc(e.message||e)}</div>`;
  }
}

// Facturar una venta ya guardada (no facturada todavía) — mismo flujo de
// AFIP que al guardar, pero disparado después, desde "Ventas de hoy".
function armarFacturarVentaExistente(box, v, localSel){
  const hoy = new Date();
  const fMin = new Date(hoy); fMin.setDate(fMin.getDate()-5);
  const fMax = new Date(hoy); fMax.setDate(fMax.getDate()+5);
  let tipo = 'B';
  box.innerHTML = `
    <div class="label">Tipo de factura</div>
    <div class="talles">
      <button class="talle sel" data-t="B">Factura B (consumidor final)</button>
      <button class="talle" data-t="A">Factura A (con CUIT)</button>
    </div>
    <div class="label" id="vfCuitLabel" style="display:none">CUIT del cliente</div>
    <input id="vfCuit" class="search" placeholder="ej. 20345678901" inputmode="numeric" style="display:none">
    <div class="label">Fecha del comprobante</div>
    <input id="vfFecha" class="search" type="date" value="${isoLocal(hoy)}" min="${isoLocal(fMin)}" max="${isoLocal(fMax)}">
    <button class="addcart" id="vfOk" style="margin-top:10px">Emitir factura</button>
    <div class="note" id="vfErr"></div>
    <div id="vfResultado"></div>`;
  [...box.querySelectorAll('[data-t]')].forEach(b=> b.onclick=()=>{
    tipo = b.dataset.t;
    [...box.querySelectorAll('[data-t]')].forEach(x=>x.classList.remove('sel'));
    b.classList.add('sel');
    const esA = tipo==='A';
    box.querySelector('#vfCuitLabel').style.display = esA?'':'none';
    box.querySelector('#vfCuit').style.display = esA?'':'none';
  });
  box.querySelector('#vfOk').onclick = async ()=>{
    const err = box.querySelector('#vfErr');
    const ok = box.querySelector('#vfOk');
    const cuit = (box.querySelector('#vfCuit').value||'').replace(/\D/g,'');
    const fecha = box.querySelector('#vfFecha').value;
    if(tipo==='A' && cuit.length!==11){ err.textContent='Para Factura A escribí el CUIT del cliente (11 dígitos).'; return; }
    if(!fecha){ err.textContent='Elegí la fecha del comprobante.'; return; }
    err.textContent=''; ok.disabled=true; ok.textContent='Emitiendo…';
    try{
      const token = await sbToken();
      const r = await fetch(API_FACTURAR, {
        method:'POST',
        headers:{ 'Content-Type':'application/json', Authorization:'Bearer '+token },
        body: JSON.stringify({ local: localSel, tipo, montoTotal: v.total, clienteCuit: cuit, fecha, items: v.items }),
      });
      const d = await r.json().catch(()=>({}));
      if(!r.ok) throw new Error(d.error || 'No se pudo facturar.');
      await sbAuthed(`/rest/v1/ventas?id=eq.${v.id}`, { method:'PATCH', body: JSON.stringify({
        facturada: true, factura_tipo: d.tipo, factura_pto_vta: d.puntoVenta,
        factura_numero: d.numero, factura_cae: d.cae,
      }) });
      box.innerHTML = renderTicket(d, localSel);
      wireTicketButtons(box, d, localSel, null);
      renderResumenDia();
    }catch(e){
      ok.disabled=false; ok.textContent='Emitir factura';
      err.textContent = e.message || 'No se pudo facturar.';
    }
  };
}

// Cuotas con interés en tarjeta de crédito: reutiliza la misma tasa mensual y
// cantidades (6/9/12) configuradas para el carrito de la lista de precios,
// así el recargo que ve el cliente es el mismo en los dos lugares.
function factorCuotas(n){ n = Number(n)||1; return CUOTAS_INT.includes(n) ? 1 + (tasaMensual/100)*n : 1; }
function cuotasSeleccionadas(){ const el=document.getElementById('stCvTCredCuotas'); return el ? Number(el.value)||1 : 1; }
function montoBaseTarjeta(){ const el=document.getElementById('stCvTCred'); return el ? Number(el.value)||0 : 0; }
function montoFinalTarjeta(){ return montoBaseTarjeta() * factorCuotas(cuotasSeleccionadas()); }

// Crédito financiero ASOEM: mismas cuotas/recargo que tarjeta de crédito
// (1 pago, 3 sin interés, 6/9/12 con interés = tasaMensual × cuotas).
function cuotasSeleccionadasCFin(){ const el=document.getElementById('stCvCFinCuotas'); return el ? Number(el.value)||1 : 1; }
function montoBaseCFin(){ const el=document.getElementById('stCvCFin'); return el ? Number(el.value)||0 : 0; }
function montoFinalCFin(){ return montoBaseCFin() * factorCuotas(cuotasSeleccionadasCFin()); }

// Descuento −5% en transferencia (incentiva ese medio de pago frente a tarjeta).
const DESCUENTO_TRANSFERENCIA = 5;
function descuentoTransferenciaActivo(){ const el=document.getElementById('stCvTransfDescuento'); return !!(el && el.checked); }
function montoBaseTransferencia(){ const el=document.getElementById('stCvTransf'); return el ? Number(el.value)||0 : 0; }
function montoFinalTransferencia(){ return montoBaseTransferencia() * (descuentoTransferenciaActivo() ? (1-DESCUENTO_TRANSFERENCIA/100) : 1); }

// Descuento en efectivo (0/5/10%, botones tipo talle — a diferencia de la
// transferencia, acá hay más de una opción de porcentaje).
function contadoDescuentoPct(){
  const el = document.querySelector('#stCvContadoDescuento .talle.sel');
  return el ? Number(el.dataset.desc)||0 : 0;
}
function montoBaseContado(){ const el=document.getElementById('stCvContado'); return el ? Number(el.value)||0 : 0; }
function montoFinalContado(){ return montoBaseContado() * (1 - contadoDescuentoPct()/100); }

// El total de la venta sube por el recargo de financiar en cuotas y baja por
// el descuento de transferencia y el de efectivo — los demás medios de pago
// siguen calculándose sobre el precio de contado del carrito.
function totalConRecargo(){
  return stVentaTotal + (montoFinalTarjeta() - montoBaseTarjeta()) + (montoFinalTransferencia() - montoBaseTransferencia())
    + (montoFinalContado() - montoBaseContado()) + (montoFinalCFin() - montoBaseCFin());
}

function actualizarTotalVenta(){
  recalcSaldoVenta();
}
function recalcSaldoVenta(){
  const saldoEl = document.getElementById('stCvSaldo');
  if(!saldoEl) return;
  const total = totalConRecargo();
  const totalEl = document.getElementById('stCvTotalDisplay');
  if(totalEl) totalEl.textContent = money(total);
  const recargoEl = document.getElementById('stCvRecargoInfo');
  if(recargoEl){
    const n = cuotasSeleccionadas(), base = montoBaseTarjeta(), final = montoFinalTarjeta();
    recargoEl.textContent = base>0 && n>1
      ? (final>base ? `Con ${n} cuotas: ${money(final)} (recargo +${money(final-base)})` : `${n} cuotas sin interés: ${money(final)}`)
      : '';
  }
  const descEl = document.getElementById('stCvTransfDescuentoInfo');
  if(descEl){
    const baseT = montoBaseTransferencia(), finalT = montoFinalTransferencia();
    descEl.textContent = (descuentoTransferenciaActivo() && baseT>0) ? `Con descuento: ${money(finalT)} (−${money(baseT-finalT)})` : '';
  }
  const descContEl = document.getElementById('stCvContadoDescuentoInfo');
  if(descContEl){
    const baseC = montoBaseContado(), finalC = montoFinalContado();
    descContEl.textContent = (contadoDescuentoPct()>0 && baseC>0) ? `Con descuento: ${money(finalC)} (−${money(baseC-finalC)})` : '';
  }
  const recargoCFinEl = document.getElementById('stCvCFinRecargoInfo');
  if(recargoCFinEl){
    const n = cuotasSeleccionadasCFin(), base = montoBaseCFin(), final = montoFinalCFin();
    recargoCFinEl.textContent = base>0 && n>1
      ? (final>base ? `Con ${n} cuotas: ${money(final)} (recargo +${money(final-base)})` : `${n} cuotas sin interés: ${money(final)}`)
      : '';
  }
  const autorizacionBox = document.getElementById('stCvCFinAutorizacionBox');
  if(autorizacionBox) autorizacionBox.style.display = montoBaseCFin()>0 ? '' : 'none';
  const pagado = ['stCvTDeb','stCvCPer']
    .reduce((acc,id)=>{ const el=document.getElementById(id); return acc + (el ? Number(el.value)||0 : 0); }, 0)
    + montoFinalTarjeta() + montoFinalTransferencia() + montoFinalContado() + montoFinalCFin();
  const saldo = Math.max(0, total-pagado);
  saldoEl.textContent = money(saldo);
  saldoEl.style.color = saldo>0 ? 'var(--warn)' : '';
  const saldoBox = saldoEl.closest('.lista');
  if(saldoBox) saldoBox.style.border = saldo>0 ? '1px solid var(--warn)' : '';
}

// Vender algo que no está cargado en el catálogo: nombre y precio a mano,
// va al carrito como un ítem "manual" (igual que la diferencia de un
// cambio) — no descuenta stock de ningún artículo al guardar la venta.
function armarProductoManual(){
  const box = document.getElementById('stProductoManualBox');
  if(box.innerHTML){ box.innerHTML=''; return; }
  box.innerHTML = `
    <div class="lista" style="margin-top:6px; text-align:left">
      <div class="label" style="margin:0">Producto sin stock</div>
      <input id="mpNombre" class="search" placeholder="Nombre del producto" style="margin-top:6px" autocomplete="off">
      <div style="display:flex; gap:8px; margin-top:6px">
        <input id="mpPrecio" class="search" type="number" inputmode="decimal" placeholder="Precio" style="flex:1 1 50%">
        <input id="mpCantidad" class="search" type="number" inputmode="numeric" min="1" step="1" value="1" placeholder="Cantidad" style="flex:1 1 50%">
      </div>
      <button class="addcart" id="mpOk" style="margin-top:8px">🛒 Agregar al carrito</button>
      <div class="note" id="mpErr"></div>
    </div>`;
  const nombreInput = box.querySelector('#mpNombre');
  nombreInput.focus();
  box.querySelector('#mpOk').onclick = ()=>{
    const err = box.querySelector('#mpErr');
    const nombre = nombreInput.value.trim();
    const precioUnitario = Number(box.querySelector('#mpPrecio').value)||0;
    const cantidad = Math.floor(Number(box.querySelector('#mpCantidad').value))||0;
    if(!nombre){ err.textContent='Escribí el nombre del producto.'; return; }
    if(!(precioUnitario>0)){ err.textContent='Escribí un precio válido.'; return; }
    if(!(cantidad>0)){ err.textContent='Escribí una cantidad válida.'; return; }
    const precio = precioUnitario*cantidad;
    stVentaItems.push({codigo:null, nombre, talle:'', color:'', precio, cantidad, precioUnitario, manual:true});
    stVentaTotal += precio;
    toast(`🛒 + ${cantidad>1?cantidad+'x ':''}${nombre} (sin stock)`);
    box.innerHTML='';
    renderCarrito();
    actualizarTotalVenta();
  };
}

// Cantidad total de prendas en el carrito (no de líneas): los ítems
// manuales pueden representar más de una unidad (ver armarProductoManual).
function totalPrendasCarrito(){
  return stVentaItems.reduce((acc,it)=> acc + (it.manual ? (Number(it.cantidad)||1) : 1), 0);
}
function renderCarrito(){
  const box = document.getElementById('stCarrito');
  if(!box) return;
  const prendasEl = document.getElementById('stCvPrendasDisplay');

    const hits = p.talles.map((t,i)=>({i, ok: norm(t.talle)===m || norm(t.talle).includes(m)})).filter(x=>x.ok);
    if(hits.length===1) sel = hits[0].i;
  }

  let colorSel = colorSug || 'Único';

    </div>

  // Al elegir un talle, los botones de color muestran la cantidad de ESE

  const renderColores = ()=>{
    card.querySelector('#stColores').innerHTML = colores.map(c=>{

        <span class="lbl">${esc(c)}</span>
        <span class="cn">${cant>0?cant:''}</span>
      </button>`;
    }).join('');
  };
  // Al elegir un color, los botones de talle muestran la cantidad de ESE
  // color en cada talle (colorSel siempre tiene un valor, aunque no se haya
  // tocado nada todavía).
  const renderTalles = ()=>{
    card.querySelector('#stTalles').innerHTML = p.talles.map((x,i)=>{
      const cant = stStockDe(p, colorSel, x.talle);
      return `<button class="talle ${cant>0?'tiene-stock':''} ${i===sel?'sel':''}" data-i="${i}">
        <span class="tv">${esc(x.talle)}</span><span class="tn">${cant>0?cant:''}</span>
      </button>`;
    }).join('');

    const actual = stStockDe(p, colorSel, p.talles[sel].talle);
    stockInfo.innerHTML = `Stock actual en ${stLocalNombre(localSel)}: <b>${actual}</b>`;
  };

    const b = e.target.closest('.talle'); if(!b) return;

    renderTalles(); renderColores(); refStockInfo();
  });
  card.querySelector('#stColores').addEventListener('click', e=>{
    const b = e.target.closest('.colorbtn'); if(!b) return;

    if(col3 && MAPS.color[col3]!==colorSel) guardarMap('color', col3, colorSel);

// Se abre a demanda (botón 📷 junto al buscador, en Vender y en Cargar
// Stock) y stProcesar la corta apenas detecta un código (ver
// stDetenerCamara), para que la tarjeta de producto/talle/color quede bien
// visible sin el video encima.
async function stCamara(){
  stStopped=false;
  let stream;
  try{
    stream = await navigator.mediaDevices.getUserMedia({video:{
      facingMode:'environment', width:{ideal:1280}, height:{ideal:720},
      advanced:[{focusMode:'continuous'}],
    }});
  }catch(e){
    const box=document.getElementById('stVideoBox');
    if(box) box.innerHTML='<div class="note">Sin cámara: escribí el código a mano abajo.</div>';
    return;
  }
  if(!stOpen){ try{ stream.getTracks().forEach(t=>t.stop()); }catch(e){} return; }
  stStream = stream;
  try{
    const track = stream.getVideoTracks()[0];
    const caps = track.getCapabilities ? track.getCapabilities() : {};
    if(caps.focusMode && caps.focusMode.includes('continuous')){
      await track.applyConstraints({advanced:[{focusMode:'continuous'}]});
    }
  }catch(e){}
  const video=document.createElement('video');
  video.srcObject=stream; video.setAttribute('playsinline','');
  video.style='width:100%; border-radius:12px; display:block';
  const wrap=document.createElement('div'); wrap.style='position:relative; margin-top:6px';
  wrap.appendChild(video);
  const guide=document.createElement('div');
  guide.style='position:absolute; left:9%; right:9%; top:37%; bottom:37%; '+
    'border:2px solid #22c55e; border-radius:8px; pointer-events:none';
  wrap.appendChild(guide);
  const box=document.getElementById('stVideoBox');
  if(!box) return;
  box.innerHTML=''; box.appendChild(wrap);
  video.play();
  if('BarcodeDetector' in window){
    const FORMATOS = ['ean_13','ean_8','upc_a','upc_e','code_128','itf'];
    let detector;
    try{ detector = new BarcodeDetector({formats: FORMATOS}); }
    catch(e){ detector = new BarcodeDetector(); }
    (async function loop(){
      while(!stStopped){
        if(!stBusy && video.readyState >= 2){
          try{
            const codes = await detector.detect(video);
            if(codes.length){
              const digits = (codes[0].rawValue||'').replace(/\D/g,'');
              const now = Date.now();
              // no re-leer la misma prenda apenas confirmada
              if(digits && !(digits===stCoolCode && now<stCoolUntil)){
                stCoolCode=digits; stCoolUntil=now+2500;
                if(stSeccion==='venta') beepScan();
                stProcesar(digits);
              }
            }
          }catch(e){}
        }
        await new Promise(r=>setTimeout(r, 150));
      }
    })();
  }else{
    // Este navegador no tiene BarcodeDetector nativo (típico en iPhone/Safari
    // y en varios de escritorio) — usamos ZXing (JS puro) como respaldo,
    // leyendo cuadro a cuadro del mismo <video> ya abierto.
    const n=document.createElement('div'); n.className='note';
    n.textContent='Cargando lector de códigos…';
    box.appendChild(n);
    loadZXing().then(()=>{
      if(stStopped) return;
      const hints = new Map();
      hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
        ZXing.BarcodeFormat.EAN_13, ZXing.BarcodeFormat.EAN_8,
        ZXing.BarcodeFormat.UPC_A, ZXing.BarcodeFormat.UPC_E,
        ZXing.BarcodeFormat.CODE_128, ZXing.BarcodeFormat.ITF,
      ]);
      const reader = new ZXing.BrowserMultiFormatReader(hints);
      stZXingReader = reader;
      n.textContent = 'Apuntá la cámara al código de barras.';
      reader.decodeFromVideoElementContinuously(video, (result)=>{
        if(stStopped || stBusy || !result) return;
        const digits = (result.getText()||'').replace(/\D/g,'');
        const now = Date.now();
        if(digits && !(digits===stCoolCode && now<stCoolUntil)){
          stCoolCode=digits; stCoolUntil=now+2500;
          if(stSeccion==='venta') beepScan();
          stProcesar(digits);
        }
      });
    }).catch(()=>{
      n.textContent='No se pudo cargar el lector automático (¿sin internet?): escribí el código a mano abajo.';
    });
  }
}

async function stProcesar(raw){
  const digits = (raw||'').replace(/\D/g,'');
  if(!digits) return;
  stBusy = true;   // pausa la detección mientras la tarjeta está abierta
  // La cámara arranca cerrada (tanto en Vender como en Cargar Stock) y se
  // corta apenas detecta un código, para que la tarjeta de producto/talle/
  // color quede bien visible sin competir con el video. Se reabre a mano
  // con el botón 📷 junto al buscador.
  stDetenerCamara();
  const p = buscarArticuloBarcode(digits);
  if(!p){ stCardNuevo(digits); return; }
  const card = document.getElementById('stCard');
  if(card) card.innerHTML = '<div class="note">Actualizando stock…</div>';
  await refrescarArticulo(p);
  if(stSeccion==='venta') ventaCardConfirm(p, digits);
  else stCardConfirm(p, digits);
}

// Antes de mostrar la tarjeta de color/talle, trae de Supabase el stock
// MÁS ACTUAL de este artículo puntual (no todo el catálogo, para que sea
// rápido) — evita que la tarjeta se abra con el número viejo que quedó en
// memoria desde que se cargó la app, si en el medio se sumó stock de otro
// talle/color del mismo producto (desde este celular o desde otro).
async function refrescarArticulo(p){
  try{
    const r = await fetch(`${SB_URL}/rest/v1/articulos?codigo=eq.${encodeURIComponent(p.codigo)}&select=talles`,
      { headers:{ apikey:SB_KEY, Authorization:'Bearer '+SB_KEY }, cache:'no-store' });
    if(!r.ok) return;
    const rows = await r.json();
    if(rows[0] && Array.isArray(rows[0].talles)){
      p.talles = rows[0].talles.map(t=>({ talle:t.talle, precio:Number(t.precio),
        stock: Array.isArray(t.stock) ? t.stock : [] }));
    }
  }catch(e){ /* sin conexión: seguimos con lo que ya había en memoria */ }
}

function stDetenerCamara(){
  stStopped = true;
  try{ if(stStream) stStream.getTracks().forEach(t=>t.stop()); }catch(e){}
  stStream = null;
  try{ if(stZXingReader) stZXingReader.reset(); }catch(e){}
  stZXingReader = null;
  const box = document.getElementById('stVideoBox');
  if(box) box.innerHTML = '';
}

    // conservando stock/precio de los talles que coincidan por nombre —
    // nunca se manda stock desde acá. Los talles viejos con stock que no
    // tengan equivalente en la lista nueva se pierden (quedan auditados
    // en stock_movimientos), así que avisamos antes de mandar el cambio.
    const norms = listaTalles.map(norm);
    const perdidos = p.talles.filter(t=> !norms.includes(norm(t.talle))
      && (t.stock||[]).some(s=> (Number(s.camerino)||0)+(Number(s.giustozzi)||0) > 0));
    if(perdidos.length){
      const detalle = perdidos.map(t=>{
        const cant = (t.stock||[]).reduce((a,s)=> a+(Number(s.camerino)||0)+(Number(s.giustozzi)||0), 0);
        return `${t.talle} (${cant} u.)`;
      }).join(', ');
      if(!confirm(`El talle ${detalle} no está en el nuevo sistema y tiene stock cargado — se va a perder. ¿Continuar?`)) return;
    }
    const btn = card.querySelector('#stEditGuardar');
    btn.disabled = true; btn.textContent = 'Guardando…';
    try{
      const r = await sbAuthed('/rest/v1/rpc/editar_sistema_talles', { method:'POST',
        body: JSON.stringify({ p_codigo:p.codigo, p_talles:listaTalles, p_precio:Number(p.precio_lista)||null,
          p_usuario: sbSession && sbSession.email || null }) });
      const d = await r.json().catch(()=>null);
      if(!r.ok) throw new Error((d && (d.message||d.hint)) || 'No se pudo actualizar el sistema de talles.');
      p.talles = stMapTalles(d);
      sel = p.talles.length===1 ? 0 : -1;
      editPanel.style.display = 'none';
      btn.disabled = false; btn.textContent = 'Guardar sistema de talles';
      toast('✓ Sistema de talles actualizado');
      renderColores(); renderTalles(); refStockInfo();
    }catch(e){
      if(String(e.message)==='login'){ card.innerHTML=''; drawStock(); return; }
      btn.disabled=false; btn.textContent='Guardar sistema de talles';
      editErr.textContent = e.message;
    }
  };
  card.querySelector('#stCancel').onclick = ()=>{ card.innerHTML=''; stBusy=false; };
  card.querySelector('#stOk').onclick = async ()=>{
    const err = card.querySelector('#stErr');
    if(sel<0){ err.textContent='Elegí el talle.'; return; }
    const talle = p.talles[sel].talle;
    const ok = card.querySelector('#stOk');
    ok.disabled = true; ok.textContent = 'Guardando…';
    try{
      const ret = await rpcAjustarStock(p.codigo, talle, colorSel, localSel, delta);
      if(Array.isArray(ret)) p.talles = stMapTalles(ret);
      if(col3 && MAPS.color[col3]!==colorSel) guardarMap('color', col3, colorSel);
      if(tal3 && MAPS.talle[tal3]!==talle) guardarMap('talle', tal3, talle);
      stLast = {codigo:p.codigo, talle, color:colorSel, local:localSel, nombre:p.nombre, prod:p, delta};
      stCount++;
      const nEl=document.getElementById('stN'); if(nEl) nEl.textContent=stCount;
      const u=document.getElementById('stUndo'); if(u) u.style.display='';
      toast(`✓ ${delta>0?'+1':'−1'} ${p.nombre} · ${colorSel} · ${talle}`);
      card.innerHTML=''; stBusy=false;
      renderHistorialCarga();
    }catch(e){
      if(String(e.message)==='login'){ card.innerHTML=''; drawStock(); return; }
      ok.disabled=false; ok.textContent=btnTxt;
      err.textContent = e.message || 'No se pudo guardar.';
    }
  };
}

async function stDeshacer(){
  if(!stLast) return;
  const u=document.getElementById('stUndo');
  try{
    if(u){ u.disabled=true; u.textContent='Deshaciendo…'; }
    const deltaDeshacer = -(stLast.delta || 1);
    const ret = await rpcAjustarStock(stLast.codigo, stLast.talle, stLast.color, stLast.local, deltaDeshacer);
    if(Array.isArray(ret) && stLast.prod) stLast.prod.talles = stMapTalles(ret);
    stCount = Math.max(0, stCount-1);
    const nEl=document.getElementById('stN'); if(nEl) nEl.textContent=stCount;
    toast(`↩ Deshecho: ${deltaDeshacer>0?'+1':'−1'} `+stLast.nombre);
    stLast=null;
    if(u){ u.disabled=false; u.textContent='↩ Deshacer último'; u.style.display='none'; }
    renderHistorialCarga();
  }catch(e){
    if(u){ u.disabled=false; u.textContent='↩ Deshacer último'; }
    if(String(e.message)==='login'){ drawStock(); return; }
    toast(e.message || 'No se pudo deshacer');
  }
}

// Artículo cuyo prefijo no está en la lista: alta mínima y se sigue cargando.
function stCardNuevo(digits){
  const art5 = digits.slice(0,5);
  const cats = [...new Set(PRODS.map(p=>p.categoria).filter(Boolean))].sort();
  const card = document.getElementById('stCard');
  card.innerHTML = `
    <div class="lista" style="margin-top:10px">
      <div class="l">Artículo nuevo — no está en la lista</div>
      <div class="v" style="font-size:16px">Código ${esc(art5)}</div>
    </div>
    <div class="label">Nombre</div>
    <div class="autocomp-wrap">
      <input id="stNvNombre" class="search" placeholder="ej. TAVERNITI BUZO" autocomplete="off">
      <div class="autocomp-list" id="stNvNombreSug" style="display:none"></div>
    </div>
    <div class="note" id="stNvNombreAviso" style="display:none">
      ¿Ya tenés cargado este artículo con otro código? Tocá uno de arriba para sumarle el stock nuevo, en vez de crear un código repetido.
    </div>
    <div class="label">Categoría</div>
    <div class="autocomp-wrap">
      <input id="stNvCat" class="search" placeholder="ej. BUZOS HOMBRE" autocomplete="off">
      <div class="autocomp-list" id="stNvCatSug" style="display:none"></div>
    </div>
    <div class="label">Precio de lista</div>
    <input id="stNvPrecio" class="search" type="number" inputmode="numeric" placeholder="ej. 85000">
    <div class="label">Sistema de talles</div>
    <select id="stNvSistema" class="search">
      ${SISTEMAS_TALLES.map(s=>`<option value="${esc(s.id)}">${esc(s.label)}</option>`).join('')}
    </select>
    <input id="stNvSistemaCustom" class="search" style="margin-top:8px; display:none"
      placeholder="Talles separados por coma, ej: 38,40,42,44">
    <button class="addcart" id="stNvOk">Crear artículo y seguir</button>
    <button class="fbtn" id="stNvCancel" style="width:100%; margin-top:6px">Cancelar</button>
    <div class="note" id="stNvErr"></div>`;
  const sistemaSel = card.querySelector('#stNvSistema');
  const sistemaCustom = card.querySelector('#stNvSistemaCustom');
  sistemaSel.onchange = ()=>{ sistemaCustom.style.display = sistemaSel.value==='custom' ? '' : 'none'; };
  const catInput = card.querySelector('#stNvCat');
  const catSug = card.querySelector('#stNvCatSug');
  const cerrarSugerencias = ()=>{ catSug.style.display='none'; catSug.innerHTML=''; };
  const mostrarSugerencias = ()=>{
    const q = norm(catInput.value);
    const coincidencias = q ? cats.filter(c=> norm(c).includes(q)).slice(0,8) : [];
    if(!coincidencias.length){ cerrarSugerencias(); return; }
    catSug.innerHTML = coincidencias.map(c=> `<div class="autocomp-item" data-cat="${esc(c)}">${esc(c)}</div>`).join('');
    catSug.style.display='';
  };
  catInput.addEventListener('input', mostrarSugerencias);
  catInput.addEventListener('focus', mostrarSugerencias);
  catSug.addEventListener('mousedown', e=>{
    // mousedown (no click) para que dispare antes del blur del input.
    const it = e.target.closest('.autocomp-item'); if(!it) return;
    catInput.value = it.dataset.cat;
    cerrarSugerencias();
  });
  catInput.addEventListener('blur', ()=> setTimeout(cerrarSugerencias, 150));

  // Antes de dar de alta un código nuevo, avisamos si ya hay artículos con
  // un nombre parecido (mismo modelo, remesa/lote distinto del proveedor) —
  // así el vendedor puede sumarle el stock al código ya publicado en vez de
  // crear uno huérfano que la web nunca va a mostrar.
  const nombreInput = card.querySelector('#stNvNombre');
  const nombreSug = card.querySelector('#stNvNombreSug');
  const nombreAviso = card.querySelector('#stNvNombreAviso');
  const totalStock = p => (p.talles||[]).reduce((acc,t)=> acc + (t.stock||[])
    .reduce((a,s)=> a + (Number(s.camerino)||0) + (Number(s.giustozzi)||0), 0), 0);
  const cerrarNombreSug = ()=>{ nombreSug.style.display='none'; nombreSug.innerHTML=''; nombreAviso.style.display='none'; };
  const mostrarNombreSug = ()=>{
    const q = norm(nombreInput.value);
    const coincidencias = q.length>=3 ? PRODS.filter(p=> p.codigo!==art5+'XXX' && p.codigo!==art5 && norm(p.nombre).includes(q)).slice(0,6) : [];
    if(!coincidencias.length){ cerrarNombreSug(); return; }
    nombreSug.innerHTML = coincidencias.map(p=> `<div class="autocomp-item" data-cod="${esc(p.codigo)}">
      ${esc(p.nombre)} <small style="opacity:.7">— ${esc(p.codigo)} · ${esc(p.categoria||'')} · stock ${totalStock(p)}</small></div>`).join('');
    nombreSug.style.display=''; nombreAviso.style.display='';
  };
  nombreInput.addEventListener('input', mostrarNombreSug);
  nombreInput.addEventListener('focus', mostrarNombreSug);
  nombreSug.addEventListener('mousedown', e=>{
    const it = e.target.closest('.autocomp-item'); if(!it) return;
    const existente = BYCOD[it.dataset.cod];
    if(!existente) return;
    cerrarNombreSug();
    card.innerHTML = '<div class="note">Actualizando stock…</div>';
    refrescarArticulo(existente).then(()=>{
      if(stSeccion==='venta') ventaCardConfirm(existente, digits);
      else stCardConfirm(existente, digits);
    });
  });
  nombreInput.addEventListener('blur', ()=> setTimeout(cerrarNombreSug, 150));
  card.querySelector('#stNvCancel').onclick = ()=>{ card.innerHTML=''; stBusy=false; };
  card.querySelector('#stNvOk').onclick = async ()=>{
    const err = card.querySelector('#stNvErr');
    const nombre = (card.querySelector('#stNvNombre').value||'').trim();
    const categoria = (card.querySelector('#stNvCat').value||'').trim();
    const precio = Number(card.querySelector('#stNvPrecio').value);
    if(!nombre || !(precio>0)){ err.textContent='Completá el nombre y el precio.'; return; }
    const sistema = SISTEMAS_TALLES.find(s=>s.id===sistemaSel.value) || SISTEMAS_TALLES[0];
    let listaTalles = sistema.id==='custom'
      ? sistemaCustom.value.split(',').map(t=>t.trim()).filter(Boolean)
      : sistema.talles;
    if(!listaTalles.length){ err.textContent='Escribí al menos un talle, separado por coma.'; return; }
    const talles = listaTalles.map(t=>({talle:t, precio, stock:[]}));
    const codigo = digits.length>=8 ? art5+'XXX' : digits;   // convención de la lista
    const ok = card.querySelector('#stNvOk');
    ok.disabled = true; ok.textContent = 'Creando…';
    try{
      const r = await sbAuthed('/rest/v1/articulos', { method:'POST',
        headers:{ Prefer:'return=representation' },
        body: JSON.stringify({ codigo, nombre, categoria: categoria||null,
          precio_lista: precio, talles }) });
      const d = await r.json().catch(()=>null);
      if(!r.ok) throw new Error((d && d.message) || 'No se pudo crear el artículo.');
      const nuevo = normArt(Array.isArray(d) && d[0] ? d[0] :
        {codigo, nombre, categoria, precio_lista: precio, talles});
      CATALOG.push(nuevo); rebuild();
      toast('✓ Artículo creado');
      if(stSeccion==='venta') ventaCardConfirm(nuevo, digits);
      else stCardConfirm(nuevo, digits);
    }catch(e){
      if(String(e.message)==='login'){ card.innerHTML=''; drawStock(); return; }
      ok.disabled=false; ok.textContent='Crear artículo y seguir';
      err.textContent = e.message;
    }
  };
}

function formasPago(total){
  const r=tasaMensual/100;

  const arr=[
    {k:'debito', label:'Débito', monto:total, detalle:''},
    {k:'transferencia', label:'Transferencia', monto:total, detalle:''},
    {k:'credito1', label:'Crédito 1 pago', monto:total, detalle:''},
    {k:'efectivo', label:'Contado efectivo (−'+DESC_CONTADO+'%)', monto:contado, detalle:''},
    {k:'3sin', label:'3 cuotas sin interés', monto:total, detalle:fmt(total/3)+' x3'}
  ];
  CUOTAS_INT.forEach(n=>{ const c=cuotaDirecta(total,n,r); arr.push({k:'c'+n, label:n+' cuotas con interés', monto:c*n, detalle:fmt(c)+' x'+n}); });
  arr.push({k:'promo', label:'Promo banco −'+promoSel+'%', monto:total*(1-promoSel/100), detalle:''});
  return arr;
}

function shareResumenTexto(fp){

  if(navigator.share){ navigator.share({title:'Resumen de compra', text:texto}).catch(()=>{}); }
  else if(navigator.clipboard){ navigator.clipboard.writeText(texto).then(()=>alert('Resumen copiado al portapapeles.')); }

}

function loadHtml2Canvas(){
  if(window.html2canvas) return Promise.resolve();
  return new Promise((res,rej)=>{
    const s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js';
    s.onload=res; s.onerror=rej; document.head.appendChild(s);
  });
}

async function shareResumenImagen(){
  try{ await loadHtml2Canvas(); }
  catch(e){ alert('No se pudo cargar el generador de imagen (¿sin internet?).'); return; }
  const node=document.getElementById('factura');
  let canvas;
  try{ canvas=await html2canvas(node,{scale:2,backgroundColor:'#ffffff'}); }
  catch(e){ alert('No se pudo generar la imagen.'); return; }
  canvas.toBlob(async blob=>{
    if(!blob){ alert('No se pudo generar la imagen.'); return; }
    const file=new File([blob],'resumen-camerino.png',{type:'image/png'});
    if(navigator.canShare && navigator.canShare({files:[file]})){
      try{ await navigator.share({files:[file], title:'Resumen de compra'}); return; }catch(e){}
    }
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url; a.download='resumen-camerino.png'; a.click();
    setTimeout(()=>URL.revokeObjectURL(url),2000);
  },'image/png');
}

function itemsHtmlText(){
  return CART.map(i=>`• ${i.nombre||'(sin nombre)'} (${i.cod||'—'}, talle ${i.talle}) x${i.qty} = ${fmt(i.precio*i.qty)}`).join('\n');
}

function shareCart(total, contado, tres, nItems, itemsTxt){
  const texto = `🛒 Presupuesto (${nItems} artículo${nItems!==1?'s':''})\n\n${itemsTxt}\n\n`+
    `TOTAL: ${fmt(total)}\n`+
    `Contado efectivo (−${DESC_CONTADO}%): ${fmt(contado)}\n`+
    `3 cuotas sin interés: ${fmt(tres)} c/u`;
  if(navigator.share){
    navigator.share({title:'Presupuesto', text:texto}).catch(()=>{});
  } else if(navigator.clipboard){
    navigator.clipboard.writeText(texto).then(()=>alert('Presupuesto copiado al portapapeles.'));
  } else {
    alert(texto);
  }
}

document.getElementById('sheetCart').addEventListener('click', e=>{
  const q=e.target.closest('[data-q]');
  if(q){
    const i=+q.dataset.i, d=+q.dataset.q;
    CART[i].qty+=d;
    if(CART[i].qty<1) CART.splice(i,1);
    saveCart(); drawCart(); return;
  }
  const del=e.target.closest('[data-del]');
  if(del){ CART.splice(+del.dataset.del,1); saveCart(); drawCart(); }
});

// Interés DIRECTO (simple): recargo total = tasa × n; cuota = precio×(1+tasa×n)/n
function cuotaDirecta(precio,n,r){ return precio*(1+r*n)/n; }

function drawDetail(){
  const p=curProd;
  const t=p.talles[curTalle];
  const base=t.precio;
  const r=tasaMensual/100;
  const contado=base*(1-DESC_CONTADO/100);
  const tres=base/3;
  const fav=isFav(p.codigo);

  const tallesHtml = p.talles.length>1 ? `
    <div class="label">Talle</div>
    <div class="talles">${p.talles.map((x,i)=>
      `<button class="talle ${i===curTalle?'sel':''}" data-t="${i}">${esc(x.talle)}</button>`).join('')}</div>` : '';

  // Stock del talle elegido (solo en modo editor): suma de colores por local.
  const stSum = (t.stock||[]).reduce((a,c)=>({
    cam: a.cam + (Number(c.camerino)||0), giu: a.giu + (Number(c.giustozzi)||0),
  }), {cam:0, giu:0});
  const stockHtml = (isAdmin && (t.stock||[]).length)
    ? `<div class="note" style="margin-top:4px">Stock${p.talles.length>1?' talle '+esc(t.talle):''}:
        <b>${stSum.cam+stSum.giu}</b> (Camerino ${stSum.cam} · Giustozzi ${stSum.giu})</div>` : '';

  // Margen (solo modo editor): costo es un valor por producto, no por talle,
  // así que puede variar el % si el talle elegido tiene otro precio.
  const margenHtml = (isAdmin && p.costo!=null && p.costo>0)
    ? (()=>{ const margen=base-p.costo; const pct=base>0?(margen/base*100):0;
        return `<div class="note" style="margin-top:4px">Costo: ${fmt(p.costo)} · Margen: <b>${fmt(margen)}</b> (${pct.toFixed(1)}%)</div>`; })()
    : (isAdmin ? `<div class="note" style="margin-top:4px">Sin costo cargado (no se puede calcular margen).</div>` : '');

  const cuotasIntHtml = CUOTAS_INT.map(n=>{
    const c=cuotaDirecta(base,n,r);
    const recargo=Math.round(r*n*100);
    return `<div class="row"><div class="a">${n} cuotas<small>+${recargo}% (${tasaMensual}% × ${n})</small></div>
      <div class="b">${fmt(c)}<small>por cuota · total ${fmt(c*n)}</small></div></div>`;
  }).join('');

  const promosHtml = `<div class="row"><div class="a">Promo banco
      <select id="promoPct">${PROMOS.map(d=>
        `<option value="${d}" ${d===promoSel?'selected':''}>−${d}%</option>`).join('')}</select></div>
     <div class="b">${fmt(base*(1-promoSel/100))}</div></div>`;

  document.getElementById('sheet').classList.remove('sheet-wide');
  document.getElementById('sheet').innerHTML = `
    ${navIconsHtml()}
    <div class="topbtns">
      <button class="star ${fav?'on':''}" onclick="toggleFav('${esc(p.codigo)}')" title="Favorito">${fav?'★':'☆'}</button>
      <button class="backbtn" onclick="closeDetail()">← Atrás</button>
    </div>
    <h2>${esc(p.nombre)||'(sin nombre)'}</h2>
    <div class="scod">Código ${esc(p.codigo)||'—'}</div>
    <div class="scat">${esc(p.categoria)}</div>
    ${p.foto_url ? `<img src="${esc(p.foto_url)}" alt="" style="width:100%;max-width:320px;border-radius:10px;margin:10px auto;display:block;">` : ''}
    ${tallesHtml}
    ${stockHtml}
    ${margenHtml}
    <div class="lista">
      <div class="l">DÉBITO / TRANSFERENCIA / CRED 1 PAGO${p.talles.length>1?' · talle '+esc(t.talle):''}</div>
      <div class="v">${fmt(base)}</div>
    </div>
    <button class="addcart" id="addCart" onclick="addToCart()">🛒 Agregar al carrito</button>
    <div class="grid">
      <div class="box green"><div class="t">Contado efectivo</div>
        <div class="p">${fmt(contado)}</div><div class="s">−${DESC_CONTADO}%</div></div>
      <div class="box blue"><div class="t">3 cuotas s/interés</div>
        <div class="p">${fmt(tres)}</div><div class="s">por cuota</div></div>
    </div>
    <div class="label">Cuotas con interés</div>
    ${cuotasIntHtml}
    <div class="label">Promociones bancarias</div>
    ${promosHtml}
    ${isAdmin ? `<div class="cfg">Interés mensual:
      <input id="tasa" type="number" value="${tasaMensual}" min="0" step="0.5"> %</div>
    <div class="note">Cuotas con <b>interés directo</b> (simple):
      recargo = interés mensual × cantidad de cuotas.<br>
      Cambiá el % arriba si tu tasa cambió.</div>` : ''}
    ${isAdmin ? `<div style="display:flex; gap:8px; margin-top:14px">
      <button class="addcart" style="margin:0; flex:1; background:var(--accent); color:#03283a"
        onclick="openAddProduct(curProd)">✏️ Editar</button>
      <button class="addcart" style="margin:0; flex:1; background:#ef4444; color:#fff"
        onclick="borrarProducto('${esc(p.codigo)}')">🗑 Borrar</button>
    </div>` : ''}`;

  wireNavIcons(document.getElementById('sheet'));
  [...document.querySelectorAll('.talle')].forEach(b=>
    b.onclick=()=>{ curTalle=+b.dataset.t; drawDetail(); });
  const tasaEl=document.getElementById('tasa');
  if(tasaEl) tasaEl.onchange=()=>{ tasaMensual=parseFloat(tasaEl.value)||0; pushConfig('tasa_mensual', tasaMensual); drawDetail(); };
  const promoEl=document.getElementById('promoPct');
  if(promoEl) promoEl.onchange=()=>{ promoSel=parseInt(promoEl.value,10)||20; drawDetail(); };
}
</script>
