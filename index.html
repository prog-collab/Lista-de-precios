  };
  card.querySelector('#stFcCuit').addEventListener('input', ()=>{ clienteTelefono = null; });
  card.querySelector('#stFcCuit').addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); consultarCuit(); } });
  card.querySelector('#stFcBuscarCliente').onclick = ()=>{
    const picker = card.querySelector('#stFcClientePicker');
    if(picker.innerHTML){ picker.innerHTML=''; return; }
    picker.innerHTML = `
      <input id="stFcBuscarInput" class="search" placeholder="Buscar por nombre o teléfono…" style="margin-top:6px">
      <div id="stFcBuscarResultados"></div>`;
    const buscarInput = picker.querySelector('#stFcBuscarInput');
    const resultadosEl = picker.querySelector('#stFcBuscarResultados');
    makeClearable(buscarInput);
    const subtCuit = c=> `${c.cuit||'sin CUIT'} · ${c.telefono||'sin tel'}`;
    const elegir = c=>{
      clienteTelefono = c.telefono || null;
      if(c.cuit){ card.querySelector('#stFcCuit').value = c.cuit; consultarCuit(); }
      picker.innerHTML='';
      pushHistCliente(c);
    };
    mostrarHistClientesEnBox(resultadosEl, elegir, subtCuit);
    buscarInput.focus();
    let t;
    buscarInput.addEventListener('input', ()=>{
      clearTimeout(t);
      t = setTimeout(async ()=>{
        const q = buscarInput.value.trim();
        if(q.length<2){ mostrarHistClientesEnBox(resultadosEl, elegir, subtCuit); return; }
        resultadosEl.innerHTML = 'Buscando…';
        try{
          const r = await sbAuthed(`/rest/v1/clientes?select=id,cuit,nombre,telefono&or=(nombre.ilike.*${encodeURIComponent(q)}*,telefono.ilike.*${encodeURIComponent(q)}*)&limit=8`);
          const rows = r.ok ? await r.json() : [];
          resultadosEl.innerHTML = rows.length ? rows.map((c,i)=>
            `<div class="lista" data-i="${i}" style="margin-top:4px; cursor:pointer">
               <div class="l">${esc(c.nombre||'(sin nombre)')}</div>
               <div class="v" style="font-size:13px">${esc(subtCuit(c))}</div>
             </div>`).join('') : '<div class="note">Sin resultados.</div>';
          [...resultadosEl.querySelectorAll('[data-i]')].forEach(el=> el.onclick=()=> elegir(rows[Number(el.dataset.i)]));
        }catch(e){ resultadosEl.innerHTML = 'Error al buscar.'; }
      }, 300);
    });
  };
  card.querySelector('#stFcCuit').addEventListener('blur', consultarCuit);
  card.querySelector('#stFcCancel').onclick = ()=>{
    stVentaTotal = 0; stVentaItems = []; stVentaDevolucionId = null;
    drawVender();
  };
  card.querySelector('#stFcOk').onclick = async ()=>{
    const err = card.querySelector('#stFcErr');
    const ok = card.querySelector('#stFcOk');
    const localSel = stLocal();
    const cuotasTCred = cuotasSeleccionadas();
    const recargoPct = CUOTAS_INT.includes(cuotasTCred) ? Number((tasaMensual*cuotasTCred).toFixed(2)) : 0;
    const pagoTCred = montoFinalTarjeta();
    const transfDescuentoActivo = descuentoTransferenciaActivo();
    const transfDescuentoPct = transfDescuentoActivo ? DESCUENTO_TRANSFERENCIA : 0;
    const pagoTransf = montoFinalTransferencia();
    const total = totalConRecargo();
    const contadoDescPct = contadoDescuentoPct();
    const pagoContado = montoFinalContado();
    const transfAlias = card.querySelector('#stCvTransfAlias').value||null;
    const pagoTDeb = Number(card.querySelector('#stCvTDeb').value)||0;
    const pagoCPer = Number(card.querySelector('#stCvCPer').value)||0;
    const cuotasCFin = cuotasSeleccionadasCFin();
    const recargoPctCFin = CUOTAS_INT.includes(cuotasCFin) ? Number((tasaMensual*cuotasCFin).toFixed(2)) : 0;
    const pagoCFin = montoFinalCFin();
    const autorizacionAsoem = (card.querySelector('#stCvCFinAutorizacion').value||'').trim();
    const nota = (card.querySelector('#stCvNota').value||'').trim() || null;
    const saldoPendiente = Math.max(0, total - (pagoContado+pagoTransf+pagoTCred+pagoTDeb+pagoCPer+pagoCFin));
    const cuit = (card.querySelector('#stFcCuit').value||'').replace(/\D/g,'');
    const fecha = card.querySelector('#stFcFecha').value;
    // Aviso bien visible (no solo el texto chico al pie): toast + resaltado
    // + scroll hasta el mensaje, para que el vendedor no se quede sin saber
    // qué le faltó corregir.
    const avisoError = msg=>{
      err.textContent = msg;
      err.style.color = 'var(--warn)';
      err.style.fontWeight = '700';
      toast('⚠ '+msg, 3500);
      err.scrollIntoView({behavior:'smooth', block:'center'});
    };
    if(!(total>0)){ avisoError('Agregá al menos un producto al carrito.'); return; }
    if(saldoPendiente>0){ avisoError('Falta cargar medios de pago — el saldo pendiente tiene que quedar en $0 para guardar la venta.'); return; }
    if(pagoTransf>0 && !transfAlias){ avisoError('Elegí a qué alias se transfirió.'); return; }
    if(pagoCPer>0 && !clienteCreditoId){ avisoError('Elegí un cliente (arriba, junto al total) para el crédito personal.'); return; }
    if(pagoCFin>0 && !clienteCreditoId){ avisoError('Elegí un cliente (arriba, junto al total) para el crédito financiero (ASOEM).'); return; }
    if(pagoCFin>0 && !autorizacionAsoem){ avisoError('Cargá el número de autorización de ASOEM.'); return; }
    if(facturar && tipo==='A' && cuit.length!==11){ avisoError('Para Factura A escribí el CUIT del cliente (11 dígitos).'); return; }
    if(facturar && !fecha){ avisoError('Elegí la fecha del comprobante.'); return; }
    err.textContent=''; err.style.color=''; err.style.fontWeight=''; ok.disabled=true; ok.textContent = 'Verificando caja…';
    const sesionAbierta = await obtenerCajaAbierta(localSel);
    if(!sesionAbierta){
      ok.disabled=false; ok.textContent = facturar?'Guardar y facturar':'Guardar venta';
      err.textContent = `⚠ No hay caja abierta en ${stLocalNombre(localSel)} — abrila arriba antes de vender.`;
      return;
    }
    ok.textContent = 'Guardando…';
    let ventaId = null;
    let stockAplicado = false;
    try{
      // 1) Se crea el registro de la venta primero (sin facturar todavía), para
      //    poder referenciarlo en el historial de stock.
      const rVenta = await sbAuthed('/rest/v1/ventas', { method:'POST',
        headers:{ Prefer:'return=representation' },
        body: JSON.stringify({
          local: localSel, vendedor: sbSession.email||null, vendedor_id: stVendedorSel||null, items: stVentaItems, total,
          fecha: isoLocal(new Date()),
          pago_contado: pagoContado, contado_descuento_pct: contadoDescPct,
          pago_transferencia: pagoTransf, transferencia_alias: transfAlias,
          transferencia_descuento_pct: transfDescuentoPct,
          pago_tarjeta_credito: pagoTCred, pago_tarjeta_debito: pagoTDeb,
          pago_credito_personal: pagoCPer, pago_credito_financiero: pagoCFin, saldo_pendiente: saldoPendiente,
          tarjeta_credito_cuotas: cuotasTCred, tarjeta_credito_recargo_pct: recargoPct,
          asoem_cuotas: cuotasCFin, asoem_recargo_pct: recargoPctCFin,
          asoem_autorizacion: pagoCFin>0 ? autorizacionAsoem : null,
          cliente_id: clienteCreditoId,
          caja_sesion_id: sesionAbierta.id,
          facturada: false,
          devolucion_id: stVentaDevolucionId || null,
          nota,
        }) });
      const ventaRows = await rVenta.json().catch(()=>null);
      if(!rVenta.ok || !ventaRows || !ventaRows[0]) throw new Error('No se pudo guardar la venta.');
      ventaId = ventaRows[0].id;

      // 2) Recién ahora se descuenta el stock de todo el carrito, en una sola
      //    transacción (todo o nada), referenciando la venta recién creada.
      //    Los items "manual" (ej. la diferencia de un cambio) no son un
      //    producto real con stock — se excluyen de este paso.
      ok.textContent = 'Descontando stock…';
      await rpcAplicarVentaStock(stVentaItems.filter(it=>!it.manual), localSel, ventaId);
      stockAplicado = true;

      // 2.b) Si parte de la venta quedó como crédito personal, se carga a la
      // cuenta corriente del cliente elegido.
      if(pagoCPer>0 && clienteCreditoId){
        await sbAuthed('/rest/v1/cuenta_corriente_movimientos', { method:'POST', body: JSON.stringify({
          cliente_id: clienteCreditoId, tipo:'cargo', monto: pagoCPer, local: localSel,
          referencia_venta_id: ventaId, usuario: sbSession.email||null,
        }) }).catch(e=>console.error('No se pudo registrar el cargo en cuenta corriente:', e));
      }

      // 3) Si corresponde, se factura.
      let d = null;
      if(facturar){
        ok.textContent = 'Emitiendo…';
        const token = await sbToken();
        const r = await fetch(API_FACTURAR, {
          method:'POST',
          headers:{ 'Content-Type':'application/json', Authorization:'Bearer '+token },
          body: JSON.stringify({ local: localSel, tipo, montoTotal: total, clienteCuit: cuit, fecha, items: stVentaItems }),
        });
        d = await r.json().catch(()=>({}));
        if(!r.ok) throw new Error(d.error || 'No se pudo facturar.');
        await sbAuthed(`/rest/v1/ventas?id=eq.${ventaId}`, { method:'PATCH', body: JSON.stringify({
          facturada: true, factura_tipo: d.tipo, factura_pto_vta: d.puntoVenta,
          factura_numero: d.numero, factura_cae: d.cae,
        }) }).catch(e=>console.error('No se pudo actualizar la venta con los datos de la factura:', e));
      }
      const resultadoEl = card.querySelector('#stFcResultado');
      if(facturar){
        resultadoEl.style.flex = '1 1 100%';   // el ticket necesita todo el ancho, no comparte fila
        resultadoEl.innerHTML = renderTicket(d, localSel);
        wireTicketButtons(card, d, localSel, clienteTelefono);
      } else {
        // Sin factura AFIP: igual se puede compartir un recibo sin valor
        // fiscal ("Recibo X"), mismo diseño que "Compartir resumen" del
        // carrito de clientes, con los items y medios de pago reales de
        // esta venta (hay que armarlo ANTES de vaciar stVentaItems).
        resultadoEl.style.flex = '1 1 100%';
        const formaPagoTexto = mediosDePagoVenta({
          pago_contado: pagoContado, contado_descuento_pct: contadoDescPct,
          pago_transferencia: pagoTransf, transferencia_alias: transfAlias, transferencia_descuento_pct: transfDescuentoPct,
          pago_tarjeta_credito: pagoTCred, tarjeta_credito_cuotas: cuotasTCred, tarjeta_credito_recargo_pct: recargoPct,
          pago_tarjeta_debito: pagoTDeb,
          pago_credito_personal: pagoCPer, clientes: clienteCreditoNombre ? {nombre: clienteCreditoNombre} : null,
          pago_credito_financiero: pagoCFin, asoem_cuotas: cuotasCFin, asoem_recargo_pct: recargoPctCFin,
          asoem_autorizacion: pagoCFin>0 ? autorizacionAsoem : null,
        });
        const itemsVendidos = stVentaItems.slice();
        resultadoEl.innerHTML = `<div class="lista" style="text-align:left; padding:10px 14px"><div class="l" style="margin:0">✓ Venta guardada</div><div class="v" style="font-size:20px; margin:0">${money(total)}</div></div>` +
          renderReciboX(itemsVendidos, total, formaPagoTexto, localSel);
        wireReciboXButtons(card, itemsVendidos, total, formaPagoTexto, localSel);
      }
      stVentaTotal = 0; stVentaItems = []; stVentaDevolucionId = null;
      renderCarrito();
      renderResumenDia();
      // El formulario queda listo para la próxima venta de una — no hace
      // falta tocar nada para seguir vendiendo aunque el ticket/Recibo X
      // de arriba siga a la vista (compartiéndose o imprimiéndose).
      resetFormularioVenta();
      card.querySelector('#stFcCancel').textContent='✕ Cerrar recibo';
      card.querySelector('#stFcCancel').onclick = ()=>{
        resultadoEl.innerHTML=''; resultadoEl.style.flex='';
        card.querySelector('#stFcCancel').textContent='Cancelar';
        card.querySelector('#stFcCancel').onclick = ()=>{
          stVentaTotal = 0; stVentaItems = []; stVentaDevolucionId = null;
          drawVender();
        };
      };
    }catch(e){
      ok.disabled=false; ok.textContent = facturar?'Guardar y facturar':'Guardar venta';
      if(ventaId && !stockAplicado){
        // Todavía no se tocó el stock: la venta quedó a medio crear, se descarta.
        await sbAuthed(`/rest/v1/ventas?id=eq.${ventaId}`, { method:'DELETE' }).catch(()=>{});
        avisoError(e.message || 'No se pudo guardar la venta.');
      } else if(stockAplicado){
        // El stock ya se descontó de verdad (la venta es real) — lo que falló
        // fue la factura. Se deja la venta guardada sin facturar.
        avisoError('La venta se guardó y el stock ya se descontó, pero no se pudo facturar: '+(e.message||e)+
          ' — todavía no hay forma de reintentar la factura sola, avisale a Juan si esto pasa.');
      } else {
        avisoError(e.message || 'No se pudo guardar la venta.');
      }
    }
  };

  // Atajo de teclado: con el carrito cargado y el saldo pendiente en $0, Enter
  // pide confirmar "Guardar venta" y con otro Enter se guarda — para cobrar
  // sin soltar el teclado. Si además se va a facturar, hay una segunda
  // confirmación aparte (autorizar la factura real ante AFIP) antes de
  // ejecutar. Se ignoran los buscadores de cliente y el campo de CUIT, que ya
  // usan su propio Enter para buscar/consultar.
  const ENTER_EXCLUIR = ['stCvClienteBuscarInput','stFcBuscarInput','stFcCuit'];
  card.addEventListener('keydown', e=>{
    if(e.key!=='Enter') return;
    if(e.target && ENTER_EXCLUIR.includes(e.target.id)) return;
    const btn = card.querySelector('#stFcOk');
    if(!btn || btn.disabled || btn.style.display==='none') return;
    if(!(stVentaTotal>0)) return;
    const total = totalConRecargo();
    const pagado = ['stCvContado','stCvTDeb','stCvCPer','stCvCFin']
      .reduce((acc,id)=>{ const el=card.querySelector('#'+id); return acc + (el ? Number(el.value)||0 : 0); }, 0)
      + montoFinalTarjeta() + montoFinalTransferencia();
    if(Math.max(0, total-pagado) > 0) return; // todavía falta cargar medios de pago
    e.preventDefault();
    const upsell = stVentaItems.length===1
      ? '\n\n🛍️ Es una sola prenda — ¿le ofreciste al cliente algún producto nuevo o alguna promoción para ampliar la compra?'
      : '';
    if(!confirm(`¿Guardar venta por ${money(total)}?${upsell}`)) return;
    if(facturar && !confirm(`¿Confirmás FACTURAR esta venta por ${money(total)} (Factura ${tipo})? Se emite un comprobante real ante AFIP.`)) return;
    btn.click();
  });
}

// Busca el artículo por el código de barras, de lo más específico a lo más
// general: completo → 8 díg (artículo+color) → 5 díg + 'XXX' → 5 díg.
function buscarArticuloBarcode(digits){
  const art5 = digits.slice(0,5);
  const tries = [...new Set([digits, digits.slice(0,8), art5+'XXX', art5])].filter(Boolean);
  for(const c of tries){ if(BYCOD[c]) return BYCOD[c]; }
  return null;
}

  stStream=null;

// catálogo — mismo botón que si el usuario lo tocara de nuevo. Con setTimeout
// para que corra recién cuando termine de ejecutarse todo el script: si se
// dispara acá mismo (síncrono), algunas variables `let` que se declaran más
// abajo (ej. miRolCache) todavía están en zona muerta y explota con

                      document.getElementById('stPass').value);

// Historial de últimos artículos cargados (stock_movimientos, motivo='carga')
// en este local — tercera columna de la pantalla de Cargar stock.
async function renderHistorialCarga(){
  const box = document.getElementById('stHistorialCarga');
  if(!box) return;
  const localSel = stLocal();
  box.innerHTML = `<div class="label">🕒 Últimos cargados — ${esc(stLocalNombre(localSel))}</div><div class="note">Cargando…</div>`;
  try{
    const r = await sbAuthed(`/rest/v1/stock_movimientos?motivo=eq.carga&local=eq.${localSel}&order=created_at.desc&limit=30&select=*`);
    const rows = r.ok ? await r.json() : [];
    box.innerHTML = `
      <div class="label">🕒 Últimos cargados — ${esc(stLocalNombre(localSel))}</div>
      ${rows.length ? rows.map(m=>{
        const hora = m.created_at ? new Date(m.created_at).toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'}) : '';
        return `
        <div class="lista" style="margin-top:6px; text-align:left">
          <div style="display:flex; justify-content:space-between; gap:8px">
            <span class="l">${hora}</span>
            <span class="v" style="font-size:14px">+${esc(String(m.delta))} → ${esc(String(m.stock_resultante))}</span>
          </div>
          <div class="note" style="margin-top:2px">${esc(m.codigo)} · ${esc(m.talle)}${m.color?' · '+esc(m.color):''}</div>
          ${m.usuario ? `<div class="note" style="margin-top:1px">${esc(mostrarUsuario(m.usuario))}</div>` : ''}
        </div>`;
      }).join('') : '<div class="note">Todavía no cargaste stock en este local.</div>'}`;
  }catch(e){ box.innerHTML = `<div class="note">No se pudo cargar el historial.</div>`; }
}

// ===== Sesión de caja real: hay que abrirla (con un fondo inicial) antes de
// poder guardar una venta en ese local, y se cierra con arqueo/gastos/
// retiros/adelantos, calculando la diferencia contra lo esperado.
// Turno actual según la hora — antes de las 14:00 es mañana, si no, tarde.
// Corte simple; avisar si en la tienda el corte real es otro.
function turnoActual(){ return new Date().getHours() < 14 ? 'manana' : 'tarde'; }

// Sugiere solo, según el calendario de turnos (📅), quién está atendiendo
// hoy en el local elegido — el vendedor puede tocar otro chip si hace
// falta (alguien cubriendo, nadie cargado ese día, etc.). No es obligatorio:
// si no se elige a nadie, la venta se guarda igual sin vendedor_id.
async function renderVendedorSel(){
  const box = document.getElementById('stVendedorBox');
  if(!box) return;
  const local = stLocal();
  const hoy = isoLocal(new Date());
  const turno = turnoActual();
  box.innerHTML = '<div class="note">Cargando…</div>';
  try{
    const [vendedoresRes, turnosRes] = await Promise.all([
      sbAuthed(`/rest/v1/vendedores?local=eq.${local}&activo=eq.true&order=nombre.asc&select=*`),
      sbAuthed(`/rest/v1/turnos?local=eq.${local}&fecha=eq.${hoy}&turno=eq.${turno}&select=vendedor_id`),
    ]);
    const vendedores = vendedoresRes.ok ? await vendedoresRes.json() : [];
    const turnosHoy = turnosRes.ok ? await turnosRes.json() : [];
    const asignadosIds = new Set(turnosHoy.map(t=>t.vendedor_id));
    if(!vendedores.length){
      box.innerHTML = '<div class="note">No hay vendedores cargados para este local — se puede vender igual (cargalos en 📅 Calendario).</div>';
      return;
    }
    if(stVendedorSel && !vendedores.some(v=>v.id===stVendedorSel)) stVendedorSel = null;
    // Si nadie fue elegido todavía en esta sesión y hay un único asignado al
    // turno de hoy, se autoselecciona — con más de uno o ninguno, se pide elegir.
    if(!stVendedorSel && asignadosIds.size===1) stVendedorSel = [...asignadosIds][0];
    const asignados = vendedores.filter(v=>asignadosIds.has(v.id));
    const resto = vendedores.filter(v=>!asignadosIds.has(v.id));
    const chip = v => `<button type="button" class="talle ${stVendedorSel===v.id?'sel':''}" data-vid="${v.id}">${esc(v.nombre)}</button>`;
    box.innerHTML = `
      ${asignados.length ? `
        <div class="talles">${asignados.map(chip).join('')}</div>
        ${resto.length ? `<a href="#" id="stVendedorVerTodos" style="color:var(--accent); font-size:12px; display:inline-block; margin-top:4px">▾ Ver todo el plantel</a>
          <div class="talles" id="stVendedorResto" style="display:none; margin-top:4px">${resto.map(chip).join('')}</div>` : ''}
        ` : `
        <div class="note" style="margin-bottom:4px">Nadie asignado hoy (turno ${turno==='manana'?'mañana':'tarde'}) en el calendario — elegí quién atiende:</div>
        <div class="talles">${vendedores.map(chip).join('')}</div>`}`;
    const verTodos = document.getElementById('stVendedorVerTodos');
    if(verTodos) verTodos.onclick = (e)=>{ e.preventDefault(); document.getElementById('stVendedorResto').style.display=''; verTodos.style.display='none'; };
    [...box.querySelectorAll('[data-vid]')].forEach(b=>{
      b.onclick = ()=>{
        stVendedorSel = stVendedorSel===b.dataset.vid ? null : b.dataset.vid;
        renderVendedorSel();
      };
    });
  }catch(e){
    box.innerHTML = '<div class="note">No se pudo cargar el plantel.</div>';
  }
}

async function obtenerCajaAbierta(local){
  try{
    const r = await sbAuthed(`/rest/v1/caja_sesiones?local=eq.${local}&estado=eq.abierta&select=*&limit=1`);
    const rows = r.ok ? await r.json() : [];
    return rows[0] || null;
  }catch(e){ return null; }
}

async function renderCajaStatus(){
  const box = document.getElementById('stCajaStatus');
  const formBox = document.getElementById('stCajaFormBox');
  if(!box) return;
  box.textContent = 'Verificando estado de caja…';
  formBox.innerHTML = '';
  const localSel = stLocal();
  const sesion = await obtenerCajaAbierta(localSel);
  if(!sesion){
    box.innerHTML = `🔒 No hay caja abierta en <b>${esc(stLocalNombre(localSel))}</b> — hay que abrirla para poder vender.
      <button class="fbtn" id="stCajaAbrirBtn" style="margin-left:6px">Abrir caja</button>`;
    document.getElementById('stCajaAbrirBtn').onclick = ()=> armarAbrirCaja(formBox, localSel);
  } else {
    const hora = sesion.abierta_at ? new Date(sesion.abierta_at).toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'}) : '';
    box.innerHTML = `🔓 Caja abierta en <b>${esc(stLocalNombre(localSel))}</b> desde las ${hora} · fondo inicial ${money(sesion.fondo_inicial)}
      <button class="fbtn" id="stCajaCerrarBtn" style="margin-left:6px">Cerrar caja</button>`;
    document.getElementById('stCajaCerrarBtn').onclick = ()=> armarCerrarCaja(formBox, sesion, localSel);
  }
}

function armarAbrirCaja(formBox, localSel){
  formBox.innerHTML = `
    <div class="lista" style="margin-top:8px; text-align:left">
      <div class="label" style="margin:0">Abrir caja en ${esc(stLocalNombre(localSel))}</div>
      <div class="note" style="margin-top:4px">Fondo inicial (efectivo con el que arranca)</div>
      <input id="stCajaFondo" class="search" type="number" inputmode="decimal" value="0" style="margin-top:4px">
      <button class="addcart" id="stCajaAbrirOk" style="margin-top:8px">🔓 Abrir caja</button>
      <div class="note" id="stCajaErr"></div>
    </div>`;
  document.getElementById('stCajaAbrirOk').onclick = async ()=>{
    const err = document.getElementById('stCajaErr');
    const ok = document.getElementById('stCajaAbrirOk');
    const fondo = Number(document.getElementById('stCajaFondo').value)||0;
    err.textContent=''; ok.disabled=true; ok.textContent='Abriendo…';
    try{
      const r = await sbAuthed('/rest/v1/rpc/abrir_caja_sesion', { method:'POST', body: JSON.stringify({
        p_local: localSel, p_fondo_inicial: fondo,
      }) });
      if(!r.ok){ const d = await r.json().catch(()=>({})); throw new Error(d.message || 'No se pudo abrir la caja.'); }
      renderCajaStatus();
    }catch(e){
      ok.disabled=false; ok.textContent='🔓 Abrir caja';
      err.textContent = e.message||e;
    }
  };
}

async function armarCerrarCaja(formBox, sesion, localSel){
  formBox.innerHTML = `<div class="note" style="margin-top:8px">Calculando ventas de esta caja…</div>`;
  const r = await sbAuthed(`/rest/v1/ventas?caja_sesion_id=eq.${sesion.id}&select=*`);
  const ventas = r.ok ? await r.json() : [];
  const totales = ventas.reduce((acc,v)=>({
    contado: acc.contado + Number(v.pago_contado||0),
    total: acc.total + Number(v.total||0),
    cant: acc.cant + 1,
  }), {contado:0, total:0, cant:0});
  formBox.innerHTML = `
    <div class="lista" style="margin-top:8px; text-align:left">
      <div class="label" style="margin:0">Cerrar caja de ${esc(stLocalNombre(localSel))}</div>
      <div class="note" style="margin-top:4px">Ventas de esta caja: ${totales.cant} · efectivo vendido ${money(totales.contado)} · total ${money(totales.total)}</div>
      <div class="grid" style="margin-top:6px">
        <div><div class="note" style="margin:0 0 4px">Fondo inicial</div><input id="ccFondo" class="search" type="number" value="${sesion.fondo_inicial}" readonly></div>
        <div><div class="note" style="margin:0 0 4px">Cambio</div><input id="ccCambio" class="search" type="number" value="0"></div>
        <div><div class="note" style="margin:0 0 4px">Gastos</div><input id="ccGastos" class="search" type="number" value="0"></div>
        <div><div class="note" style="margin:0 0 4px">Retiros</div><input id="ccRetiros" class="search" type="number" value="0"></div>
        <div><div class="note" style="margin:0 0 4px">Adelantos</div><input id="ccAdelantos" class="search" type="number" value="0"></div>
        <div><div class="note" style="margin:0 0 4px">Arqueo (efectivo contado a mano)</div><input id="ccArqueo" class="search" type="number" value="0"></div>
      </div>
      <input id="ccObs" class="search" placeholder="Observaciones (detalle de gastos, retiros, adelantos)" style="margin-top:6px">
      <div class="note" id="ccEsperadoInfo" style="margin-top:6px"></div>
      <button class="addcart" id="stCajaCerrarOk" style="margin-top:8px">🔒 Confirmar cierre</button>
      <button class="fbtn" id="stCajaCancelar" style="width:100%; margin-top:6px">Cancelar</button>
      <div class="note" id="stCajaErr"></div>
    </div>`;
  const recalc = ()=>{
    const cambio = Number(document.getElementById('ccCambio').value)||0;
    const gastos = Number(document.getElementById('ccGastos').value)||0;
    const retiros = Number(document.getElementById('ccRetiros').value)||0;
    const adelantos = Number(document.getElementById('ccAdelantos').value)||0;
    const arqueo = Number(document.getElementById('ccArqueo').value)||0;
    const esperado = Number(sesion.fondo_inicial) + totales.contado + cambio - gastos - retiros - adelantos;
    const diferencia = arqueo - esperado;
    document.getElementById('ccEsperadoInfo').innerHTML = `Efectivo esperado: <b>${money(esperado)}</b> · Diferencia: <b style="${diferencia!==0?'color:var(--warn)':''}">${money(diferencia)}</b>`;
  };
  ['ccCambio','ccGastos','ccRetiros','ccAdelantos','ccArqueo'].forEach(id=> document.getElementById(id).addEventListener('input', recalc));
  recalc();
  document.getElementById('stCajaCancelar').onclick = ()=>{ formBox.innerHTML=''; };
  document.getElementById('stCajaCerrarOk').onclick = async ()=>{
    const err = document.getElementById('stCajaErr');
    const ok = document.getElementById('stCajaCerrarOk');
    err.textContent=''; ok.disabled=true; ok.textContent='Cerrando…';
    try{
      const rc = await sbAuthed('/rest/v1/rpc/cerrar_caja_sesion', { method:'POST', body: JSON.stringify({
        p_sesion_id: sesion.id,
        p_gastos: Number(document.getElementById('ccGastos').value)||0,
        p_retiros: Number(document.getElementById('ccRetiros').value)||0,
        p_adelantos: Number(document.getElementById('ccAdelantos').value)||0,
        p_cambio: Number(document.getElementById('ccCambio').value)||0,
        p_arqueo: Number(document.getElementById('ccArqueo').value)||0,
        p_observaciones: document.getElementById('ccObs').value||null,
      }) });
      if(!rc.ok){ const d = await rc.json().catch(()=>({})); throw new Error(d.message || 'No se pudo cerrar la caja.'); }
      formBox.innerHTML = '';
      renderCajaStatus();
    }catch(e){
      ok.disabled=false; ok.textContent='🔒 Confirmar cierre';
      err.textContent = e.message||e;
    }
  };
}

// Rol del usuario logueado (vendedor|gerente), consultado una sola vez por
// sesión — habilita la opción de editar una venta en "Ventas de hoy".
let miRolCache = null;
async function cargarMiRol(){
  if(miRolCache) return miRolCache;
  try{
    const r = await sbAuthed('/rest/v1/admins?select=rol');
    const rows = r.ok ? await r.json() : [];
    miRolCache = (rows[0] && rows[0].rol) || 'vendedor';
  }catch(e){ miRolCache = 'vendedor'; }
  return miRolCache;
}

// Local al que está limitado este usuario (null = sin restricción, puede
// operar en cualquiera de los dos). Los usuarios "camerino"/"giustozzi" solo
// pueden cargar stock/vender/facturar en su propio local — pero la vista de
// stock del catálogo principal sigue mostrando siempre los dos locales.
let miLocalAsignadoCache = undefined;
async function cargarMiLocalAsignado(){
  if(miLocalAsignadoCache !== undefined) return miLocalAsignadoCache;
  try{
    const r = await sbAuthed('/rest/v1/admins?select=local_asignado');
    const rows = r.ok ? await r.json() : [];
    miLocalAsignadoCache = (rows[0] && rows[0].local_asignado) || null;
  }catch(e){ miLocalAsignadoCache = null; }
  return miLocalAsignadoCache;
}

// Aplica la restricción de local a los botones Camerino/Giustozzi de Cargar y
// Vender: si el usuario tiene un local asignado, fuerza ese local y deshabilita
// el botón del otro.
async function aplicarRestriccionLocal(bC, bG){
  const asignado = await cargarMiLocalAsignado();
  if(!asignado) return;
  if(getLS('stock_local','camerino') !== asignado) setLS('stock_local', asignado);
  const otro = asignado==='camerino' ? bG : bC;
  otro.disabled = true;
  otro.title = `Tu usuario solo puede operar en ${stLocalNombre(asignado)}.`;
  otro.style.opacity = '0.5';
  otro.style.cursor = 'not-allowed';
}

      <button class="addcart" id="stLoginBtn">Ingresar</button>
      <div class="note" id="stLoginErr"></div>`;
    wireNavIcons(sheet);
    document.getElementById('stClose').onclick = ()=> stCerrar(false);
    document.getElementById('stLoginBtn').onclick = async ()=>{
      const err = document.getElementById('stLoginErr');
      const b = document.getElementById('stLoginBtn');
      b.disabled = true; b.textContent = 'Ingresando…';

                      document.getElementById('stPass').value);

      }catch(e){ b.disabled=false; b.textContent='Ingresar'; err.textContent = e.message; }
    };
    return;
  }
  sheet.innerHTML = `
    ${navIconsHtml()}
    <div class="topbtns"><button class="backbtn" id="stClose">✕ Cerrar</button></div>
    <h2>👤 Clientes</h2>
    <div class="scat">Sesión: ${esc(mostrarUsuario(sbSession.email))} · <a href="#" id="stLogout" style="color:var(--accent)">salir</a></div>
    <div class="scat">Compartidos entre Camerino y Giustozzi — cualquier usuario ve el panorama completo.</div>
    <div class="st-grid st-grid-3">
      <div class="st-col-left">
        <button class="addcart" id="ccNuevoBtn" style="margin-bottom:8px">➕ Nuevo cliente</button>
        <div class="label">Buscar cliente</div>
        <input id="ccBuscarInput" class="search" placeholder="Nombre, teléfono o DNI…" autocomplete="off">
        <div id="ccResultados"></div>
      </div>
      <div class="st-col-right" id="ccDetalle">
        <div class="note">Buscá y elegí un cliente, o creá uno nuevo.</div>
      </div>
      <div class="st-col-dia" id="ccConSaldo"></div>
    </div>`;
  wireNavIcons(sheet);
  document.getElementById('stClose').onclick = ()=> stCerrar(false);
  document.getElementById('stLogout').onclick = (e)=>{ e.preventDefault();
    sbSession=null; setLS('sb_session', null); miRolCache=null; miLocalAsignadoCache=undefined; actualizarVisibilidadRendimiento(); drawClientes(); };
  document.getElementById('ccNuevoBtn').onclick = ()=> armarFormCliente(document.getElementById('ccDetalle'), null);
  const buscarInput = document.getElementById('ccBuscarInput');
  const resultadosEl = document.getElementById('ccResultados');
  makeClearable(buscarInput);
  mostrarHistClientesEnBox(resultadosEl, c=> mostrarDetalleCliente({id:c.id}));
  let t;
  buscarInput.addEventListener('input', ()=>{
    clearTimeout(t);
    t = setTimeout(async ()=>{
      const q = buscarInput.value.trim();
      if(q.length<2){ mostrarHistClientesEnBox(resultadosEl, c=> mostrarDetalleCliente({id:c.id})); return; }
      resultadosEl.innerHTML = '<div class="note">Buscando…</div>';
      try{
        const r = await sbAuthed(`/rest/v1/clientes?select=id,nombre,telefono,etiqueta,dni&or=(nombre.ilike.*${encodeURIComponent(q)}*,telefono.ilike.*${encodeURIComponent(q)}*,dni.ilike.*${encodeURIComponent(q)}*)&limit=10`);
        const rows = r.ok ? await r.json() : [];
        resultadosEl.innerHTML = rows.length ? rows.map((c,i)=>`
          <div class="lista" data-i="${i}" style="margin-top:4px; cursor:pointer; text-align:left">
            <div class="l">${esc(c.nombre||'(sin nombre)')}${c.etiqueta?` · <span style="text-transform:none">${esc(c.etiqueta)}</span>`:''}</div>
            <div class="v" style="font-size:13px">${esc(c.telefono||'sin tel')}${c.dni?' · DNI '+esc(c.dni):''}</div>
          </div>`).join('') : '<div class="note">Sin resultados.</div>';
        [...resultadosEl.querySelectorAll('[data-i]')].forEach(el=> el.onclick=()=> mostrarDetalleCliente({id: rows[Number(el.dataset.i)].id}));
      }catch(e){ resultadosEl.innerHTML = '<div class="note">Error al buscar.</div>'; }
    }, 300);
  });
  renderClientesConSaldo();
}

async function renderClientesConSaldo(){
  const box = document.getElementById('ccConSaldo');
  if(!box) return;
  box.innerHTML = `<div class="label">⚠ Con saldo pendiente</div><div class="note">Cargando…</div>`;
  try{
    const r = await sbAuthed(`/rest/v1/v_cuenta_corriente_saldo?saldo=gt.0&order=ultimo_movimiento.asc&select=cliente_id,nombre,telefono,saldo,ultimo_movimiento&limit=50`);
    const rows = r.ok ? await r.json() : [];
    const ahora = Date.now();
    box.innerHTML = `
      <div class="label">⚠ Con saldo pendiente (${rows.length})</div>
      <div class="note">Ordenados por más atrasados primero.</div>
      ${rows.length ? rows.map((r,i)=>{
        const dias = r.ultimo_movimiento ? Math.floor((ahora - new Date(r.ultimo_movimiento).getTime())/86400000) : null;
        const urgente = dias!=null && dias>=30;
        return `
        <div class="lista" data-i="${i}" style="margin-top:6px; cursor:pointer; text-align:left; ${urgente?'border:1px solid var(--warn)':''}">
          <div style="display:flex; justify-content:space-between; gap:8px">
            <span class="l">${esc(r.nombre||'(sin nombre)')}${urgente?' ⚠':''}</span>
            <span class="v" style="font-size:15px">${money(r.saldo)}</span>
          </div>
          ${dias!=null ? `<div class="note" style="margin-top:2px">Sin movimientos hace ${dias} día${dias===1?'':'s'}</div>` : ''}
        </div>`;
      }).join('') : '<div class="note">Nadie tiene saldo pendiente ahora mismo.</div>'}`;
    [...box.querySelectorAll('[data-i]')].forEach(el=> el.onclick=()=> mostrarDetalleCliente({id: rows[Number(el.dataset.i)].cliente_id}));
  }catch(e){ box.innerHTML = `<div class="note">No se pudo cargar.</div>`; }
}

// Últimos 5 clientes elegidos (en cualquier buscador de cliente de la app),
// para acceso rápido sin tener que volver a tipear. Guarda lo que se sepa de
// cada uno y conserva el cuit/dni ya conocido de una vez anterior si esta
// vez se eligió desde un buscador que no lo trae (ej. el de Vender).
function pushHistCliente(cliente){
  if(!cliente || !cliente.id) return;
  let hist = getLS('hist_clientes', []);
  const previo = hist.find(c=>c.id===cliente.id);
  hist = hist.filter(c=>c.id!==cliente.id);
  hist.unshift({
    id: cliente.id,
    nombre: cliente.nombre || (previo && previo.nombre) || '',
    telefono: cliente.telefono || (previo && previo.telefono) || '',
    cuit: cliente.cuit || (previo && previo.cuit) || null,
  });
  setLS('hist_clientes', hist.slice(0,5));
}
// Pinta la lista de "últimos buscados" dentro de un contenedor de resultados
// de búsqueda — se usa cuando el campo todavía está vacío, en los 3 lugares
// donde se elige un cliente (Clientes, Vender, Facturar con CUIT).
function mostrarHistClientesEnBox(box, onPick, subtitulo){
  const hist = getLS('hist_clientes', []);
  subtitulo = subtitulo || (c=> c.telefono||'sin tel');
  box.innerHTML = hist.length ? `<div class="note" style="margin-top:2px">🕒 Últimos buscados</div>` + hist.map((c,i)=>`
    <div class="lista" data-hist-i="${i}" style="margin-top:4px; cursor:pointer">
      <div class="l">${esc(c.nombre||'(sin nombre)')}</div>
      <div class="v" style="font-size:13px">${esc(subtitulo(c))}</div>
    </div>`).join('') : '';
  [...box.querySelectorAll('[data-hist-i]')].forEach(el=> el.onclick=()=> onPick(hist[Number(el.dataset.histI)]));
}

    <button class="fbtn" id="cfCancelar" style="width:100%; margin-top:6px">Cancelar</button>
    <div class="note" id="cfErr"></div>`;
  document.getElementById('cfCancelar').onclick = ()=>{ esEdit ? mostrarDetalleCliente(cliente) : box.innerHTML=''; };
  document.getElementById('cfOk').onclick = async ()=>{
    const err = document.getElementById('cfErr');
    const ok = document.getElementById('cfOk');
    const nombre = document.getElementById('cfNombre').value.trim();
    if(!nombre){ err.textContent='Falta el nombre.'; return; }
    const body = {
      nombre,
      telefono: document.getElementById('cfTelefono').value.trim()||null,
      dni: document.getElementById('cfDni').value.trim()||null,
      email: document.getElementById('cfEmail').value.trim()||null,
      cuit: document.getElementById('cfCuit').value.trim()||null,
      direccion: document.getElementById('cfDireccion').value.trim()||null,
      instagram: document.getElementById('cfInstagram').value.trim()||null,
      facebook: document.getElementById('cfFacebook').value.trim()||null,
      fecha_nacimiento: document.getElementById('cfNacimiento').value||null,
      etiqueta: document.getElementById('cfEtiqueta').value.trim()||null,
      notas: document.getElementById('cfNotas').value.trim()||null,
    };
    err.textContent=''; ok.disabled=true; ok.textContent='Guardando…';
    try{
      let clienteId = esEdit ? cliente.id : null;
      const r = esEdit
        ? await sbAuthed(`/rest/v1/clientes?id=eq.${cliente.id}`, { method:'PATCH', body: JSON.stringify(body) })
        : await sbAuthed('/rest/v1/clientes', { method:'POST', headers:{Prefer:'return=representation'}, body: JSON.stringify(body) });
      if(!r.ok){ const d = await r.json().catch(()=>({})); throw new Error(d.message || 'No se pudo guardar.'); }
      if(!esEdit){ const rows = await r.json().catch(()=>null); clienteId = rows && rows[0] && rows[0].id; }
      renderClientesConSaldo();
      mostrarDetalleCliente({id: clienteId});
    }catch(e){
      ok.disabled=false; ok.textContent = esEdit?'💾 Guardar cambios':'💾 Crear cliente';
      err.textContent = e.message||e;
    }
  };
}

// Popup genérico chico (ej. detalle de la compra que originó un cargo en la
// cuenta corriente) — mismo patrón visual overlay+sheet que el resto de la
// app, pero sin ocupar toda la pantalla ni pisar el historial de navegación.
function abrirPopup(html){
  document.getElementById('sheetPopup').innerHTML = html;
  document.getElementById('ovPopup').classList.add('open');
}
function cerrarPopup(){ document.getElementById('ovPopup').classList.remove('open'); }
document.getElementById('ovPopup').addEventListener('click', e=>{ if(e.target.id==='ovPopup') cerrarPopup(); });

async function mostrarDetalleCompraDeCargo(ventaId){
  abrirPopup('<div class="note">Cargando…</div>');
  try{
    const r = await sbAuthed(`/rest/v1/ventas?id=eq.${ventaId}&select=*`);
    const rows = r.ok ? await r.json() : [];
    const v = rows[0];
    if(!v){ abrirPopup('<div class="note">No se encontró la venta.</div><button class="fbtn" id="ppCerrar" style="width:100%; margin-top:8px">Cerrar</button>'); document.getElementById('ppCerrar').onclick = cerrarPopup; return; }
    const fecha = v.created_at ? new Date(v.created_at).toLocaleString('es-AR') : '';
    const items = (v.items||[]);
    abrirPopup(`
      <div style="display:flex; justify-content:space-between; align-items:center">
        <div class="label" style="margin:0">🧾 Detalle de la compra</div>
        <button class="fbtn" id="ppCerrar">✕</button>
      </div>
      <div class="note" style="margin-top:6px">${esc(fecha)} · ${esc(stLocalNombre(v.local))}</div>
      ${items.length ? items.map(it=>`
        <div class="lista" style="margin-top:6px; text-align:left">
          <div class="l">${esc(it.nombre||it.codigo||'')}</div>
          <div class="v" style="font-size:14px">${esc(it.codigo||'')}${it.talle?` · ${esc(it.talle)}`:''}${it.color?` · ${esc(it.color)}`:''} — ${money(it.precio)}</div>
        </div>`).join('') : '<div class="note">Sin detalle de items para esta venta.</div>'}
      <div class="lista" style="margin-top:8px; display:flex; align-items:center; justify-content:space-between; text-align:left; padding:10px 14px">
        <div class="l" style="margin:0">Total</div>
        <div class="v" style="font-size:18px; margin:0">${money(v.total)}</div>
      </div>
      <div class="note" style="margin-top:4px">${mediosDePagoVenta(v)}</div>`);
    document.getElementById('ppCerrar').onclick = cerrarPopup;
  }catch(e){
    abrirPopup('<div class="note">No se pudo cargar el detalle.</div><button class="fbtn" id="ppCerrar" style="width:100%; margin-top:8px">Cerrar</button>');
    document.getElementById('ppCerrar').onclick = cerrarPopup;
  }
}

async function mostrarDetalleCliente(clienteParcial){

      sbAuthed(`/rest/v1/v_cuenta_corriente_saldo_local?cliente_id=eq.${clienteParcial.id}&select=local,saldo`),

      </div>
      <div class="note" style="margin-top:2px">Estos botones abren la búsqueda en tu navegador — no mandamos ningún dato del cliente a esos sitios.</div>`;

    box.innerHTML = `
      <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:8px">
        <div class="label" style="margin:0">${esc(cliente.nombre||'(sin nombre)')}${cliente.etiqueta?` · <span style="text-transform:none">${esc(cliente.etiqueta)}</span>`:''}</div>
        <button class="fbtn" id="ccEditar" style="flex:none">✏️ Editar</button>
      </div>
      <div class="note" style="margin-top:4px">${esc(cliente.telefono||'sin teléfono')}${cliente.dni?' · DNI '+esc(cliente.dni):''}${cliente.email?' · '+esc(cliente.email):''}</div>
      ${cliente.direccion ? `<div class="note" style="margin-top:2px">📍 ${esc(cliente.direccion)}</div>` : ''}
      ${cumpleHtml}
      ${cliente.notas ? `<div class="note" style="margin-top:4px; font-style:italic">${esc(cliente.notas)}</div>` : ''}
      ${redesHtml}
      ${mapsHtml}

      <div class="lista" style="margin-top:10px; display:flex; align-items:center; justify-content:space-between; text-align:left; padding:10px 14px">
        <div class="l" style="margin:0">Saldo actual (los 2 locales)</div>
        <div class="v" id="ccSaldoActual" style="font-size:20px; margin:0; ${saldo>0?'color:var(--warn)':''}">${money(saldo)}</div>
      </div>
      ${saldoLocalHtml}
      ${saldo>0 ? `<button class="fbtn" id="ccRecordarBtn" style="width:100%; margin-top:6px">📱 Recordar deuda por WhatsApp</button>` : ''}

      <div id="ccPagoBox">

        <div><div class="note" style="margin:0 0 4px">Efectivo</div>
          <div style="display:flex; gap:4px">
            <input id="ccPgContado" class="search" type="number" inputmode="decimal" value="0" style="flex:1">
            <button class="fbtn" type="button" data-cc-usar-total="ccPgContado" style="flex:none; padding:0 10px" title="Usar el saldo total">＝</button>
          </div></div>
        <div><div class="note" style="margin:0 0 4px">Transferencia</div>
          <div style="display:flex; gap:4px">
            <input id="ccPgTransf" class="search" type="number" inputmode="decimal" value="0" style="flex:1">

          <select id="ccPgTransfAlias" class="search" style="margin-top:4px">
            <option value="">¿A qué alias?</option>
            <option value="juan01">juan01</option>

          <div style="display:flex; gap:4px">
            <input id="ccPgTDeb" class="search" type="number" inputmode="decimal" value="0" style="flex:1">
            <button class="fbtn" type="button" data-cc-usar-total="ccPgTDeb" style="flex:none; padding:0 10px" title="Usar el saldo total">＝</button>
          </div></div>
        <div><div class="note" style="margin:0 0 4px">Tarjeta de crédito</div>
          <div style="display:flex; gap:4px">
            <input id="ccPgTCred" class="search" type="number" inputmode="decimal" value="0" style="flex:1">
            <button class="fbtn" type="button" data-cc-usar-total="ccPgTCred" style="flex:none; padding:0 10px" title="Usar el saldo total">＝</button>
          </div>
          <select id="ccPgTCredCuotas" class="search" style="margin-top:4px">
            <option value="1">1 cuota</option>
            <option value="3">3 cuotas sin interés</option>
            ${CUOTAS_INT.map(n=>`<option value="${n}">${n} cuotas (+${(tasaMensual*n).toFixed(1)}%)</option>`).join('')}
          </select>
          <div class="note" id="ccPgRecargoInfo" style="margin-top:2px"></div></div>
      </div>
      <div class="note" id="ccPgTotalInfo" style="margin-top:4px"></div>
      <input id="ccPagoNota" class="search" placeholder="Nota (opcional)" style="margin-top:6px">
      <button class="addcart" id="ccPagoOk" style="margin-top:8px">💰 Registrar pago</button>
      <div class="note" id="ccPagoErr"></div>
      </div>` : ''}

      <div class="label" style="margin-top:14px">Compras (${compras.length})${compras.length?` · total ${money(totalGastado)}`:''}</div>
      ${compras.length ? `<div class="note">Última: ${compras[0].created_at ? new Date(compras[0].created_at).toLocaleDateString('es-AR') : ''} en ${esc(stLocalNombre(compras[0].local))}</div>`
        : '<div class="note">Sin compras vinculadas todavía — se vinculan cuando se elige este cliente al vender.</div>'}

      <div class="label" style="margin-top:14px">Historial de cuenta corriente</div>
      ${movs.length ? movs.map(m=>`
        <div class="lista" style="margin-top:6px; text-align:left">
          <div style="display:flex; justify-content:space-between; align-items:center; gap:8px">
            <span class="l">${m.created_at ? new Date(m.created_at).toLocaleDateString('es-AR') : ''} · ${m.tipo==='cargo'?'Cargo':'Pago'} · ${esc(stLocalNombre(m.local))}</span>

      const tel = cliente.telefono || prompt('Este cliente no tiene teléfono cargado. Ingresalo para enviar el recordatorio:');
      if(tel) window.open(`https://wa.me/${telParaWA(tel)}?text=${encodeURIComponent(msg)}`, '_blank');
    };
    const CC_CAMPOS_PAGO = ['ccPgContado','ccPgTransf','ccPgTDeb','ccPgTCred'];
    const ccCuotasSel = ()=>{ const el=document.getElementById('ccPgTCredCuotas'); return el ? Number(el.value)||1 : 1; };
    const ccMontoBaseTCred = ()=>{ const el=document.getElementById('ccPgTCred'); return el ? Number(el.value)||0 : 0; };
    const ccMontoFinalTCred = ()=> ccMontoBaseTCred() * factorCuotas(ccCuotasSel());
    const ccRecalcInfo = ()=>{
      const recargoEl = document.getElementById('ccPgRecargoInfo');
      if(recargoEl){
        const n = ccCuotasSel(), base = ccMontoBaseTCred(), final = ccMontoFinalTCred();
        recargoEl.textContent = base>0 && n>1
          ? (final>base ? `Con ${n} cuotas: ${money(final)} (recargo +${money(final-base)})` : `${n} cuotas sin interés: ${money(final)}`)
          : '';
      }
      const totalInfoEl = document.getElementById('ccPgTotalInfo');
      if(totalInfoEl){
        const contado = Number(document.getElementById('ccPgContado').value)||0;
        const transf = Number(document.getElementById('ccPgTransf').value)||0;
        const tdeb = Number(document.getElementById('ccPgTDeb').value)||0;
        const totalPago = contado + transf + tdeb + ccMontoFinalTCred();
        totalInfoEl.textContent = totalPago>0 ? `Total a registrar: ${money(totalPago)}${totalPago>saldo?' — más que el saldo pendiente':''}` : '';
      }
    };
    CC_CAMPOS_PAGO.forEach(id=>{ const el=document.getElementById(id); if(el) el.addEventListener('input', ccRecalcInfo); });
    const ccCuotasEl = document.getElementById('ccPgTCredCuotas');
    if(ccCuotasEl) ccCuotasEl.addEventListener('change', ccRecalcInfo);
    [...document.querySelectorAll('[data-cc-usar-total]')].forEach(b=> b.onclick=()=>{
      const campo = b.dataset.ccUsarTotal;
      CC_CAMPOS_PAGO.forEach(id=>{ const el=document.getElementById(id); if(el) el.value = id===campo ? saldo : 0; });
      ccRecalcInfo();
    });
    const pagoOk = document.getElementById('ccPagoOk');
    if(pagoOk) pagoOk.onclick = async ()=>{
      const err = document.getElementById('ccPagoErr');
      const localSel = stLocal();
      const pagoContado = Number(document.getElementById('ccPgContado').value)||0;
      const pagoTransf = Number(document.getElementById('ccPgTransf').value)||0;
      const transfAlias = document.getElementById('ccPgTransfAlias').value||null;
      const pagoTDeb = Number(document.getElementById('ccPgTDeb').value)||0;
      const cuotasTCred = ccCuotasSel();
      const recargoPct = CUOTAS_INT.includes(cuotasTCred) ? Number((tasaMensual*cuotasTCred).toFixed(2)) : 0;
      const pagoTCred = ccMontoFinalTCred();
      const nota = document.getElementById('ccPagoNota').value||null;
      if(!(pagoContado+pagoTransf+pagoTDeb+pagoTCred>0)){ err.textContent='Ingresá un monto mayor a 0 en algún medio de pago.'; return; }
      if(pagoTransf>0 && !transfAlias){ err.textContent='Elegí a qué alias se transfirió.'; return; }
      err.textContent=''; pagoOk.disabled = true; pagoOk.textContent = 'Guardando…';
      try{
        const r = await sbAuthed('/rest/v1/rpc/registrar_pago_cuenta_corriente', { method:'POST', body: JSON.stringify({
          p_cliente_id: cliente.id, p_local: localSel,
          p_pago_contado: pagoContado, p_pago_transferencia: pagoTransf, p_transferencia_alias: transfAlias,
          p_pago_tarjeta_debito: pagoTDeb, p_pago_tarjeta_credito: pagoTCred,
          p_tarjeta_credito_cuotas: cuotasTCred>1?cuotasTCred:null, p_tarjeta_credito_recargo_pct: recargoPct||null,
          p_nota: nota,
        }) });
        if(!r.ok){ const d = await r.json().catch(()=>({})); throw new Error(d.message || 'No se pudo registrar el pago.'); }
        mostrarDetalleCliente(cliente);
        renderClientesConSaldo();
      }catch(e){ pagoOk.disabled=false; pagoOk.textContent='💰 Registrar pago'; err.textContent = e.message||e; }
    };
    // Atajo de teclado: con algún importe cargado, Enter pide confirmar y con
    // otro Enter se registra — mismo criterio que en Vender, para cobrar sin
    // soltar el teclado. Acotado a esta caja (no al form de editar cliente,
    // que comparte el mismo contenedor #ccDetalle).
    const ccPagoBox = document.getElementById('ccPagoBox');
    if(ccPagoBox) ccPagoBox.addEventListener('keydown', e=>{
      if(e.key!=='Enter') return;
      if(pagoOk.disabled) return;
      const totalPago = Number(document.getElementById('ccPgContado').value||0)
        + Number(document.getElementById('ccPgTransf').value||0)
        + Number(document.getElementById('ccPgTDeb').value||0)
        + ccMontoFinalTCred();
      if(!(totalPago>0)) return;
      e.preventDefault();
      if(!confirm(`¿Registrar un pago de ${money(totalPago)}?`)) return;
      pagoOk.click();
    });
  }catch(e){ box.innerHTML = `<div class="note">No se pudo cargar la cuenta del cliente.</div>`; }
}

    <h2>🔁 Traspaso entre locales</h2>
    <div class="scat">Sesión: ${esc(mostrarUsuario(sbSession.email))} · <a href="#" id="stLogout" style="color:var(--accent)">salir</a></div>
    <div id="tsBody"><div class="note">Verificando permisos…</div></div>`;
  wireNavIcons(sheet);
  document.getElementById('stClose').onclick = ()=> stCerrar(false);
  document.getElementById('stLogout').onclick = (e)=>{ e.preventDefault();
    sbSession=null; setLS('sb_session', null); miRolCache=null; miLocalAsignadoCache=undefined; actualizarVisibilidadRendimiento(); drawTraspasos(); };
  Promise.all([cargarMiRol(), cargarMiLocalAsignado()]).then(([rol, localAsignado])=>{
    armarTraspasos(document.getElementById('tsBody'), rol, localAsignado);
  });
}

// Cualquier admin puede enviar stock (desde su propio local, si está
// restringido) y confirmar/cancelar recepciones de su local. El gerente,
// sin restricción, ve y puede operar los dos locales, y además tiene a mano
// el traspaso directo (sin paso de confirmación) para cuando mueve la
// mercadería él mismo entre los dos negocios.
function armarTraspasos(body, rol, localAsignado){
  body.innerHTML = `
    ${localAsignado ? `<div class="note">Tu usuario envía desde <b>${esc(stLocalNombre(localAsignado))}</b> y confirma lo que llega ahí.</div>` : ''}
    <div class="st-grid st-grid-3">
      <div class="st-col-left">
        <div class="label">📤 Buscar artículo para enviar</div>
        <input id="tsBuscarInput" class="search" placeholder="Código o nombre…" autocomplete="off">
        <div id="tsResultados"></div>
        <div id="tsDetalle" style="margin-top:8px">
          <div class="note">Buscá un artículo para ver su stock en cada local.</div>
        </div>
      </div>
      <div class="st-col-right" id="tsPendientes"></div>
      <div class="st-col-dia" id="tsHistorial"></div>
    </div>`;
  const buscarInput = document.getElementById('tsBuscarInput');
  const resultadosEl = document.getElementById('tsResultados');
  buscarInput.addEventListener('input', ()=>{
    const q = norm(buscarInput.value.trim());
    if(q.length<2){ resultadosEl.innerHTML=''; return; }
    const terms = q.split(/\s+/).filter(Boolean);
    const encontrados = PRODS.filter(p=>{
      const hay = norm(p.codigo+' '+p.nombre+' '+(p.categoria||''));
      return terms.every(t=>hay.includes(t));
    }).slice(0,8);
    resultadosEl.innerHTML = encontrados.length ? encontrados.map((p,i)=>`
      <div class="lista" data-i="${i}" style="margin-top:4px; cursor:pointer; text-align:left">
        <div class="l">${esc(p.codigo)} · ${esc(p.categoria||'')}</div>
        <div class="v" style="font-size:15px">${esc(p.nombre)}</div>
      </div>`).join('') : '<div class="note">Sin resultados.</div>';
    [...resultadosEl.querySelectorAll('[data-i]')].forEach(el=> el.onclick=()=> armarDetalleTraspaso(encontrados[Number(el.dataset.i)], localAsignado, rol));
  });
  renderPendientesTraspaso(localAsignado);
  renderHistorialTraspasos();
}

function armarDetalleTraspaso(p, localAsignado, rol){
  const box = document.getElementById('tsDetalle');
  let talleIdx = 0;
  function talleColorOpciones(){
    const t = p.talles[talleIdx];
    const colores = (t.stock||[]).length ? t.stock : [{color:'Único', camerino:0, giustozzi:0}];
    return {t, colores};
  }
  function render(){
    const {t, colores} = talleColorOpciones();
    box.innerHTML = `
      <div class="label">${esc(p.nombre)}</div>
      <div class="note">${esc(p.codigo)}</div>
      ${p.talles.length>1 ? `
        <div class="label" style="margin-top:8px">Talle</div>
        <div class="talles">${p.talles.map((x,i)=>`<button class="talle ${i===talleIdx?'sel':''}" data-ti="${i}">${esc(x.talle)}</button>`).join('')}</div>` : ''}
      <div class="label" style="margin-top:8px">Color / stock actual</div>
      ${colores.map((c,i)=>`
        <div class="lista" data-ci="${i}" style="margin-top:6px; cursor:pointer; text-align:left">
          <div class="l">${esc(c.color||'Único')}</div>
          <div class="v" style="font-size:15px">Camerino ${Number(c.camerino)||0} · Giustozzi ${Number(c.giustozzi)||0}</div>
        </div>`).join('')}
      <div id="tsFormBox" style="margin-top:8px"></div>`;
    [...box.querySelectorAll('[data-ti]')].forEach(el=> el.onclick=()=>{ talleIdx = Number(el.dataset.ti); render(); });
    [...box.querySelectorAll('[data-ci]')].forEach(el=> el.onclick=()=> armarFormTraspaso(box.querySelector('#tsFormBox'), p, t.talle, colores[Number(el.dataset.ci)], localAsignado, rol));
  }
  render();
}

function armarFormTraspaso(formBox, p, talle, colorObj, localAsignado, rol){
  const color = colorObj.color || 'Único';
  const cam = Number(colorObj.camerino)||0, giu = Number(colorObj.giustozzi)||0;
  let dir = localAsignado==='giustozzi' ? 'gc' : 'cg';   // por defecto, el propio local como origen
  const direccionHtml = localAsignado
    ? `<div class="note">Enviando: <b>${esc(stLocalNombre(localAsignado))} → ${esc(stLocalNombre(localAsignado==='camerino'?'giustozzi':'camerino'))}</b></div>`
    : `<div class="talles">
        <button class="talle ${dir==='cg'?'sel':''}" data-dir="cg">Camerino → Giustozzi</button>
        <button class="talle ${dir==='gc'?'sel':''}" data-dir="gc">Giustozzi → Camerino</button>
      </div>`;
  formBox.innerHTML = `
    <div class="label">Enviar "${esc(color)}"</div>
    ${direccionHtml}
    <div class="note" id="tsDisponible" style="margin-top:4px">Disponible en ${esc(stLocalNombre(dir==='cg'?'camerino':'giustozzi'))}: ${dir==='cg'?cam:giu}</div>
    <input id="tsCantidad" class="search" type="number" min="1" placeholder="Cantidad" style="margin-top:6px">
    <button class="addcart" id="tsOk" style="margin-top:8px">📤 Enviar</button>
    <div class="note" id="tsErr"></div>
    ${rol==='gerente' ? `<button class="fbtn" id="tsDirecto" style="width:100%; margin-top:10px">⚡ Traspaso directo, sin esperar confirmación</button>` : ''}`;
  const disponibleEl = formBox.querySelector('#tsDisponible');
  if(!localAsignado){
    [...formBox.querySelectorAll('[data-dir]')].forEach(b=> b.onclick=()=>{
      dir = b.dataset.dir;
      [...formBox.querySelectorAll('[data-dir]')].forEach(x=>x.classList.remove('sel'));
      b.classList.add('sel');
      disponibleEl.textContent = `Disponible en ${stLocalNombre(dir==='cg'?'camerino':'giustozzi')}: ${dir==='cg'?cam:giu}`;
    });
  }
  formBox.querySelector('#tsOk').onclick = async ()=>{
    const err = formBox.querySelector('#tsErr');
    const ok = formBox.querySelector('#tsOk');
    const cantidad = Number(formBox.querySelector('#tsCantidad').value)||0;
    if(!(cantidad>0)){ err.textContent='Ingresá una cantidad mayor a 0.'; return; }
    const origen = dir==='cg' ? 'camerino' : 'giustozzi';
    const destino = dir==='cg' ? 'giustozzi' : 'camerino';
    err.textContent=''; ok.disabled=true; ok.textContent='Enviando…';
    try{
      const r = await sbAuthed('/rest/v1/rpc/iniciar_traspaso_stock', { method:'POST', body: JSON.stringify({
        p_codigo: p.codigo, p_talle: talle, p_color: color,
        p_local_origen: origen, p_local_destino: destino, p_cantidad: cantidad,
      }) });
      if(!r.ok){ const d = await r.json().catch(()=>({})); throw new Error(d.message || 'No se pudo enviar.'); }
      await cargarCatalogo();
      const pActualizado = BYCOD[p.codigo];
      if(pActualizado) armarDetalleTraspaso(pActualizado, localAsignado, rol);
      renderPendientesTraspaso(localAsignado);
      renderHistorialTraspasos();
    }catch(e){
      ok.disabled=false; ok.textContent='📤 Enviar';
      err.textContent = e.message||e;
    }
  };
  const directoBtn = formBox.querySelector('#tsDirecto');
  if(directoBtn) directoBtn.onclick = async ()=>{
    const err = formBox.querySelector('#tsErr');
    const cantidad = Number(formBox.querySelector('#tsCantidad').value)||0;
    if(!(cantidad>0)){ err.textContent='Ingresá una cantidad mayor a 0.'; return; }
    const origen = dir==='cg' ? 'camerino' : 'giustozzi';
    const destino = dir==='cg' ? 'giustozzi' : 'camerino';
    err.textContent=''; directoBtn.disabled=true; directoBtn.textContent='Traspasando…';
    try{
      const r = await sbAuthed('/rest/v1/rpc/gerente_traspasar_stock', { method:'POST', body: JSON.stringify({
        p_codigo: p.codigo, p_talle: talle, p_color: color,
        p_local_origen: origen, p_local_destino: destino, p_cantidad: cantidad,
      }) });
      if(!r.ok){ const d = await r.json().catch(()=>({})); throw new Error(d.message || 'No se pudo traspasar.'); }
      await cargarCatalogo();
      const pActualizado = BYCOD[p.codigo];
      if(pActualizado) armarDetalleTraspaso(pActualizado, localAsignado, rol);
      renderHistorialTraspasos();
    }catch(e){
      directoBtn.disabled=false; directoBtn.textContent='⚡ Traspaso directo, sin esperar confirmación';
      err.textContent = e.message||e;
    }
  };
}

async function renderPendientesTraspaso(localAsignado){
  const box = document.getElementById('tsPendientes');
  if(!box) return;
  box.innerHTML = `<div class="label">📥 Traspasos en tránsito</div><div class="note">Cargando…</div>`;
  try{
    const r = await sbAuthed(`/rest/v1/traspasos_stock?estado=eq.enviado&order=enviado_at.desc&select=*&limit=30`);
    const rows = r.ok ? await r.json() : [];
    box.innerHTML = `
      <div class="label">📥 Traspasos en tránsito (${rows.length})</div>
      ${rows.length ? rows.map(t=>{
        const puedeConfirmar = !localAsignado || localAsignado===t.local_destino;
        const puedeCancelar = !localAsignado || localAsignado===t.local_origen;
        const hora = t.enviado_at ? new Date(t.enviado_at).toLocaleString('es-AR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) : '';
        return `
        <div class="lista" style="margin-top:6px; text-align:left">
          <div class="l">${esc(t.codigo)} · ${esc(t.talle)}${t.color?' · '+esc(t.color):''} — ${t.cantidad} u.</div>
          <div class="note" style="margin-top:2px">${esc(stLocalNombre(t.local_origen))} → ${esc(stLocalNombre(t.local_destino))} · ${hora}</div>
          ${t.enviado_por ? `<div class="note" style="margin-top:1px">Envió: ${esc(mostrarUsuario(t.enviado_por))}</div>` : ''}
          <div style="display:flex; gap:6px; margin-top:6px">
            ${puedeConfirmar ? `<button class="fbtn" data-accion="confirmar" data-id="${t.id}" style="flex:1">✅ Confirmar</button>` : ''}
            ${puedeCancelar ? `<button class="fbtn" data-accion="cancelar" data-id="${t.id}" style="flex:1">✕ Cancelar</button>` : ''}
          </div>
        </div>`;
      }).join('') : '<div class="note">No hay traspasos esperando confirmación.</div>'}`;
    [...box.querySelectorAll('[data-accion="confirmar"]')].forEach(b=> b.onclick=()=> resolverTraspaso(b, 'confirmar_traspaso_stock', localAsignado));
    [...box.querySelectorAll('[data-accion="cancelar"]')].forEach(b=> b.onclick=()=> resolverTraspaso(b, 'cancelar_traspaso_stock', localAsignado));
  }catch(e){ box.innerHTML = `<div class="note">No se pudo cargar.</div>`; }
}

async function resolverTraspaso(btn, rpcName, localAsignado){
  const id = btn.dataset.id;
  btn.disabled = true; const original = btn.textContent; btn.textContent = '…';
  try{
    const r = await sbAuthed(`/rest/v1/rpc/${rpcName}`, { method:'POST', body: JSON.stringify({ p_traspaso_id: id }) });
    if(!r.ok){ const d = await r.json().catch(()=>({})); throw new Error(d.message || 'No se pudo completar.'); }
    await cargarCatalogo();
    renderPendientesTraspaso(localAsignado);
    renderHistorialTraspasos();
  }catch(e){
    btn.disabled = false; btn.textContent = original;
    alert(e.message||e);
  }
}

// ===== ↩️ Devoluciones de mercadería: buscar la venta original, elegir qué
// productos vuelven y reponer stock. Se permite aunque la venta ya esté
// facturada — no se emite Nota de Crédito, se registra igual (decisión
// explícita para simplificar el caso "cambio de regalo": el que recibió el
// regalo devuelve una prenda de una venta facturada y se lleva otra). Si
// además el cliente se lleva otra prenda a cambio, se compara el precio de
// lo nuevo contra lo devuelto: si es más caro, la diferencia se cobra aparte
// como una venta nueva (con la leyenda "Diferencia por cambio"); si es más
// barato, se reintegra como una devolución normal. Si el reintegro es en
// efectivo, exige que haya una caja abierta en ese local (y se descuenta del
// efectivo esperado al cerrarla). =====
function drawDevoluciones(){
  const sheet = document.getElementById('sheet');
  sheet.classList.add('sheet-wide');
  if(!sbSession){
    sheet.innerHTML = `
      ${navIconsHtml()}
      <div class="topbtns"><button class="backbtn" id="stClose">✕ Cerrar</button></div>
      <h2>↩️ Devoluciones</h2>
      <div class="scat">Iniciá sesión con tu usuario del panel para poder usarlo.</div>
      <div class="label">Usuario</div>
      <input id="stEmail" class="search" type="text" autocomplete="username">
      <div class="label">Contraseña</div>
      <input id="stPass" class="search" type="password" autocomplete="current-password">
      <button class="addcart" id="stLoginBtn">Ingresar</button>
      <div class="note" id="stLoginErr"></div>`;
    wireNavIcons(sheet);
    document.getElementById('stClose').onclick = ()=> stCerrar(false);
    document.getElementById('stLoginBtn').onclick = async ()=>{
      const err = document.getElementById('stLoginErr');
      const b = document.getElementById('stLoginBtn');
      b.disabled = true; b.textContent = 'Ingresando…';
      try{
        await sbLogin(usuarioAEmail(document.getElementById('stEmail').value),
                      document.getElementById('stPass').value);
        drawDevoluciones();
      }catch(e){ b.disabled=false; b.textContent='Ingresar'; err.textContent = e.message; }
    };
    return;
  }
  sheet.innerHTML = `
    ${navIconsHtml()}
    <div class="topbtns"><button class="backbtn" id="stClose">✕ Cerrar</button></div>
    <h2>↩️ Devoluciones</h2>
    <div class="scat">Sesión: ${esc(mostrarUsuario(sbSession.email))} · <a href="#" id="stLogout" style="color:var(--accent)">salir</a></div>
    <div class="st-grid st-grid-3">
      <div class="st-col-left">
        <div class="label">Buscar por producto</div>
        <input id="dvBuscarProducto" class="search" placeholder="Código o nombre del producto…" autocomplete="off">
        <div class="note"><a href="#" id="dvRangoToggle" style="color:var(--accent)">📅 Cambiar período (por defecto, últimos 2 meses)</a></div>
        <div id="dvRangoBox" style="display:none; margin-top:4px">
          <div class="label">Desde</div><input id="dvDesde" class="search" type="date">
          <div class="label">Hasta</div><input id="dvHasta" class="search" type="date">
        </div>
        <div id="dvBuscarResultados" style="margin-top:6px"></div>
        <div class="label" style="margin-top:14px">Buscar la venta original por fecha</div>
        <input id="dvFecha" class="search" type="date" value="${isoLocal(new Date())}">
        <div class="talles" style="margin-top:6px">
          <button class="talle" id="dvLocCam">Camerino</button>
          <button class="talle" id="dvLocGiu">Giustozzi</button>
        </div>
        <div id="dvVentas" style="margin-top:8px"></div>
      </div>
      <div class="st-col-right" id="dvDetalle">
        <div class="note">Elegí una fecha y un local para ver las ventas de ese día, o buscá directamente por producto.</div>
      </div>
      <div class="st-col-dia" id="dvHistorial"></div>
    </div>`;
  wireNavIcons(sheet);
  document.getElementById('stClose').onclick = ()=> stCerrar(false);
  document.getElementById('stLogout').onclick = (e)=>{ e.preventDefault();
    sbSession=null; setLS('sb_session', null); miRolCache=null; miLocalAsignadoCache=undefined; actualizarVisibilidadRendimiento(); drawDevoluciones(); };
  const bC=document.getElementById('dvLocCam'), bG=document.getElementById('dvLocGiu');
  const refLoc=()=>{ const l=stLocal();
    bC.classList.toggle('sel', l==='camerino'); bG.classList.toggle('sel', l==='giustozzi'); };
  bC.onclick=()=>{ if(bC.disabled) return; setLS('stock_local','camerino'); refLoc(); renderVentasDevolucion(); buscarDevolucionPorProducto(); };
  bG.onclick=()=>{ if(bG.disabled) return; setLS('stock_local','giustozzi'); refLoc(); renderVentasDevolucion(); buscarDevolucionPorProducto(); };
  refLoc();
  aplicarRestriccionLocal(bC, bG).then(()=>{ refLoc(); renderVentasDevolucion(); });
  document.getElementById('dvFecha').addEventListener('change', renderVentasDevolucion);
  renderVentasDevolucion();
  renderHistorialDevoluciones();

  // Buscador por producto: cubre los últimos 2 meses por defecto (para no
  // tener que saber la fecha exacta de la venta), con un selector de
  // período aparte, colapsado, para buscar más atrás si hace falta.
  const hoyDv = new Date();
  const desdeDefaultDv = new Date(hoyDv); desdeDefaultDv.setMonth(desdeDefaultDv.getMonth()-2);
  document.getElementById('dvDesde').value = isoLocal(desdeDefaultDv);
  document.getElementById('dvHasta').value = isoLocal(hoyDv);
  document.getElementById('dvRangoToggle').onclick = (e)=>{
    e.preventDefault();
    const box = document.getElementById('dvRangoBox');
    box.style.display = box.style.display==='none' ? '' : 'none';
  };
  makeClearable(document.getElementById('dvBuscarProducto'));
  let dvBuscarT;
  const dispararBusquedaProducto = ()=>{ clearTimeout(dvBuscarT); dvBuscarT = setTimeout(buscarDevolucionPorProducto, 300); };
  document.getElementById('dvBuscarProducto').addEventListener('input', dispararBusquedaProducto);
  document.getElementById('dvDesde').addEventListener('change', dispararBusquedaProducto);
  document.getElementById('dvHasta').addEventListener('change', dispararBusquedaProducto);
}

// Busca en las ventas (del local elegido, en el período elegido) algún item
// cuyo código o nombre coincida — para encontrar la venta original sin tener
// que saber la fecha exacta. Incluye facturadas: se pueden devolver igual.
async function buscarDevolucionPorProducto(){
  const box = document.getElementById('dvBuscarResultados');
  const inputEl = document.getElementById('dvBuscarProducto');
  if(!box || !inputEl) return;
  const q = norm(inputEl.value.trim());
  if(q.length<2){ box.innerHTML=''; return; }
  const localSel = stLocal();
  const desde = document.getElementById('dvDesde').value;
  const hasta = document.getElementById('dvHasta').value;
  box.innerHTML = '<div class="note">Buscando…</div>';
  try{
    const r = await sbAuthed(`/rest/v1/ventas?local=eq.${localSel}&fecha=gte.${desde}&fecha=lte.${hasta}&order=created_at.desc&select=*&limit=500`);
    const rows = r.ok ? await r.json() : [];
    const encontradas = rows.filter(v=> (v.items||[]).some(it=> norm((it.codigo||'')+' '+(it.nombre||'')).includes(q)));
    box.innerHTML = encontradas.length ? encontradas.map((v,i)=>{
      const fechaTxt = v.created_at ? new Date(v.created_at).toLocaleDateString('es-AR') : v.fecha;
      const hora = v.created_at ? new Date(v.created_at).toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'}) : '';
      const items = (v.items||[]).map(it=> `${esc(it.codigo)} ${esc(it.nombre)}`).join(', ');
      return `<div class="lista" data-i="${i}" style="margin-top:6px; cursor:pointer; text-align:left">
        <div style="display:flex; justify-content:space-between; gap:8px">
          <span class="l">${esc(fechaTxt)} ${hora}</span>
          <span class="v" style="font-size:15px">${money(v.total)}</span>
        </div>
        <div class="note" style="margin-top:2px">${items || '(sin detalle)'}</div>
        ${v.facturada ? '<div class="note" style="margin-top:2px">🧾 Facturada — la devolución se registra igual, sin Nota de Crédito.</div>' : ''}
      </div>`;
    }).join('') : '<div class="note">No se encontraron ventas con ese producto en el período elegido.</div>';
    [...box.querySelectorAll('[data-i]')].forEach(el=>{
      const v = encontradas[Number(el.dataset.i)];
      el.onclick = ()=> armarDetalleDevolucion(v);
    });
  }catch(e){ box.innerHTML = '<div class="note">No se pudo buscar.</div>'; }
}

async function renderVentasDevolucion(){
  const box = document.getElementById('dvVentas');
  if(!box) return;
  const fecha = document.getElementById('dvFecha').value;
  const localSel = stLocal();
  box.innerHTML = `<div class="note">Cargando…</div>`;
  try{
    const r = await sbAuthed(`/rest/v1/ventas?local=eq.${localSel}&fecha=eq.${fecha}&order=created_at.desc&select=*`);
    const rows = r.ok ? await r.json() : [];
    box.innerHTML = rows.length ? rows.map((v,i)=>{
      const hora = v.created_at ? new Date(v.created_at).toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'}) : '';
      const items = (v.items||[]).map(it=> `${esc(it.codigo)} ${esc(it.nombre)}`).join(', ');
      return `<div class="lista" data-i="${i}" style="margin-top:6px; cursor:pointer; text-align:left">
        <div style="display:flex; justify-content:space-between; gap:8px">
